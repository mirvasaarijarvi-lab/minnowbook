    <!-- Security Headers -->
    <!--
      CSP notes:
      - 'unsafe-inline' is kept on script-src because Google Tag Manager + Consent Mode v2
        rely on inline bootstrap scripts in this file. Removing it would break analytics.
      - 'unsafe-inline' on style-src is required by Tailwind/Radix runtime-injected styles.
      - frame-ancestors / X-Frame-Options / HSTS / X-Content-Type-Options must be set as
        real HTTP response headers at the hosting layer (Lovable platform). The meta
        equivalents below are best-effort and ignored by browsers for those directives.
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://*.googletagmanager.com https://www.google-analytics.com https://*.google-analytics.com https://ssl.google-analytics.com https://tagmanager.google.com; script-src-attr 'none'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://tagmanager.google.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; media-src 'self' https: data: blob:; connect-src 'self' https://*.supabase.co https://*.supabase.in wss://*.supabase.co https://www.google-analytics.com https://*.google-analytics.com https://*.analytics.google.com https://www.googletagmanager.com https://*.googletagmanager.com https://stats.g.doubleclick.net https://*.lovable.app https://api.pwnedpasswords.com https://connector-gateway.lovable.dev; frame-src 'self' https://www.googletagmanager.com https://www.youtube.com https://youtube.com https://www.youtube-nocookie.com https://youtube-nocookie.com; worker-src 'self' blob:; manifest-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests" />
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), interest-cohort=(), browsing-topics=()" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="color-scheme" content="light dark" />

    <!-- Google Consent Mode v2 default (must run BEFORE GTM loads). -->
    <!-- Storage is denied until the user accepts the cookie banner; GTM/GA4 -->
    <!-- still fire cookieless pings so traffic is measurable in GA4. -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){window.dataLayer.push(arguments);}
      window.gtag = window.gtag || gtag;
      var analyticsConsent = 'denied';
      try {
        analyticsConsent = localStorage.getItem('cookie-consent') === 'accepted' ? 'granted' : 'denied';
      } catch (e) {}
      gtag('consent', 'default', {
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
        analytics_storage: analyticsConsent,
        functionality_storage: 'granted',
        security_storage: 'granted',
        wait_for_update: 500
      });
      gtag('set', 'url_passthrough', true);
      gtag('set', 'ads_data_redaction', true);
    </script>

    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-P75VPD5G');</script>
    <!-- End Google Tag Manager -->

    <!-- GA4 direct loader (fallback so hits arrive even if the GTM container -->
    <!-- has no published GA4 tag). If you later add a GA4 Configuration tag -->
    <!-- in GTM that points to the SAME measurement ID, set `send_page_view: false` -->
    <!-- below to avoid double-counting page_view. -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-C7CJERJ7BR"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){window.dataLayer.push(arguments);}
      window.gtag = window.gtag || gtag;
      gtag('js', new Date());
      gtag('config', 'G-C7CJERJ7BR', { send_page_view: true });
    </script>
