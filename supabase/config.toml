  [functions.process-email-queue]
    verify_jwt = false
  [functions.public-booking]
    verify_jwt = false
  [functions.send-auto-reminders]
    verify_jwt = false
  [functions.send-reminder]
    verify_jwt = false
  [functions.support-chat]
    verify_jwt = false
  [functions.archive-reservations]
    verify_jwt = false
  [functions.redeem-access-code]
    verify_jwt = false
  [functions.resend-confirmation]
    verify_jwt = false
  [functions.ical-feed]
    verify_jwt = false
  [functions.send-offer-email]
    verify_jwt = false
  [functions.forbidden-status]
    verify_jwt = false
  [functions.log-forbidden-access]
    verify_jwt = true
  [functions.mint-tenant-private-url]
    # Path validation runs BEFORE auth so the e2e malicious-paths gate
    # can exercise the contract anonymously. The function itself
    # enforces the bearer-token check before minting.
    verify_jwt = false
  [functions.admin-users]
    # CORS preflights must reach the function so it can apply the
    # request-aware origin allowlist + SECURITY_HEADERS. With the
    # default verify_jwt=true the gateway occasionally returns its
    # own response (with ACAO: *) under burst load, which breaks the
    # disallowed-origin CORS regression suite. The function itself
    # enforces the bearer-token check before any privileged work.
    verify_jwt = false

