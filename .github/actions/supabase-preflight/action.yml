name: Supabase preflight
description: >
  Reusable preflight for workflows that need a Supabase URL + non-privileged
  key. Masks every supplied secret, prints a present/MISSING table to the
  job log and step summary, resolves the URL/key fallback chain, and emits
  outputs the caller can gate subsequent steps on. Refuses to resolve with
  only a service-role key (would bypass RLS).

  Composite actions cannot read `secrets.*` themselves; the caller must
  pass each secret value through `with:`. Wire `secrets.VITE_SUPABASE_URL`
  etc. into the corresponding inputs and the action does the rest.

inputs:
  vite_supabase_url:
    description: Value of the VITE_SUPABASE_URL repo secret (preferred URL source).
    required: false
    default: ""
  vite_supabase_publishable_key:
    description: Value of the VITE_SUPABASE_PUBLISHABLE_KEY repo secret (preferred key source).
    required: false
    default: ""
  supabase_url:
    description: Value of the SUPABASE_URL repo secret (URL fallback).
    required: false
    default: ""
  supabase_publishable_key:
    description: Value of the SUPABASE_PUBLISHABLE_KEY repo secret (key fallback).
    required: false
    default: ""
  supabase_anon_key:
    description: Value of the SUPABASE_ANON_KEY repo secret (key fallback).
    required: false
    default: ""
  supabase_service_role_key:
    description: >
      Value of the SUPABASE_SERVICE_ROLE_KEY repo secret. Only used to
      detect the misconfiguration where ONLY a service-role key is set.
      Never emitted as the resolved key.
    required: false
    default: ""
  fail_on_missing:
    description: >
      "auto" (default) hard-fails on workflow_dispatch and soft-skips on
      every other event. "true" always hard-fails. "false" always
      soft-skips.
    required: false
    default: "auto"
  label:
    description: >
      Human-readable name shown in the step summary heading. Defaults to
      "Supabase preflight".
    required: false
    default: "Supabase preflight"

outputs:
  enabled:
    description: "true if a usable URL + non-privileged key were resolved, otherwise false."
    value: ${{ steps.preflight.outputs.enabled }}
  resolved_url:
    description: The resolved Supabase URL (empty when enabled=false).
    value: ${{ steps.preflight.outputs.resolved_url }}
  resolved_key:
    description: The resolved non-privileged key, pre-masked (empty when enabled=false).
    value: ${{ steps.preflight.outputs.resolved_key }}

runs:
  using: composite
  steps:
    - name: Supabase preflight
      id: preflight
      shell: bash
      env:
        VITE_URL: ${{ inputs.vite_supabase_url }}
        VITE_KEY: ${{ inputs.vite_supabase_publishable_key }}
        BARE_URL: ${{ inputs.supabase_url }}
        BARE_PUB: ${{ inputs.supabase_publishable_key }}
        BARE_ANON: ${{ inputs.supabase_anon_key }}
        BARE_SR: ${{ inputs.supabase_service_role_key }}
        FAIL_ON_MISSING: ${{ inputs.fail_on_missing }}
        LABEL: ${{ inputs.label }}
      run: |
        # --- Defence-in-depth masking ---------------------------------
        # GitHub auto-masks `secrets.*` values, but only the exact string.
        # Re-register every non-empty value and the URL host/ref so that
        # accidental echoes (curl -v, error traces) cannot leak.
        mask() { [ -n "$1" ] && echo "::add-mask::$1"; return 0; }
        mask_url_parts() {
          local url="$1"
          [ -n "$url" ] || return 0
          local host scheme_host ref
          scheme_host="${url%%/}"
          scheme_host="${scheme_host%%\?*}"
          scheme_host="${scheme_host%%#*}"
          host="${scheme_host#*://}"
          host="${host%%/*}"
          ref="${host%%.*}"
          mask "$scheme_host"
          mask "$host"
          [ "$ref" != "$host" ] && mask "$ref"
        }
        for v in "$VITE_URL" "$VITE_KEY" "$BARE_URL" "$BARE_PUB" "$BARE_ANON" "$BARE_SR"; do
          mask "$v"
        done
        mask_url_parts "$VITE_URL"
        mask_url_parts "$BARE_URL"

        # --- Presence table -------------------------------------------
        status() { [ -n "$1" ] && echo "present" || echo "MISSING"; }
        V_URL=$(status "$VITE_URL")
        V_KEY=$(status "$VITE_KEY")
        B_URL=$(status "$BARE_URL")
        B_PUB=$(status "$BARE_PUB")
        B_ANON=$(status "$BARE_ANON")
        B_SR=$(status "$BARE_SR")

        {
          echo "### ${LABEL}"
          echo ""
          echo "| Secret | Status |"
          echo "| --- | --- |"
          echo "| VITE_SUPABASE_URL | $V_URL |"
          echo "| VITE_SUPABASE_PUBLISHABLE_KEY | $V_KEY |"
          echo "| SUPABASE_URL | $B_URL |"
          echo "| SUPABASE_PUBLISHABLE_KEY | $B_PUB |"
          echo "| SUPABASE_ANON_KEY | $B_ANON |"
          echo "| SUPABASE_SERVICE_ROLE_KEY | $B_SR (service-role is rejected) |"
        } | tee -a "$GITHUB_STEP_SUMMARY"

        echo ""
        echo "Needs ONE url + ONE non-privileged key:"
        echo "  url = VITE_SUPABASE_URL  OR  SUPABASE_URL"
        echo "  key = VITE_SUPABASE_PUBLISHABLE_KEY  OR  SUPABASE_PUBLISHABLE_KEY  OR  SUPABASE_ANON_KEY"

        # --- Fallback resolution --------------------------------------
        RESOLVED_URL="${VITE_URL:-$BARE_URL}"
        RESOLVED_KEY="${VITE_KEY:-${BARE_PUB:-$BARE_ANON}}"

        # --- Manual vs scheduled behaviour ----------------------------
        case "$FAIL_ON_MISSING" in
          true)  IS_FATAL="true" ;;
          false) IS_FATAL="false" ;;
          auto|"") IS_FATAL="false"; [ "${GITHUB_EVENT_NAME:-}" = "workflow_dispatch" ] && IS_FATAL="true" ;;
          *) echo "::error::Invalid fail_on_missing='${FAIL_ON_MISSING}' (expected auto|true|false)"; exit 2 ;;
        esac

        emit_skip() {
          local msg="$1"
          echo "enabled=false" >> "$GITHUB_OUTPUT"
          echo "resolved_url=" >> "$GITHUB_OUTPUT"
          echo "resolved_key=" >> "$GITHUB_OUTPUT"
          if [ "$IS_FATAL" = "true" ]; then
            echo "::error::$msg"
            {
              echo ""
              echo "### ❌ ${LABEL}: FAIL"
              echo ""
              echo "$msg"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "::warning::$msg (soft-skipping)"
          {
            echo ""
            echo "### ⏭️ ${LABEL}: SKIPPED"
            echo ""
            echo "$msg"
          } >> "$GITHUB_STEP_SUMMARY"
        }

        if [ -n "$RESOLVED_URL" ] && [ -n "$RESOLVED_KEY" ]; then
          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "resolved_url=$RESOLVED_URL" >> "$GITHUB_OUTPUT"
          echo "::add-mask::$RESOLVED_KEY"
          echo "resolved_key=$RESOLVED_KEY" >> "$GITHUB_OUTPUT"
          echo "✅ Supabase credentials resolved."
        elif [ -n "$BARE_SR" ] && [ -z "$RESOLVED_KEY" ]; then
          emit_skip "Only SUPABASE_SERVICE_ROLE_KEY is configured. Refusing to run with service-role (would bypass RLS). Add SUPABASE_PUBLISHABLE_KEY or SUPABASE_ANON_KEY."
        else
          emit_skip "No Supabase URL + publishable/anon key pair configured. Add VITE_SUPABASE_URL and VITE_SUPABASE_PUBLISHABLE_KEY (or SUPABASE_URL + SUPABASE_PUBLISHABLE_KEY/SUPABASE_ANON_KEY) under repo Settings → Secrets and variables → Actions."
        fi
