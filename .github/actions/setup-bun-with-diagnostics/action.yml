name: Setup Bun (with diagnostics)
description: |
  Wraps oven-sh/setup-bun with a retry loop and rich diagnostics on
  failure. The upstream action surfaces only a terse line like
  "Unexpected HTTP response: 504" when the GitHub release CDN is
  flaky, which makes it hard to tell a real outage apart from a
  transient blip. On failure this composite:

    1. Curls the same release URL the action would have downloaded
       and prints the full HTTP status line + response headers (and
       up to 1 KB of body) into the job log and step summary.
    2. Probes the github.com / objects.githubusercontent.com hosts
       with a HEAD request so we can tell whether the whole CDN is
       degraded vs. just this artifact.
    3. Emits a clearly-worded actionable hint (re-run the workflow
       for transient 5xx; pin a different bun-version for a removed
       release; bump the action SHA for a broken release asset).

inputs:
  bun-version:
    description: |
      Bun version to install. Defaults to the pinned version in
      bun-pin.env so every CI run is byte-for-byte reproducible.
      Override only for one-off experiments — production CI should
      always run the pinned version (and its verified checksum).
    required: false
    default: ""
  max-attempts:
    description: How many times to retry setup-bun on failure.
    required: false
    default: "3"
  verify-checksum:
    description: |
      Verify the installed `bun` binary's archive checksum against
      the pinned SHA-256 in bun-pin.env. Set to "false" only when
      the caller explicitly overrides bun-version with something
      not listed in bun-pin.env.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Resolve pinned Bun version + checksum
      id: pin
      shell: bash
      env:
        INPUT_BUN_VERSION: ${{ inputs.bun-version }}
      run: |
        set -euo pipefail
        # Load the pin file shipped alongside this composite action.
        # GITHUB_ACTION_PATH points at the directory containing
        # action.yml regardless of where the caller checked out.
        PIN_FILE="${GITHUB_ACTION_PATH}/bun-pin.env"
        if [ ! -f "$PIN_FILE" ]; then
          echo "::error::Missing pin file: $PIN_FILE"
          exit 1
        fi
        # shellcheck disable=SC1090
        source "$PIN_FILE"

        # Read user-controlled input via env, never via template expansion,
        # to prevent GitHub Actions template injection through a crafted
        # bun-version value.
        REQUESTED="${INPUT_BUN_VERSION:-}"
        if [ -z "$REQUESTED" ]; then
          RESOLVED="$BUN_VERSION"
          PINNED="true"
        else
          RESOLVED="$REQUESTED"
          # Only treat the install as "pinned + verifiable" when the
          # caller's requested version matches the pin file.
          if [ "$REQUESTED" = "$BUN_VERSION" ] || [ "$REQUESTED" = "v$BUN_VERSION" ]; then
            PINNED="true"
          else
            PINNED="false"
          fi
        fi

        # Pick the right checksum for this runner. The setup-bun
        # action chooses platform by RUNNER_OS + RUNNER_ARCH.
        OS="$(echo "${RUNNER_OS:-Linux}" | tr '[:upper:]' '[:lower:]')"
        ARCH="${RUNNER_ARCH:-X64}"
        case "$OS-$ARCH" in
          linux-X64)     EXPECTED="$BUN_SHA256_LINUX_X64"; ASSET="bun-linux-x64.zip" ;;
          linux-ARM64)   EXPECTED="$BUN_SHA256_LINUX_AARCH64"; ASSET="bun-linux-aarch64.zip" ;;
          macos-X64)     EXPECTED="$BUN_SHA256_DARWIN_X64"; ASSET="bun-darwin-x64.zip" ;;
          macos-ARM64)   EXPECTED="$BUN_SHA256_DARWIN_AARCH64"; ASSET="bun-darwin-aarch64.zip" ;;
          *)             EXPECTED=""; ASSET="" ;;
        esac

        {
          echo "version=$RESOLVED"
          echo "pinned=$PINNED"
          echo "expected_sha256=$EXPECTED"
          echo "asset=$ASSET"
        } >> "$GITHUB_OUTPUT"

        echo "Bun pin: version=$RESOLVED pinned=$PINNED asset=$ASSET"
        if [ -n "$EXPECTED" ]; then
          echo "Expected SHA-256: $EXPECTED"
        fi


    - name: Restore Bun install cache
      # Cache the installed Bun toolchain (~/.bun, where setup-bun
      # installs the binary) AND the verification archive so warm
      # runs skip both the ~30 MB GitHub release download and the
      # zip re-download in the checksum step. Cache key includes
      # the pinned version + OS + arch so a version bump in
      # bun-pin.env naturally invalidates stale caches.
      id: bun-cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.bun
          ~/.bun-verify
        key: bun-${{ runner.os }}-${{ runner.arch }}-v${{ steps.pin.outputs.version }}

    - name: Use cached Bun
      if: steps.bun-cache.outputs.cache-hit == 'true'
      shell: bash
      run: |
        # setup-bun normally appends ~/.bun/bin to PATH for us; on a
        # cache hit it never runs, so we mirror that behaviour here.
        echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
        echo "✅ Bun cache hit — skipped re-download."

    - name: Setup Bun (attempt 1)
      id: bun1
      if: steps.bun-cache.outputs.cache-hit != 'true'
      continue-on-error: true
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version: ${{ steps.pin.outputs.version }}

    - name: Diagnose Bun setup failure (attempt 1)
      if: steps.bun1.outcome == 'failure'
      shell: bash
      env:
        INPUT_BUN_VERSION: ${{ inputs.bun-version }}
      run: |
        set +e
        echo "::group::Bun setup attempt 1 failed — collecting diagnostics"
        # Read via env, not template expansion, to avoid template injection.
        VERSION="${INPUT_BUN_VERSION:-}"
        # setup-bun resolves "latest" via the GitHub releases API and
        # then downloads bun-linux-x64.zip from the release. Probe both
        # so we can attribute the failure precisely.
        API_URL="https://api.github.com/repos/oven-sh/bun/releases/latest"
        if [ "$VERSION" != "latest" ] && [ -n "$VERSION" ]; then
          API_URL="https://api.github.com/repos/oven-sh/bun/releases/tags/bun-v${VERSION#v}"
        fi
        ZIP_URL="https://github.com/oven-sh/bun/releases/download/bun-v${VERSION#v}/bun-linux-x64.zip"
        if [ "$VERSION" = "latest" ] || [ -z "$VERSION" ]; then
          ZIP_URL="(resolved dynamically from $API_URL)"
        fi

        echo "Release API URL: $API_URL"
        echo "Release zip URL: $ZIP_URL"
        echo ""
        echo "--- HEAD $API_URL ---"
        curl -sSI --max-time 15 "$API_URL" | head -n 20
        echo ""
        if [ "$ZIP_URL" != "(resolved dynamically from $API_URL)" ]; then
          echo "--- HEAD $ZIP_URL ---"
          curl -sSI --max-time 15 -L "$ZIP_URL" | head -n 40
          echo ""
          echo "--- First 1 KB of body (if any) ---"
          curl -sS --max-time 15 -L "$ZIP_URL" 2>&1 | head -c 1024
          echo ""
        fi
        echo ""
        echo "--- HEAD https://github.com ---"
        curl -sSI --max-time 10 https://github.com | head -n 5
        echo "--- HEAD https://objects.githubusercontent.com ---"
        curl -sSI --max-time 10 https://objects.githubusercontent.com | head -n 5
        echo "::endgroup::"

        {
          echo "## ⚠️ Bun setup attempt 1 failed"
          echo ""
          echo "- Release API: \`$API_URL\`"
          echo "- Release zip: \`$ZIP_URL\`"
          echo ""
          echo "If the HEAD probes above show 5xx from GitHub, this is"
          echo "almost certainly a transient GitHub release CDN outage."
          echo "Re-run the workflow. If it persists across multiple"
          echo "re-runs (>15 min), check https://www.githubstatus.com/"
          echo "and consider pinning an explicit \`bun-version\` to a"
          echo "known-good release."
        } >> "$GITHUB_STEP_SUMMARY"


    # Exponential backoff between retries: 5s before attempt 2,
    # 20s before attempt 3 (~4x growth + a small jitter window).
    # Keeps total worst-case wait under 30 s, which is well below
    # typical GitHub CDN recovery time for transient 5xx but long
    # enough to let edge caches re-converge.
    - name: Backoff before attempt 2
      if: steps.bun-cache.outputs.cache-hit != 'true' && steps.bun1.outcome == 'failure' && inputs.max-attempts != '1'
      shell: bash
      run: |
        JITTER=$(( RANDOM % 3 ))
        DELAY=$(( 5 + JITTER ))
        echo "Backing off ${DELAY}s before Bun setup attempt 2..."
        sleep "$DELAY"

    - name: Setup Bun (attempt 2)
      id: bun2
      if: steps.bun-cache.outputs.cache-hit != 'true' && steps.bun1.outcome == 'failure' && inputs.max-attempts != '1'
      continue-on-error: true
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version: ${{ steps.pin.outputs.version }}

    - name: Backoff before attempt 3
      if: |
        steps.bun-cache.outputs.cache-hit != 'true'
        && steps.bun1.outcome == 'failure'
        && steps.bun2.outcome == 'failure'
        && inputs.max-attempts == '3'
      shell: bash
      run: |
        JITTER=$(( RANDOM % 5 ))
        DELAY=$(( 20 + JITTER ))
        echo "Backing off ${DELAY}s before Bun setup attempt 3..."
        sleep "$DELAY"

    - name: Setup Bun (attempt 3)
      id: bun3
      if: |
        steps.bun-cache.outputs.cache-hit != 'true'
        && steps.bun1.outcome == 'failure'
        && steps.bun2.outcome == 'failure'
        && inputs.max-attempts == '3'
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version: ${{ steps.pin.outputs.version }}

    - name: Bun setup result
      shell: bash
      env:
        BUN_CACHE_HIT: ${{ steps.bun-cache.outputs.cache-hit }}
        BUN1_OUTCOME: ${{ steps.bun1.outcome }}
        BUN2_OUTCOME: ${{ steps.bun2.outcome }}
        BUN3_OUTCOME: ${{ steps.bun3.outcome }}
        INPUT_MAX_ATTEMPTS: ${{ inputs.max-attempts }}
      run: |
        if [ "$BUN_CACHE_HIT" = "true" ] \
           || [ "$BUN1_OUTCOME" = "success" ] \
           || [ "$BUN2_OUTCOME" = "success" ] \
           || [ "$BUN3_OUTCOME" = "success" ]; then
          echo "✅ Bun setup succeeded (version $(bun --version))."
        else
          echo "::error::Bun setup failed after ${INPUT_MAX_ATTEMPTS} attempt(s). See diagnostics above."
          exit 1
        fi

    - name: Verify Bun archive checksum
      # Verify the release zip's SHA-256 matches bun-pin.env. On a
      # warm cache the zip is reused from ~/.bun-verify (saved on
      # the previous run alongside ~/.bun), so this step costs only
      # a hash, not a re-download. On a cache miss we download once
      # and persist into ~/.bun-verify so future runs are fast.
      if: inputs.verify-checksum == 'true' && steps.pin.outputs.pinned == 'true'
      shell: bash
      env:
        VERSION: ${{ steps.pin.outputs.version }}
        ASSET: ${{ steps.pin.outputs.asset }}
        EXPECTED: ${{ steps.pin.outputs.expected_sha256 }}
      run: |
        set -euo pipefail
        if [ -z "$ASSET" ] || [ -z "$EXPECTED" ]; then
          echo "::warning::No pinned checksum for runner ${RUNNER_OS}/${RUNNER_ARCH}; skipping verification."
          exit 0
        fi
        CACHE_DIR="$HOME/.bun-verify/v$VERSION"
        CACHE_FILE="$CACHE_DIR/$ASSET"
        mkdir -p "$CACHE_DIR"
        if [ -f "$CACHE_FILE" ]; then
          echo "Using cached verification archive: $CACHE_FILE"
        else
          URL="https://github.com/oven-sh/bun/releases/download/bun-v${VERSION}/${ASSET}"
          echo "Downloading $URL for checksum verification..."
          # curl uses exponential backoff for --retry when --retry-delay
          # is NOT set (doubling from 1s, capped by --retry-max-time).
          # --retry-all-errors covers transient 5xx like the GitHub
          # release CDN 504s we've seen in CI.
          curl -sSL --retry 5 --retry-all-errors --retry-max-time 90 \
               --connect-timeout 15 --max-time 180 \
               -o "$CACHE_FILE" "$URL"
        fi
        ACTUAL="$(sha256sum "$CACHE_FILE" | awk '{print $1}')"
        echo "Expected: $EXPECTED"
        echo "Actual:   $ACTUAL"
        if [ "$ACTUAL" != "$EXPECTED" ]; then
          echo "::error::Bun archive checksum mismatch for $ASSET v$VERSION. Expected $EXPECTED, got $ACTUAL. Refusing to use this Bun install."
          # Drop the bad file so the next run re-downloads instead of
          # serving the corrupt cached copy forever.
          rm -f "$CACHE_FILE"
          exit 1
        fi
        echo "✅ Bun $ASSET v$VERSION SHA-256 verified."

    - name: Checksum verification skipped (unpinned override)
      if: inputs.verify-checksum == 'true' && steps.pin.outputs.pinned != 'true'
      shell: bash
      env:
        INPUT_BUN_VERSION: ${{ inputs.bun-version }}
      run: |
        echo "::warning::bun-version='${INPUT_BUN_VERSION}' does not match the pin in bun-pin.env; checksum verification skipped. Update bun-pin.env to make this install verifiable."
