name: E2E Tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:

# Default-deny. The job below re-grants only `contents: read`. The
# Playwright report is uploaded via actions/upload-artifact which
# uses the per-run artifact endpoint and does not require additional
# token scopes.
permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: ./.github/actions/setup-bun-with-diagnostics

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve Playwright version
        id: pw
        # Read the version actually resolved in node_modules so the cache key
        # tracks the lockfile, not just the package.json range.
        run: |
          version=$(node -p "require('./node_modules/@playwright/test/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        # On a cache hit we still need OS-level shared libs but not the
        # browser binaries themselves; --with-deps is a no-op for already
        # downloaded browsers, so this stays cheap when warm.
        run: |
          if [ "${{ steps.pw-cache.outputs.cache-hit }}" = "true" ]; then
            bunx playwright install-deps chromium
          else
            bunx playwright install --with-deps chromium
          fi

      # The Vite client at src/integrations/supabase/client.ts reads
      # VITE_SUPABASE_URL / VITE_SUPABASE_PUBLISHABLE_KEY at BUILD time
      # (they are inlined into the bundle by Vite). The CI checkout has no
      # .env, so without these secrets the built bundle ships with
      # `createClient(undefined, undefined, ...)` and every public booking
      # / tenant lookup silently returns null. The whole app then renders
      # "Business not found", masking real regressions.
      #
      # If the secrets aren't configured (e.g. forks), self-skip with a
      # clear notice rather than running a guaranteed-red E2E suite.
      - name: Verify build-time Supabase env
        id: env-check
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          missing=()
          [ -z "$VITE_SUPABASE_URL" ]            && missing+=("VITE_SUPABASE_URL")
          [ -z "$VITE_SUPABASE_PUBLISHABLE_KEY" ] && missing+=("VITE_SUPABASE_PUBLISHABLE_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::notice::E2E skipped — missing build-time secrets: ${missing[*]}. Configure under Settings > Secrets and variables > Actions."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build app
        if: steps.env-check.outputs.ready == 'true'
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
        run: bunx vite build

      - name: Run E2E tests
        if: steps.env-check.outputs.ready == 'true'
        run: bunx playwright test

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-run-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright junit + traces
        # test-reports/playwright/{junit.xml,results.json} are produced by
        # playwright.config.ts; test-results/ holds traces, screenshots,
        # videos, and stack-trace dumps for any failing test.
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts-run-${{ github.run_id }}
          path: |
            test-reports/playwright/
            test-results/
          if-no-files-found: warn
          retention-days: 14
