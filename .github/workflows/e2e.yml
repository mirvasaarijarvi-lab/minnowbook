name: E2E Tests

on:
  workflow_dispatch:

# Default-deny. The job below re-grants only `contents: read`. The
# Playwright report is uploaded via actions/upload-artifact which
# uses the per-run artifact endpoint and does not require additional
# token scopes.
permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve Playwright version
        id: pw
        # Read the version actually resolved in node_modules so the cache key
        # tracks the lockfile, not just the package.json range.
        run: |
          version=$(node -p "require('./node_modules/@playwright/test/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        # On a cache hit we still need OS-level shared libs but not the
        # browser binaries themselves; --with-deps is a no-op for already
        # downloaded browsers, so this stays cheap when warm.
        run: |
          if [ "${{ steps.pw-cache.outputs.cache-hit }}" = "true" ]; then
            bunx playwright install-deps chromium
          else
            bunx playwright install --with-deps chromium
          fi

      - name: Build app
        run: bunx vite build

      - name: Run E2E tests
        run: bunx playwright test

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-run-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright junit + traces
        # test-reports/playwright/{junit.xml,results.json} are produced by
        # playwright.config.ts; test-results/ holds traces, screenshots,
        # videos, and stack-trace dumps for any failing test.
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-artifacts-run-${{ github.run_id }}
          path: |
            test-reports/playwright/
            test-results/
          if-no-files-found: warn
          retention-days: 14
