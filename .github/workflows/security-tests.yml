name: Security Regression Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-tests:
    name: Run Security Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run security regression tests
        run: bunx vitest run --reporter=verbose src/test/security/

      - name: Summary
        if: always()
        run: echo "Security regression tests completed"
