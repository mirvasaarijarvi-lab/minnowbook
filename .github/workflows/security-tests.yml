name: Security Regression Tests (Unit)
#
# OFFLINE unit gate for security invariants. Runs on every push and PR
# so it can block merges without flaking on network/cold-start variance.
#
# Live integration probes (real Supabase + deployed Edge Functions) are
# split into `.github/workflows/security-tests-live.yml`, which runs on
# a daily cron schedule and on manual dispatch. The two configs share
# `vitest.security-live.files.ts` as the single source of truth for
# which suites live on which side.


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  security-tests:
    name: Run Security Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: ./.github/actions/setup-bun-with-diagnostics

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: |
          rm -rf node_modules
          bun install --frozen-lockfile

      - name: Run security regression tests (unit-only runner)
        run: bunx vitest run --config vitest.security.config.ts --reporter=verbose

      - name: Summary
        if: always()
        run: echo "Security regression unit tests completed (live integration tests run on the scheduled security-tests-live workflow)"

