name: Signed-URL Malicious Paths

# Required PR gate. Runs the Playwright spec
# `e2e/signed-url-malicious-paths.spec.ts`, which asserts that every
# known malicious storage object key is rejected by
# `assertSafeStorageObjectPath` BEFORE reaching Supabase, throws
# `InvalidStoragePathError`, and resolves to the localised friendly
# message contract used across the UI.
#
# This file is intentionally separate from the broader `e2e.yml`
# (which is `workflow_dispatch`-only) so the malicious-paths contract
# is enforced on every pull request and blocks merges on failure.
# To make this a HARD merge gate, add "Signed-URL Malicious Paths /
# malicious-paths" to the branch protection rules for `main` as a
# required status check.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Default-deny. The job re-grants only `contents: read`.
permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Cancel superseded runs on the same PR so a fast-follow push doesn't
# burn CI minutes finishing a stale verification.
concurrency:
  group: signed-url-malicious-paths-${{ github.ref }}
  cancel-in-progress: true

jobs:
  malicious-paths:
    name: malicious-paths
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: ./.github/actions/setup-bun-with-diagnostics

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        # Chromium only. The spec calls the deployed
        # `mint-tenant-private-url` edge function over HTTP, but
        # Playwright still requires at least one browser binary so the
        # webServer in playwright.config.ts can start.
        run: bunx playwright install --with-deps chromium

      - name: Build app
        # `playwright.config.ts` boots `vite preview` as a `webServer`
        # for E2E specs. We build once up front so the preview server
        # has something to serve when Playwright launches it.
        run: bunx vite build

      - name: Run signed-URL malicious-paths spec
        env:
          # Pre-auth path validation contract. SUPABASE_URL is required;
          # the anon key satisfies the Supabase functions gateway's
          # `apikey` requirement (no Authorization header is sent, so
          # the function exercises its pre-auth rejection branch).
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: bunx playwright test e2e/signed-url-malicious-paths.spec.ts --reporter=list

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: signed-url-malicious-paths-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
          if-no-files-found: ignore
