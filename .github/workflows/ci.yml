name: CI Build Check

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Default-deny at the workflow level. Each job re-grants only the
# scopes it actually needs (here: read-only checkout).
permissions: {}

jobs:
  # Fast pre-build gate. Runs ONLY the schema/index + plan-references tests
  # under src/test/schema/ — no DB, no secrets, no Vite build, no Playwright.
  # When marked required in branch protection (alongside `build`), this
  # blocks merges any time the dashboard's expected reservation indexes or
  # the plan.md cross-references drift out of sync with the migrations.
  #
  # The `build` job depends on this via `needs:`, so the dashboard's Vite
  # build never runs in CI when the gate is red — saving ~2 minutes per
  # failing run and giving reviewers a single, narrowly-scoped failure
  # signal to triage.
  schema-gate:
    name: Schema & plan references gate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: ./.github/actions/setup-bun-with-diagnostics

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run schema/index + plan-references tests
        id: schema_tests
        # --bail=1 surfaces the first failing assertion immediately; the
        # tests are deterministic file parsers so a retry won't help.
        run: |
          mkdir -p test-reports/vitest-schema
          bunx vitest run src/test/schema/ \
            --bail=1 \
            --reporter=dot \
            --reporter=junit \
            --outputFile.junit=test-reports/vitest-schema/junit.xml

      # When the plan-references gate fails the most useful debugging
      # signal is the actual plan.md content the extractor saw: usually
      # zero signals means the plan body was rewritten in a shape the
      # regexes don't cover (no backticks around the table name, no
      # "table" keyword, or a migration filename with the wrong digit
      # count). Print it inline AND copy it into the uploaded artifact
      # so we don't need to re-run the job to inspect it.
      - name: Dump plan.md on schema-gate failure
        if: failure() && steps.schema_tests.outcome == 'failure'
        run: |
          {
            echo "## Schema-gate failure: .lovable/plan.md snapshot"
            echo ""
            if [ -f .lovable/plan.md ]; then
              wc -c .lovable/plan.md | awk '{print "**Size:** " $1 " bytes"}'
              echo ""
              echo "### Extractor probe"
              echo '```'
              echo -n "table-shaped matches: "
              grep -coE '`[a-z][a-z0-9_]+`[[:space:]]+([a-z]+[[:space:]]+)?table\b' .lovable/plan.md || true
              echo -n "migration-path matches: "
              grep -coE 'supabase/migrations/' .lovable/plan.md || true
              echo -n "timestamped .sql matches: "
              grep -coE '\b[0-9]{14}[A-Za-z0-9_-]*\.sql\b' .lovable/plan.md || true
              echo '```'
              echo ""
              echo "### plan.md (full)"
              echo '```markdown'
              cat .lovable/plan.md
              echo '```'
            else
              echo "_.lovable/plan.md does not exist in the checkout._"
            fi
          } | tee -a "${GITHUB_STEP_SUMMARY:-/dev/stderr}"

          # Stage the file alongside the junit report so the artifact
          # upload below picks it up without a second upload step.
          if [ -f .lovable/plan.md ]; then
            cp .lovable/plan.md test-reports/vitest-schema/plan.md
          fi

      - name: Upload schema-gate report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: schema-gate-report-run-${{ github.run_id }}
          path: test-reports/vitest-schema/
          if-no-files-found: warn
          retention-days: 14

  build:
    name: Type-check & Build
    runs-on: ubuntu-latest
    # Gate the dashboard build on the schema/plan checks. If schema-gate
    # fails, this job is skipped entirely so no compute is wasted on a
    # build whose backing schema is already known to be wrong.
    needs: schema-gate
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: ./.github/actions/setup-bun-with-diagnostics

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check
        run: bunx tsc --noEmit

      - name: Quarantine manifest hygiene
        run: node scripts/ci/check-quarantine.mjs

      - name: Unit tests (Vitest, initial)
        id: vitest
        # Includes the support-chat system prompt snapshot lock
        # (src/test/support-chat-prompt.snapshot.test.ts) and its
        # sibling export/diff tests. Pure Node + jsdom — no network
        # or Supabase env vars required.
        # Emits junit into test-reports/vitest/ for the rerun helper
        # and the artifact upload step below.
        run: |
          mkdir -p test-reports/vitest
          bunx vitest run \
            --reporter=dot \
            --reporter=junit \
            --outputFile.junit=test-reports/vitest/junit.xml

      - name: Unit tests (deterministic rerun of quarantined failures)
        if: failure() && steps.vitest.outcome == 'failure'
        run: node scripts/ci/rerun-flaky.mjs --suite=vitest --junit=test-reports/vitest/junit.xml

      - name: Build
        run: bunx vite build

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-reports-vitest-run-${{ github.run_id }}
          path: |
            test-reports/
          if-no-files-found: warn
          retention-days: 14
