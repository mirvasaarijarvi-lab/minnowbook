name: CI Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Default-deny at the workflow level. Each job re-grants only the
# scopes it actually needs (here: read-only checkout).
permissions: {}

jobs:
  build:
    name: Type-check & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check
        run: bunx tsc --noEmit

      - name: Unit tests (Vitest)
        # Includes the support-chat system prompt snapshot lock
        # (src/test/support-chat-prompt.snapshot.test.ts) and its
        # sibling export/diff tests. Pure Node + jsdom — no network
        # or Supabase env vars required.
        # Emits junit + json reports into test-reports/vitest/ for
        # the artifact upload step below.
        run: |
          mkdir -p test-reports/vitest
          bun run test -- \
            --reporter=dot \
            --reporter=junit \
            --reporter=json

      - name: Build
        run: bunx vite build

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-reports-vitest-run-${{ github.run_id }}
          path: |
            test-reports/
          if-no-files-found: warn
          retention-days: 14
