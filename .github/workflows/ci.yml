name: CI Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check
        run: bunx tsc --noEmit

      - name: Unit tests (Vitest)
        # Includes the support-chat system prompt snapshot lock
        # (src/test/support-chat-prompt.snapshot.test.ts) and its
        # sibling export/diff tests. Pure Node + jsdom — no network
        # or Supabase env vars required.
        run: bun run test

      - name: Build
        run: bunx vite build
