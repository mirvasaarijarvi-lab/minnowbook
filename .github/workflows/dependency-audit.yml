name: Dependency audit

# Runs a software-composition-analysis (SCA) scan on every pull
# request and blocks merge when any vulnerability at or above the
# configured severity threshold is found.
#
# How this blocks Dependabot auto-merge:
#   The Dependabot auto-merge workflow uses `gh pr merge --auto`,
#   which waits for ALL required status checks (configured under
#   branch protection) to go green before actually merging. As long
#   as "Dependency audit / dependency-audit" is listed as a required
#   check on the default branch, a failing audit run here will hold
#   the PR open even after Dependabot has approved auto-merge.
#
# Severity threshold:
#   AUDIT_LEVEL controls the minimum severity that fails the job.
#   `high` means: fail on any high or critical advisory, ignore
#   moderate / low / info. Bump to `moderate` once the project is at
#   zero high+critical to ratchet protection upwards.
#
# Lockfile-aware:
#   The job auto-detects which package manager owns the resolved
#   dependency graph (pnpm > yarn > npm > bun) and runs that
#   manager's native audit. This avoids gaps where, for example, a
#   repo migrating to pnpm would otherwise have its npm-only audit
#   scan a stale package-lock.json. Only one audit runs per job so
#   the gate result is unambiguous.

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    paths:
      - "package.json"
      - "package-lock.json"
      - "bun.lock"
      - "pnpm-lock.yaml"
      - "yarn.lock"
      - ".github/workflows/dependency-audit.yml"
  push:
    branches: [main]
  schedule:
    # Daily catch-all so newly published advisories are caught even
    # without dependency churn in the repo.
    - cron: "17 6 * * *"
  workflow_dispatch:
    inputs:
      audit_level:
        description: "Minimum severity that fails the job (low | moderate | high | critical)."
        required: false
        default: ""
        type: choice
        options:
          - ""
          - low
          - moderate
          - high
          - critical

permissions: {}

concurrency:
  group: dependency-audit-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------
# Severity threshold resolution (highest priority first):
#   1. workflow_dispatch input `audit_level` (manual one-off override)
#   2. repository / environment variable `AUDIT_LEVEL` (long-lived
#      project default, set under Settings > Secrets and variables >
#      Actions > Variables, no code change required)
#   3. hardcoded fallback `high`
#
# This lets the team temporarily relax the gate to `critical` only
# (e.g. during a known-vulnerable transitive that ships a fix in N
# days) without editing the workflow, and ratchet it back up to
# `moderate` once the project is clean, again without a PR.
# ---------------------------------------------------------------
env:
  AUDIT_LEVEL: ${{ inputs.audit_level != '' && inputs.audit_level || vars.AUDIT_LEVEL || 'moderate' }}

jobs:
  audit:
    name: dependency-audit
    runs-on: ubuntu-latest
    # Raised from 8 to 15 minutes: registry walks for `npm audit` /
    # `pnpm audit` plus the lockfile freshness guard occasionally
    # cross the old budget when GitHub or npm registry are slow.
    timeout-minutes: 15
    permissions:
      contents: read
      # Required so the SARIF upload step at the end of the job can
      # publish findings to GitHub code scanning, where they render
      # inline on PRs and feed into the security tab.
      security-events: write
      # Required so the PR-comment step can upsert the audit summary
      # comment on pull requests. Scoped to this job only.
      pull-requests: write
      # Required so the dedicated Check Run we create for the
      # severity breakdown can show up in the PR's "Checks" sidebar
      # alongside the job-level check.
      checks: write
    steps:
      - name: Checkout
        # actions/checkout@v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          # Need history so we can fetch the branch tip and compare it
          # to the SHA this run was scheduled against. With depth: 1 the
          # subsequent `git fetch` below would still work, but having a
          # couple of commits available makes the diff message clearer
          # when a stale-ref is detected.
          fetch-depth: 10

      # ---------------------------------------------------------------
      # Lockfile freshness guard against racing commits.
      #
      # GitHub schedules workflow runs against the SHA that was the tip
      # at queue time. If a follow-up commit (typically: "regenerate
      # lockfile" or "bump override") lands while the previous run is
      # still queued, the audit ends up scanning a stale lockfile and
      # reports vulnerabilities that have already been fixed on the
      # branch. The user then has to re-run the job by hand.
      #
      # This step fetches the latest tip of the target ref and:
      #   - PR runs: compares `github.sha` (PR merge commit) to the
      #     current head of the PR branch via the GitHub API.
      #   - push / schedule / workflow_dispatch: compares `github.sha`
      #     to the current tip of the ref we ran against.
      #
      # If the tip has advanced, we fail fast with a clear "rerun on
      # latest" message instead of producing a misleading red on stale
      # state. The check is read-only (no checkout switch) so it cannot
      # silently audit a different tree than the one a human reviewer
      # would expect.
      # ---------------------------------------------------------------
      - name: Verify checkout is the latest commit on the target ref
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Resolve the "expected current tip" for whichever event
          # triggered this run. For PRs we want the latest commit on
          # the PR head branch (not the synthetic merge commit), so
          # contributors who push a fix-up commit immediately see the
          # in-flight run get superseded.
          case "$EVENT_NAME" in
            pull_request|pull_request_target)
              tip=$(gh api "repos/${PR_HEAD_REPO}/commits/${PR_HEAD_REF}" --jq '.sha' 2>/dev/null || echo "")
              compare_sha="${PR_HEAD_SHA:-$RUN_SHA}"
              context="PR head ${PR_HEAD_REPO}@${PR_HEAD_REF}"
              ;;
            push|schedule|workflow_dispatch)
              tip=$(gh api "repos/${BASE_REPO}/commits/${REF_NAME}" --jq '.sha' 2>/dev/null || echo "")
              compare_sha="$RUN_SHA"
              context="${BASE_REPO}@${REF_NAME}"
              ;;
            *)
              echo "Event '$EVENT_NAME' is not freshness-checked; skipping."
              exit 0
              ;;
          esac

          if [ -z "$tip" ]; then
            echo "::warning title=Freshness check skipped::Could not resolve current tip of ${context} (API unavailable or ref deleted). Continuing with the checked-out SHA ${compare_sha}."
            exit 0
          fi

          echo "Run SHA:        ${compare_sha}"
          echo "Current tip:    ${tip}  (${context})"

          if [ "$tip" != "$compare_sha" ]; then
            {
              echo "### Dependency audit aborted: stale checkout"
              echo ""
              echo "A newer commit landed on \`${context}\` while this run was queued."
              echo "The audit would have scanned an out-of-date lockfile and could"
              echo "report already-fixed advisories."
              echo ""
              echo "- Run SHA:     \`${compare_sha}\`"
              echo "- Current tip: \`${tip}\`"
              echo ""
              echo "A fresh run will be queued against \`${tip}\`; wait for that one."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::notice title=Stale checkout::A newer commit (${tip}) has landed on ${context} since this run was queued at ${compare_sha}. Aborting so the next run audits the up-to-date lockfile."
            exit 1
          fi

          echo "Checkout is up to date with ${context}."



      # ---------------------------------------------------------------
      # Validate the resolved AUDIT_LEVEL up front so a typo in the
      # repo variable (e.g. "High", "med") does not silently get
      # forwarded to npm/pnpm/yarn audit, which would either reject it
      # with a confusing error mid-run or, worse, default to a more
      # permissive level. We pin the allow-list here.
      # ---------------------------------------------------------------
      - name: Validate audit severity threshold
        run: |
          set -euo pipefail
          case "${AUDIT_LEVEL:-}" in
            low|moderate|high|critical)
              echo "Using audit severity threshold: $AUDIT_LEVEL"
              ;;
            *)
              echo "::error title=Invalid AUDIT_LEVEL::AUDIT_LEVEL='${AUDIT_LEVEL:-<empty>}' is not one of: low, moderate, high, critical. Set repo variable AUDIT_LEVEL or rerun via workflow_dispatch with a valid value."
              exit 1
              ;;
          esac

      # ---------------------------------------------------------------
      # Cross-lockfile @babel/runtime parity check.
      #
      # @babel/runtime has had repeated moderate advisories where the
      # vulnerable range is "< 7.26.10" but the fix is shipped via an
      # `overrides` block in package.json. If bun.lock and
      # package-lock.json disagree on the resolved version (typical
      # cause: the override was added to package.json but only one of
      # the two lockfiles was regenerated and committed), the audit
      # below will scan the npm graph as clean while the bun runtime
      # still ships the vulnerable copy — or vice versa.
      #
      # We compare the *resolved* version in each lockfile (not the
      # spec in package.json) so a stale lockfile is caught before the
      # audit runs. Skipped when either lockfile is absent, since the
      # repo is then single-manager and parity is trivially satisfied.
      # ---------------------------------------------------------------
      - name: Verify @babel/runtime parity across lockfiles
        if: hashFiles('bun.lock') != '' && hashFiles('package-lock.json') != ''
        run: |
          set -euo pipefail

          # bun.lock (text format) records the resolved version as
          #   "@babel/runtime": ["@babel/runtime@<version>", ...
          bun_version=$(grep -oE '"@babel/runtime@[^"]+"' bun.lock \
            | sed -E 's/.*@babel\/runtime@([^"]+)".*/\1/' \
            | sort -u)

          # package-lock.json records it under a node_modules/@babel/runtime
          # entry with a "version" field.
          npm_version=$(node -e '
            const lock = require("./package-lock.json");
            const pkgs = lock.packages || {};
            const versions = new Set();
            for (const [path, meta] of Object.entries(pkgs)) {
              if (path === "node_modules/@babel/runtime" && meta && meta.version) {
                versions.add(meta.version);
              }
              // Nested copies (rare with overrides, but possible) live at
              // node_modules/<pkg>/node_modules/@babel/runtime.
              if (path.endsWith("/node_modules/@babel/runtime") && meta && meta.version) {
                versions.add(meta.version);
              }
            }
            process.stdout.write([...versions].sort().join("\n"));
          ')

          echo "bun.lock @babel/runtime versions:"
          printf '  %s\n' ${bun_version:-<none>}
          echo "package-lock.json @babel/runtime versions:"
          printf '  %s\n' ${npm_version:-<none>}

          if [ -z "$bun_version" ] || [ -z "$npm_version" ]; then
            echo "::notice title=@babel/runtime parity skipped::Package not present in one or both lockfiles; nothing to compare."
            exit 0
          fi

          if [ "$bun_version" != "$npm_version" ]; then
            {
              echo "### Lockfile parity failure: @babel/runtime"
              echo ""
              echo "bun.lock and package-lock.json resolve different versions"
              echo "of \`@babel/runtime\`. The dependency-audit gate would"
              echo "scan an inconsistent graph and could mask a real advisory."
              echo ""
              echo "- bun.lock:          $(printf '%s ' $bun_version)"
              echo "- package-lock.json: $(printf '%s ' $npm_version)"
              echo ""
              echo "Fix locally by regenerating *both* lockfiles after the"
              echo "override change, then commit:"
              echo ""
              echo "    bun install --save-text-lockfile --ignore-scripts"
              echo "    npm install --package-lock-only --ignore-scripts"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error title=@babel/runtime version mismatch::bun.lock has [$bun_version] but package-lock.json has [$npm_version]. Regenerate both lockfiles and commit."
            exit 1
          fi

          echo "@babel/runtime parity OK ($bun_version)."


      # ---------------------------------------------------------------
      # Detect which package manager owns the dependency graph based on
      # the lockfile that is present. This avoids gaps where a repo
      # ships, say, a pnpm-lock.yaml that npm audit would silently
      # ignore (npm audit refuses to run without a package-lock.json
      # and would otherwise print a confusing error and fail open).
      # Precedence is "most authoritative for the resolved graph
      # first": pnpm > yarn > npm > bun. We never run two audits, the
      # detected manager owns the gate so the result is unambiguous.
      # ---------------------------------------------------------------
      - name: Detect package manager from lockfile
        id: detect
        run: |
          set -euo pipefail
          if [ -f pnpm-lock.yaml ]; then
            echo "manager=pnpm" >> "$GITHUB_OUTPUT"
            echo "lockfile=pnpm-lock.yaml" >> "$GITHUB_OUTPUT"
          elif [ -f yarn.lock ]; then
            echo "manager=yarn" >> "$GITHUB_OUTPUT"
            echo "lockfile=yarn.lock" >> "$GITHUB_OUTPUT"
          elif [ -f package-lock.json ]; then
            echo "manager=npm" >> "$GITHUB_OUTPUT"
            echo "lockfile=package-lock.json" >> "$GITHUB_OUTPUT"
          elif [ -f bun.lock ] || [ -f bun.lockb ]; then
            # Bun has no first-party audit. We fall through to npm by
            # generating a package-lock.json on the fly so we never
            # silently skip the SCA gate just because the repo runs on
            # bun in dev. The generated lockfile is throwaway.
            echo "manager=bun-via-npm" >> "$GITHUB_OUTPUT"
            echo "lockfile=bun.lock" >> "$GITHUB_OUTPUT"
          else
            echo "::error title=No lockfile found::Cannot run a dependency audit because no supported lockfile is present (pnpm-lock.yaml, yarn.lock, package-lock.json, bun.lock)."
            exit 1
          fi
          echo "Detected package manager: $(cat "$GITHUB_OUTPUT" | grep '^manager=' | cut -d= -f2)"

      - name: Set up Node.js
        # actions/setup-node@v4.1.0
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          # Pinned to Node 22 so the bundled npm (>=10.9) writes the
          # same `libc` fields on optional cross-platform packages that
          # the lockfile in this repo was generated with. Node 20 ships
          # an older npm that strips those fields on regenerate, which
          # caused the lockfile-sync guard to flag spurious drift.
          node-version: "22"
          # Use the manager-specific cache key only when npm owns the
          # lockfile. For pnpm / yarn we let their own setup actions
          # handle caching below.
          cache: ${{ steps.detect.outputs.manager == 'npm' && 'npm' || '' }}

      # ---------------------------------------------------------------
      # pnpm path. `pnpm audit --prod --audit-level=high --json` exits
      # non-zero on any advisory at or above the threshold, mirroring
      # `npm audit` semantics so the gate behaves identically.
      # ---------------------------------------------------------------
      - name: Set up pnpm
        if: steps.detect.outputs.manager == 'pnpm'
        # pnpm/action-setup@v4.0.0
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2
        with:
          run_install: false

      - name: Run pnpm audit (production deps)
        if: steps.detect.outputs.manager == 'pnpm'
        env:
          AUDIT_LEVEL: ${{ env.AUDIT_LEVEL }}
        run: |
          # Capture-only: the allowlist gate below decides pass/fail
          # so per-advisory waivers can override the raw audit verdict.
          pnpm audit --prod --audit-level "$AUDIT_LEVEL" --json | tee audit-prod.json || true

      - name: Run pnpm audit (all deps, informational)
        if: always() && steps.detect.outputs.manager == 'pnpm'
        continue-on-error: true
        run: pnpm audit --json | tee audit-all.json || true

      # ---------------------------------------------------------------
      # yarn path. `yarn npm audit` (Berry) and `yarn audit` (classic)
      # both honour --severity. We pick the right one by sniffing the
      # yarn version reported by the installed CLI.
      # ---------------------------------------------------------------
      - name: Run yarn audit (production deps)
        if: steps.detect.outputs.manager == 'yarn'
        env:
          AUDIT_LEVEL: ${{ env.AUDIT_LEVEL }}
        run: |
          # Capture-only: the allowlist gate below decides pass/fail.
          yarn_version="$(yarn --version || echo 1.0.0)"
          major="${yarn_version%%.*}"
          if [ "$major" -ge 2 ]; then
            yarn npm audit --environment production --severity "$AUDIT_LEVEL" --json | tee audit-prod.json || true
          else
            yarn audit --groups dependencies --level "$AUDIT_LEVEL" --json | tee audit-prod.json || true
          fi

      - name: Run yarn audit (all deps, informational)
        if: always() && steps.detect.outputs.manager == 'yarn'
        continue-on-error: true
        env:
          # Captured so the SARIF step downstream can pick the right
          # parser without re-sniffing the yarn version.
          YARN_FLAVOUR_FILE: yarn-flavour.txt
        run: |
          set -o pipefail
          yarn_version="$(yarn --version || echo 1.0.0)"
          major="${yarn_version%%.*}"
          if [ "$major" -ge 2 ]; then
            echo "berry" > "$YARN_FLAVOUR_FILE"
            yarn npm audit --all --recursive --json | tee audit-all.json || true
          else
            echo "classic" > "$YARN_FLAVOUR_FILE"
            yarn audit --json | tee audit-all.json || true
          fi

      # ---------------------------------------------------------------
      # npm path (and the bun fallback that synthesises a package-lock).
      # ---------------------------------------------------------------
      - name: Synthesise package-lock.json from bun lockfile
        if: steps.detect.outputs.manager == 'bun-via-npm' && hashFiles('package-lock.json') == ''
        run: |
          # `npm install --package-lock-only` resolves the graph from
          # package.json without touching node_modules, giving npm
          # audit a lockfile to scan. Safe because we never publish
          # this file from CI.
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      # ---------------------------------------------------------------
      # Lockfile freshness guard. A stale package-lock.json means npm
      # audit is scanning yesterday's dependency graph, so a brand-new
      # advisory against a freshly bumped package can slip through. We
      # regenerate the lockfile from package.json and fail the job if
      # the on-disk file would change. This runs only when npm owns
      # the gate (the bun-via-npm path already regenerated above).
      # ---------------------------------------------------------------
      - name: Verify package-lock.json is in sync with package.json
        if: steps.detect.outputs.manager == 'npm'
        run: |
          set -euo pipefail
          if [ ! -f package-lock.json ]; then
            echo "::error file=package-lock.json::package-lock.json is missing from the checkout. Regenerate locally with 'npm install --package-lock-only --ignore-scripts' and commit the result."
            exit 1
          fi
          # Snapshot the committed lockfile so we can diff after the
          # regenerate step rewrites it in place.
          cp package-lock.json package-lock.committed.json
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund
          if ! diff -q package-lock.committed.json package-lock.json >/dev/null; then
            echo "::error file=package-lock.json::package-lock.json is out of sync with package.json. The dependency-audit gate would scan a stale graph."
            echo "Fix locally with: npm install --package-lock-only --ignore-scripts && git add package-lock.json"
            diff -u package-lock.committed.json package-lock.json | head -200 || true
            exit 1
          fi
          echo "package-lock.json is in sync with package.json."
          rm -f package-lock.committed.json


      - name: Run npm audit (production deps)
        if: steps.detect.outputs.manager == 'npm' || steps.detect.outputs.manager == 'bun-via-npm'
        id: npm_audit
        env:
          AUDIT_LEVEL: ${{ env.AUDIT_LEVEL }}
        run: |
          # Capture-only: the allowlist gate below decides pass/fail.
          # `--omit=dev` keeps the gate focused on what actually ships
          # to production. A separate informational step below scans
          # devDependencies without failing the job.
          npm audit --omit=dev --audit-level="$AUDIT_LEVEL" --json | tee audit-prod.json || true

      - name: Run npm audit (all deps, informational)
        if: (steps.detect.outputs.manager == 'npm' || steps.detect.outputs.manager == 'bun-via-npm') && always()
        continue-on-error: true
        run: |
          npm audit --audit-level=low --json | tee audit-all.json || true

      # ---------------------------------------------------------------
      # Allowlist-aware gate. This is the real pass/fail step. It runs
      # for every detected manager, parses audit-prod.json with the
      # shared parser used by the SARIF converter, and lets specific
      # advisory IDs in .github/dependency-audit-allowlist.json waive
      # the gate until their `expires` date. Expired allowlist entries
      # surface as warnings so they get cleaned up.
      # ---------------------------------------------------------------
      - name: Apply audit allowlist gate
        id: gate
        if: always() && hashFiles('audit-prod.json') != ''
        env:
          AUDIT_LEVEL: ${{ env.AUDIT_LEVEL }}
        run: |
          set -euo pipefail
          case "${{ steps.detect.outputs.manager }}" in
            npm|bun-via-npm) gate_manager=npm ;;
            pnpm)            gate_manager=pnpm ;;
            yarn)
              flavour="classic"
              if [ -f yarn-flavour.txt ]; then flavour="$(cat yarn-flavour.txt)"; fi
              if [ "$flavour" = "berry" ]; then gate_manager=yarn-berry; else gate_manager=yarn-classic; fi
              ;;
            *) echo "::error::Unsupported manager for allowlist gate: ${{ steps.detect.outputs.manager }}"; exit 1 ;;
          esac
          node .github/workflows/scripts/apply-allowlist.mjs "$gate_manager" audit-prod.json .github/dependency-audit-allowlist.json "$AUDIT_LEVEL"

      # ---------------------------------------------------------------
      # Publish a dedicated GitHub Check Run for the dependency audit
      # so the PR's "Checks" sidebar shows the resolved AUDIT_LEVEL
      # and the number of findings that triggered the block, without
      # the reviewer having to expand the workflow run.
      #
      # The job itself already produces a check, but its title is
      # just the job name. This sibling check carries the severity
      # mapping in its title (e.g. "AUDIT_LEVEL=high — 3 blocking
      # (critical=1, high=2)") and a Markdown summary with the
      # per-severity table. Conclusion mirrors the gate verdict so
      # branch protection can require this check by name.
      #
      # Runs on `if: always()` so the check is published on both PASS
      # and FAIL outcomes. Skipped when the gate step did not run
      # (e.g. lockfile detection failed) because there is nothing
      # meaningful to report.
      # ---------------------------------------------------------------
      - name: Publish dependency audit check run
        if: always() && steps.gate.outcome != 'skipped' && steps.gate.outputs.audit_level != ''
        # actions/github-script@v7.0.1
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        env:
          GATE_AUDIT_LEVEL: ${{ steps.gate.outputs.audit_level }}
          GATE_MANAGER: ${{ steps.gate.outputs.manager }}
          GATE_HEADLINE: ${{ steps.gate.outputs.headline }}
          GATE_CONCLUSION: ${{ steps.gate.outputs.conclusion }}
          GATE_BLOCKING: ${{ steps.gate.outputs.blocking_count }}
          GATE_WAIVED: ${{ steps.gate.outputs.waived_count }}
          GATE_EXPIRED: ${{ steps.gate.outputs.expired_count }}
          GATE_BLOCKING_CRITICAL: ${{ steps.gate.outputs.blocking_critical }}
          GATE_BLOCKING_HIGH: ${{ steps.gate.outputs.blocking_high }}
          GATE_BLOCKING_MODERATE: ${{ steps.gate.outputs.blocking_moderate }}
          GATE_BLOCKING_LOW: ${{ steps.gate.outputs.blocking_low }}
          GATE_WAIVED_CRITICAL: ${{ steps.gate.outputs.waived_critical }}
          GATE_WAIVED_HIGH: ${{ steps.gate.outputs.waived_high }}
          GATE_WAIVED_MODERATE: ${{ steps.gate.outputs.waived_moderate }}
          GATE_WAIVED_LOW: ${{ steps.gate.outputs.waived_low }}
        with:
          script: |
            const env = process.env;
            const level = env.GATE_AUDIT_LEVEL;
            const manager = env.GATE_MANAGER;
            const blocking = parseInt(env.GATE_BLOCKING || '0', 10);
            const waived = parseInt(env.GATE_WAIVED || '0', 10);
            const expired = parseInt(env.GATE_EXPIRED || '0', 10);
            const conclusion = env.GATE_CONCLUSION === 'failure' ? 'failure' : 'success';
            const headline = env.GATE_HEADLINE || `AUDIT_LEVEL=${level} — ${blocking} blocking`;

            // Severities at or above the gate floor. Map matches
            // the order the script writes outputs in.
            const order = ['critical', 'high', 'moderate', 'low'];
            const rank = { low: 1, moderate: 2, high: 3, critical: 4 };
            const minRank = rank[level] || 3;
            const rows = order.map((sev) => {
              const above = rank[sev] >= minRank;
              const b = parseInt(env[`GATE_BLOCKING_${sev.toUpperCase()}`] || '0', 10);
              const w = parseInt(env[`GATE_WAIVED_${sev.toUpperCase()}`] || '0', 10);
              return `| ${sev} | ${b} | ${w} | ${above ? 'yes' : 'no'} |`;
            });

            const summary = [
              `**Manager:** \`${manager}\``,
              `**Threshold:** \`AUDIT_LEVEL=${level}\``,
              `**Blocking:** ${blocking}  ·  **Waived:** ${waived}  ·  **Expired allowlist entries:** ${expired}`,
              '',
              '| Severity | Blocking | Waived | At or above gate |',
              '| --- | ---: | ---: | :---: |',
              ...rows,
              '',
              blocking > 0
                ? 'Add a time-boxed entry in `.github/dependency-audit-allowlist.json` to waive a finding while a fix is in flight.'
                : 'No findings at or above the configured threshold.',
            ].join('\n');

            const { owner, repo } = context.repo;
            // Use the head SHA of the PR when available so the check
            // attaches to the PR branch instead of the merge commit.
            const head_sha = context.payload.pull_request
              ? context.payload.pull_request.head.sha
              : context.sha;

            await github.rest.checks.create({
              owner,
              repo,
              name: `Dependency audit (AUDIT_LEVEL=${level})`,
              head_sha,
              status: 'completed',
              conclusion,
              output: {
                title: headline,
                summary,
              },
            });
            core.info(`Published check run: ${headline} (${conclusion}).`);

      # ---------------------------------------------------------------
      # Upsert a PR comment summarising the audit. Sticky via the
      # marker embedded in audit-comment.md, so repeat runs replace
      # the previous summary instead of stacking new comments.
      #
      # Runs with `if: always()` so the comment lands on both PASS
      # and FAIL outcomes, giving reviewers a single place to see
      # exactly which advisories tripped the threshold and which are
      # waived. Restricted to pull_request events because the
      # GITHUB_TOKEN cannot post issue comments on push or schedule.
      # ---------------------------------------------------------------
      - name: Post audit summary as PR comment
        if: always() && github.event_name == 'pull_request' && hashFiles('audit-comment.md') != ''
        # actions/github-script@v7.0.1
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('audit-comment.md', 'utf8');
            const marker = '<!-- mimmobook:dependency-audit-comment -->';
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              core.info(`Updated existing audit comment ${existing.id}.`);
            } else {
              const { data: created } = await github.rest.issues.createComment({ owner, repo, issue_number, body });
              core.info(`Created audit comment ${created.id}.`);
            }

      - name: Upload audit reports
        if: always()
        # actions/upload-artifact@v4.4.3
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: dependency-audit-reports-${{ steps.detect.outputs.manager }}
          path: |
            audit-prod.json
            audit-all.json
            npm-audit.sarif
            pnpm-audit.sarif
            yarn-audit.sarif
            audit-comment.md
          if-no-files-found: ignore
          retention-days: 14

      # ---------------------------------------------------------------
      # SARIF emission for GitHub code scanning.
      #
      # Why we do this here instead of relying on Dependabot alerts:
      # SARIF uploads surface advisories inline on the PR's "Files
      # changed" tab and in the Security tab, with one entry per
      # vulnerable package and a stable rule id (`<advisory-id>` from
      # the GitHub Advisory Database). That is materially better PR
      # signal than the JSON artifact alone, especially when the
      # `Run npm audit` gate above has already failed and a reviewer
      # wants to see WHICH package is the culprit without unzipping
      # the artifact.
      #
      # `audit-all.json` is the broader (low+) scan that runs with
      # `if: always()`, so it exists even when the gate failed. We
      # convert it inline with `node -e` (no extra dep) into the
      # minimal SARIF 2.1.0 shape that code-scanning accepts.
      # `continue-on-error` on the upload prevents a SARIF parse
      # mishap from masking the real audit verdict above.
      # ---------------------------------------------------------------
      # All managers feed audit-all.json into the same converter
      # script (.github/workflows/scripts/audit-to-sarif.mjs) which
      # normalises the manager-specific JSON shapes into a single
      # SARIF 2.1.0 document. Each manager uploads under a distinct
      # `category` so code-scanning keeps per-manager runs separate
      # and does not clobber prior alerts when the resolved manager
      # changes between runs.
      - name: Convert npm audit JSON to SARIF
        if: always() && (steps.detect.outputs.manager == 'npm' || steps.detect.outputs.manager == 'bun-via-npm')
        run: node .github/workflows/scripts/audit-to-sarif.mjs npm audit-all.json npm-audit.sarif package-lock.json

      # Pre-flight SARIF health check. Fails the step (and therefore
      # skips the upload below via hashFiles+success() guarding) if
      # the produced file is not valid SARIF 2.1.0. Without this the
      # only signal would be a confusing 4xx from the code-scanning
      # API after the fact, and the artifact would still get
      # uploaded with the broken file.
      - name: Validate npm SARIF
        id: validate_npm_sarif
        if: always() && (steps.detect.outputs.manager == 'npm' || steps.detect.outputs.manager == 'bun-via-npm') && hashFiles('npm-audit.sarif') != ''
        run: node .github/workflows/scripts/validate-sarif.mjs npm-audit.sarif

      - name: Upload npm SARIF to GitHub code scanning
        if: always() && (steps.detect.outputs.manager == 'npm' || steps.detect.outputs.manager == 'bun-via-npm') && hashFiles('npm-audit.sarif') != '' && steps.validate_npm_sarif.outcome == 'success'
        continue-on-error: true
        # github/codeql-action/upload-sarif@v3.27.5
        uses: github/codeql-action/upload-sarif@f09c1c0a94de965c15400f5634aa42fac8fb8f88
        with:
          sarif_file: npm-audit.sarif
          category: npm-audit

      - name: Convert pnpm audit JSON to SARIF
        if: always() && steps.detect.outputs.manager == 'pnpm'
        run: node .github/workflows/scripts/audit-to-sarif.mjs pnpm audit-all.json pnpm-audit.sarif pnpm-lock.yaml

      - name: Validate pnpm SARIF
        id: validate_pnpm_sarif
        if: always() && steps.detect.outputs.manager == 'pnpm' && hashFiles('pnpm-audit.sarif') != ''
        run: node .github/workflows/scripts/validate-sarif.mjs pnpm-audit.sarif

      - name: Upload pnpm SARIF to GitHub code scanning
        if: always() && steps.detect.outputs.manager == 'pnpm' && hashFiles('pnpm-audit.sarif') != '' && steps.validate_pnpm_sarif.outcome == 'success'
        continue-on-error: true
        # github/codeql-action/upload-sarif@v3.27.5
        uses: github/codeql-action/upload-sarif@f09c1c0a94de965c15400f5634aa42fac8fb8f88
        with:
          sarif_file: pnpm-audit.sarif
          category: pnpm-audit

      - name: Convert yarn audit JSON to SARIF
        if: always() && steps.detect.outputs.manager == 'yarn'
        run: |
          set -euo pipefail
          flavour="classic"
          if [ -f yarn-flavour.txt ]; then
            flavour="$(cat yarn-flavour.txt)"
          fi
          if [ "$flavour" = "berry" ]; then
            node .github/workflows/scripts/audit-to-sarif.mjs yarn-berry audit-all.json yarn-audit.sarif yarn.lock
          else
            node .github/workflows/scripts/audit-to-sarif.mjs yarn-classic audit-all.json yarn-audit.sarif yarn.lock
          fi

      - name: Validate yarn SARIF
        id: validate_yarn_sarif
        if: always() && steps.detect.outputs.manager == 'yarn' && hashFiles('yarn-audit.sarif') != ''
        run: node .github/workflows/scripts/validate-sarif.mjs yarn-audit.sarif

      - name: Upload yarn SARIF to GitHub code scanning
        if: always() && steps.detect.outputs.manager == 'yarn' && hashFiles('yarn-audit.sarif') != '' && steps.validate_yarn_sarif.outcome == 'success'
        continue-on-error: true
        # github/codeql-action/upload-sarif@v3.27.5
        uses: github/codeql-action/upload-sarif@f09c1c0a94de965c15400f5634aa42fac8fb8f88
        with:
          sarif_file: yarn-audit.sarif
          category: yarn-audit

