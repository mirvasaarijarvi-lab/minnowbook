name: Dependency audit

# Runs a software-composition-analysis (SCA) scan on every pull
# request and blocks merge when any vulnerability at or above the
# configured severity threshold is found.
#
# How this blocks Dependabot auto-merge:
#   The Dependabot auto-merge workflow uses `gh pr merge --auto`,
#   which waits for ALL required status checks (configured under
#   branch protection) to go green before actually merging. As long
#   as "Dependency audit / dependency-audit" is listed as a required
#   check on the default branch, a failing audit run here will hold
#   the PR open even after Dependabot has approved auto-merge.
#
# Severity threshold:
#   AUDIT_LEVEL controls the minimum severity that fails the job.
#   `high` means: fail on any high or critical advisory, ignore
#   moderate / low / info. Bump to `moderate` once the project is at
#   zero high+critical to ratchet protection upwards.
#
# Lockfile-aware:
#   The job auto-detects which package manager owns the resolved
#   dependency graph (pnpm > yarn > npm > bun) and runs that
#   manager's native audit. This avoids gaps where, for example, a
#   repo migrating to pnpm would otherwise have its npm-only audit
#   scan a stale package-lock.json. Only one audit runs per job so
#   the gate result is unambiguous.

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    paths:
      - "package.json"
      - "package-lock.json"
      - "bun.lock"
      - "pnpm-lock.yaml"
      - "yarn.lock"
      - ".github/workflows/dependency-audit.yml"
  push:
    branches: [main]
  schedule:
    # Daily catch-all so newly published advisories are caught even
    # without dependency churn in the repo.
    - cron: "17 6 * * *"
  workflow_dispatch:
    inputs:
      audit_level:
        description: "Minimum severity that fails the job (low | moderate | high | critical)."
        required: false
        default: ""
        type: choice
        options:
          - ""
          - low
          - moderate
          - high
          - critical

permissions: {}

concurrency:
  group: dependency-audit-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------
# Severity threshold resolution (highest priority first):
#   1. workflow_dispatch input `audit_level` (manual one-off override)
#   2. repository / environment variable `AUDIT_LEVEL` (long-lived
#      project default, set under Settings > Secrets and variables >
#      Actions > Variables, no code change required)
#   3. hardcoded fallback `high`
#
# This lets the team temporarily relax the gate to `critical` only
# (e.g. during a known-vulnerable transitive that ships a fix in N
# days) without editing the workflow, and ratchet it back up to
# `moderate` once the project is clean, again without a PR.
# ---------------------------------------------------------------
env:
  AUDIT_LEVEL: ${{ inputs.audit_level != '' && inputs.audit_level || vars.AUDIT_LEVEL || 'high' }}

jobs:
  audit:
    name: dependency-audit
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
      # Required so the SARIF upload step at the end of the job can
      # publish findings to GitHub code scanning, where they render
      # inline on PRs and feed into the security tab.
      security-events: write
    steps:
      - name: Checkout
        # actions/checkout@v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      # ---------------------------------------------------------------
      # Validate the resolved AUDIT_LEVEL up front so a typo in the
      # repo variable (e.g. "High", "med") does not silently get
      # forwarded to npm/pnpm/yarn audit, which would either reject it
      # with a confusing error mid-run or, worse, default to a more
      # permissive level. We pin the allow-list here.
      # ---------------------------------------------------------------
      - name: Validate audit severity threshold
        run: |
          set -euo pipefail
          case "${AUDIT_LEVEL:-}" in
            low|moderate|high|critical)
              echo "Using audit severity threshold: $AUDIT_LEVEL"
              ;;
            *)
              echo "::error title=Invalid AUDIT_LEVEL::AUDIT_LEVEL='${AUDIT_LEVEL:-<empty>}' is not one of: low, moderate, high, critical. Set repo variable AUDIT_LEVEL or rerun via workflow_dispatch with a valid value."
              exit 1
              ;;
          esac

      # ---------------------------------------------------------------
      # Detect which package manager owns the dependency graph based on
      # the lockfile that is present. This avoids gaps where a repo
      # ships, say, a pnpm-lock.yaml that npm audit would silently
      # ignore (npm audit refuses to run without a package-lock.json
      # and would otherwise print a confusing error and fail open).
      # Precedence is "most authoritative for the resolved graph
      # first": pnpm > yarn > npm > bun. We never run two audits, the
      # detected manager owns the gate so the result is unambiguous.
      # ---------------------------------------------------------------
      - name: Detect package manager from lockfile
        id: detect
        run: |
          set -euo pipefail
          if [ -f pnpm-lock.yaml ]; then
            echo "manager=pnpm" >> "$GITHUB_OUTPUT"
            echo "lockfile=pnpm-lock.yaml" >> "$GITHUB_OUTPUT"
          elif [ -f yarn.lock ]; then
            echo "manager=yarn" >> "$GITHUB_OUTPUT"
            echo "lockfile=yarn.lock" >> "$GITHUB_OUTPUT"
          elif [ -f package-lock.json ]; then
            echo "manager=npm" >> "$GITHUB_OUTPUT"
            echo "lockfile=package-lock.json" >> "$GITHUB_OUTPUT"
          elif [ -f bun.lock ] || [ -f bun.lockb ]; then
            # Bun has no first-party audit. We fall through to npm by
            # generating a package-lock.json on the fly so we never
            # silently skip the SCA gate just because the repo runs on
            # bun in dev. The generated lockfile is throwaway.
            echo "manager=bun-via-npm" >> "$GITHUB_OUTPUT"
            echo "lockfile=bun.lock" >> "$GITHUB_OUTPUT"
          else
            echo "::error title=No lockfile found::Cannot run a dependency audit because no supported lockfile is present (pnpm-lock.yaml, yarn.lock, package-lock.json, bun.lock)."
            exit 1
          fi
          echo "Detected package manager: $(cat "$GITHUB_OUTPUT" | grep '^manager=' | cut -d= -f2)"

      - name: Set up Node.js
        # actions/setup-node@v4.1.0
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: "20"
          # Use the manager-specific cache key only when npm owns the
          # lockfile. For pnpm / yarn we let their own setup actions
          # handle caching below.
          cache: ${{ steps.detect.outputs.manager == 'npm' && 'npm' || '' }}

      # ---------------------------------------------------------------
      # pnpm path. `pnpm audit --prod --audit-level=high --json` exits
      # non-zero on any advisory at or above the threshold, mirroring
      # `npm audit` semantics so the gate behaves identically.
      # ---------------------------------------------------------------
      - name: Set up pnpm
        if: steps.detect.outputs.manager == 'pnpm'
        # pnpm/action-setup@v4.0.0
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2
        with:
          run_install: false

      - name: Run pnpm audit (production deps)
        if: steps.detect.outputs.manager == 'pnpm'
        env:
          AUDIT_LEVEL: ${{ env.AUDIT_LEVEL }}
        run: |
          set -o pipefail
          pnpm audit --prod --audit-level "$AUDIT_LEVEL" --json \
            | tee audit-prod.json
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo "::error title=Vulnerable production dependency::pnpm audit found one or more advisories at severity '$AUDIT_LEVEL' or higher in production dependencies."
            exit "$status"
          fi

      - name: Run pnpm audit (all deps, informational)
        if: always() && steps.detect.outputs.manager == 'pnpm'
        continue-on-error: true
        run: pnpm audit --json | tee audit-all.json || true

      # ---------------------------------------------------------------
      # yarn path. `yarn npm audit` (Berry) and `yarn audit` (classic)
      # both honour --severity. We pick the right one by sniffing the
      # yarn version reported by the installed CLI.
      # ---------------------------------------------------------------
      - name: Run yarn audit (production deps)
        if: steps.detect.outputs.manager == 'yarn'
        env:
          AUDIT_LEVEL: ${{ env.AUDIT_LEVEL }}
        run: |
          set -o pipefail
          yarn_version="$(yarn --version || echo 1.0.0)"
          major="${yarn_version%%.*}"
          if [ "$major" -ge 2 ]; then
            yarn npm audit --environment production --severity "$AUDIT_LEVEL" --json \
              | tee audit-prod.json
          else
            yarn audit --groups dependencies --level "$AUDIT_LEVEL" --json \
              | tee audit-prod.json
          fi
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo "::error title=Vulnerable production dependency::yarn audit found one or more advisories at severity '$AUDIT_LEVEL' or higher in production dependencies."
            exit "$status"
          fi

      # ---------------------------------------------------------------
      # npm path (and the bun fallback that synthesises a package-lock).
      # ---------------------------------------------------------------
      - name: Synthesise package-lock.json from bun lockfile
        if: steps.detect.outputs.manager == 'bun-via-npm' && hashFiles('package-lock.json') == ''
        run: |
          # `npm install --package-lock-only` resolves the graph from
          # package.json without touching node_modules, giving npm
          # audit a lockfile to scan. Safe because we never publish
          # this file from CI.
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      # ---------------------------------------------------------------
      # Lockfile freshness guard. A stale package-lock.json means npm
      # audit is scanning yesterday's dependency graph, so a brand-new
      # advisory against a freshly bumped package can slip through. We
      # regenerate the lockfile from package.json and fail the job if
      # the on-disk file would change. This runs only when npm owns
      # the gate (the bun-via-npm path already regenerated above).
      # ---------------------------------------------------------------
      - name: Verify package-lock.json is in sync with package.json
        if: steps.detect.outputs.manager == 'npm'
        run: |
          set -euo pipefail
          if [ ! -f package-lock.json ]; then
            echo "::error file=package-lock.json::package-lock.json is missing from the checkout. Regenerate locally with 'npm install --package-lock-only --ignore-scripts' and commit the result."
            exit 1
          fi
          # Snapshot the committed lockfile so we can diff after the
          # regenerate step rewrites it in place.
          cp package-lock.json package-lock.committed.json
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund
          if ! diff -q package-lock.committed.json package-lock.json >/dev/null; then
            echo "::error file=package-lock.json::package-lock.json is out of sync with package.json. The dependency-audit gate would scan a stale graph."
            echo "Fix locally with: npm install --package-lock-only --ignore-scripts && git add package-lock.json"
            diff -u package-lock.committed.json package-lock.json | head -200 || true
            exit 1
          fi
          echo "package-lock.json is in sync with package.json."
          rm -f package-lock.committed.json


      - name: Run npm audit (production deps)
        if: steps.detect.outputs.manager == 'npm' || steps.detect.outputs.manager == 'bun-via-npm'
        id: npm_audit
        env:
          AUDIT_LEVEL: ${{ env.AUDIT_LEVEL }}
        run: |
          set -o pipefail
          # `--omit=dev` keeps the gate focused on what actually ships
          # to production. A separate informational step below scans
          # devDependencies without failing the job.
          npm audit --omit=dev --audit-level="$AUDIT_LEVEL" --json \
            | tee audit-prod.json
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo "::error title=Vulnerable production dependency::npm audit found one or more advisories at severity '$AUDIT_LEVEL' or higher in production dependencies. See the audit-prod.json artifact for details."
            exit "$status"
          fi

      - name: Run npm audit (all deps, informational)
        if: (steps.detect.outputs.manager == 'npm' || steps.detect.outputs.manager == 'bun-via-npm') && always()
        continue-on-error: true
        run: |
          npm audit --audit-level=low --json | tee audit-all.json || true

      - name: Upload audit reports
        if: always()
        # actions/upload-artifact@v4.4.3
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: dependency-audit-reports-${{ steps.detect.outputs.manager }}
          path: |
            audit-prod.json
            audit-all.json
          if-no-files-found: ignore
          retention-days: 14

      # ---------------------------------------------------------------
      # SARIF emission for GitHub code scanning.
      #
      # Why we do this here instead of relying on Dependabot alerts:
      # SARIF uploads surface advisories inline on the PR's "Files
      # changed" tab and in the Security tab, with one entry per
      # vulnerable package and a stable rule id (`<advisory-id>` from
      # the GitHub Advisory Database). That is materially better PR
      # signal than the JSON artifact alone, especially when the
      # `Run npm audit` gate above has already failed and a reviewer
      # wants to see WHICH package is the culprit without unzipping
      # the artifact.
      #
      # `audit-all.json` is the broader (low+) scan that runs with
      # `if: always()`, so it exists even when the gate failed. We
      # convert it inline with `node -e` (no extra dep) into the
      # minimal SARIF 2.1.0 shape that code-scanning accepts.
      # `continue-on-error` on the upload prevents a SARIF parse
      # mishap from masking the real audit verdict above.
      # ---------------------------------------------------------------
      - name: Convert npm audit JSON to SARIF
        if: always() && (steps.detect.outputs.manager == 'npm' || steps.detect.outputs.manager == 'bun-via-npm')
        run: |
          set -euo pipefail
          if [ ! -s audit-all.json ]; then
            echo "audit-all.json missing or empty, skipping SARIF conversion."
            exit 0
          fi
          node --input-type=module -e '
            import fs from "node:fs";
            const raw = fs.readFileSync("audit-all.json", "utf8");
            let report;
            try { report = JSON.parse(raw); } catch { report = {}; }
            const vulns = report.vulnerabilities || {};

            // npm severity to SARIF level mapping. Critical and high
            // surface as "error" so they are visually loud on the PR.
            const sevToLevel = {
              critical: "error",
              high: "error",
              moderate: "warning",
              low: "note",
              info: "note",
            };

            const rules = new Map();
            const results = [];

            for (const [pkgName, info] of Object.entries(vulns)) {
              const via = Array.isArray(info.via) ? info.via : [];
              for (const v of via) {
                // `via` entries are either advisory objects or names of
                // upstream vulnerable packages. We only emit a SARIF
                // result for the advisory objects.
                if (typeof v !== "object" || v === null) continue;
                const ruleId = String(v.source ?? v.url ?? `${pkgName}:${v.title ?? "unknown"}`);
                const severity = String(v.severity || info.severity || "info").toLowerCase();
                const level = sevToLevel[severity] || "note";
                const title = String(v.title || `Vulnerability in ${pkgName}`);
                const url = String(v.url || `https://github.com/advisories/${ruleId}`);

                if (!rules.has(ruleId)) {
                  rules.set(ruleId, {
                    id: ruleId,
                    name: title.replace(/[^A-Za-z0-9_]/g, "_").slice(0, 80) || "advisory",
                    shortDescription: { text: title.slice(0, 120) },
                    fullDescription: { text: title },
                    helpUri: url,
                    help: { text: `${title}\nSee: ${url}`, markdown: `**${title}**\n\nSee: [${url}](${url})` },
                    defaultConfiguration: { level },
                    properties: { "security-severity": ({ critical: "9.5", high: "8.0", moderate: "5.5", low: "3.5", info: "1.0" })[severity] || "1.0", tags: ["security", "dependency", severity] },
                  });
                }

                results.push({
                  ruleId,
                  level,
                  message: { text: `${pkgName}: ${title} (range ${v.range || "unknown"})` },
                  locations: [{
                    physicalLocation: {
                      artifactLocation: { uri: "package-lock.json" },
                      region: { startLine: 1 },
                    },
                  }],
                  partialFingerprints: { advisory: ruleId, package: pkgName },
                });
              }
            }

            const sarif = {
              $schema: "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
              version: "2.1.0",
              runs: [{
                tool: {
                  driver: {
                    name: "npm-audit",
                    informationUri: "https://docs.npmjs.com/cli/v10/commands/npm-audit",
                    version: "1.0",
                    rules: Array.from(rules.values()),
                  },
                },
                results,
              }],
            };
            fs.writeFileSync("npm-audit.sarif", JSON.stringify(sarif));
            console.log(`Wrote npm-audit.sarif with ${results.length} result(s) across ${rules.size} rule(s).`);
          '

      - name: Upload SARIF to GitHub code scanning
        if: always() && (steps.detect.outputs.manager == 'npm' || steps.detect.outputs.manager == 'bun-via-npm') && hashFiles('npm-audit.sarif') != ''
        continue-on-error: true
        # github/codeql-action/upload-sarif@v3.27.5
        uses: github/codeql-action/upload-sarif@f09c1c0a94de965c15400f5634aa42fac8fb8f88
        with:
          sarif_file: npm-audit.sarif
          category: npm-audit

