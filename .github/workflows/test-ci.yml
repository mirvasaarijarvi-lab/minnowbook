name: Test CI (test:ci)

# Runs the full `npm run test:ci` pipeline (Vitest unit tests, Deno edge
# function tests, and Playwright e2e tests) on every push and pull request
# against main. The script itself lives in scripts/test-ci.sh and fails
# fast on the first failing suite.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  test-ci:
    name: npm run test:ci
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      # Required by the Deno edge function tests. SUPABASE_URL falls back to
      # VITE_SUPABASE_URL inside scripts/test-ci.sh, but we set it explicitly
      # here so the precheck has a clear value.
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      # Pin Deno's module cache so actions/cache can restore it across runs.
      DENO_DIR: ${{ github.workspace }}/.deno-cache


    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # Fail fast (before expensive Bun install / Playwright browser
      # download / Vite build) when the Supabase secrets that the Deno
      # edge function tests need aren't wired up. scripts/test-ci.sh
      # also re-validates these right before invoking deno, but doing
      # it here means a misconfigured fork or a rotated/missing secret
      # surfaces in seconds with a clear message instead of ~5 minutes
      # in.
      - name: Validate required Supabase env vars
        run: |
          # SUPABASE_URL falls back to VITE_SUPABASE_URL inside
          # scripts/test-ci.sh, so accept either here too.
          effective_url="${SUPABASE_URL:-${VITE_SUPABASE_URL:-}}"
          missing=()
          if [ -z "$effective_url" ]; then
            missing+=("SUPABASE_URL (or VITE_SUPABASE_URL)")
          fi
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            missing+=("SUPABASE_SERVICE_ROLE_KEY")
          fi
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error title=Missing Supabase secrets::The Deno edge function tests require the following secret(s) to be configured on this repository before test:ci can run:"
            for var in "${missing[@]}"; do
              echo "::error::  - $var"
            done
            echo "::error::Add them under Settings → Secrets and variables → Actions. SUPABASE_SERVICE_ROLE_KEY must be the service-role key from Lovable Cloud (Backend → API keys)."
            exit 1
          fi
          echo "Supabase env vars present (URL + service-role key). Proceeding."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v1.x

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve Playwright version
        id: pw
        run: |
          version=$(node -p "require('./node_modules/@playwright/test/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: |
          if [ "${{ steps.pw-cache.outputs.cache-hit }}" = "true" ]; then
            bunx playwright install-deps chromium
          else
            bunx playwright install --with-deps chromium
          fi

      - name: Build app (needed by Playwright preview server)
        run: bunx vite build

      - name: Lint (ESLint)
        run: bun run lint

      - name: Typecheck (tsc --noEmit)
        run: bunx tsc --noEmit

      - name: Run npm run test:ci
        run: npm run test:ci

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-ci-reports-run-${{ github.run_id }}
          path: |
            test-reports/
            playwright-report/
            test-results/
          if-no-files-found: warn
          retention-days: 14
