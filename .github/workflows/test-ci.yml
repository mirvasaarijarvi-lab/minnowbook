name: Test CI (test:ci)

# Runs the full `npm run test:ci` pipeline (Vitest unit tests, Deno edge
# function tests, and Playwright e2e tests) on every push and pull request
# against main. The script itself lives in scripts/test-ci.sh and fails
# fast on the first failing suite.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  test-ci:
    name: npm run test:ci
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      # Required by the Deno edge function tests. The project URL and
      # publishable key are safe public values, so keep CI runnable even when
      # repository secrets have not been configured yet.
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.VITE_SUPABASE_URL || 'https://lsgznskkxadplwnxplhd.supabase.co' }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL || 'https://lsgznskkxadplwnxplhd.supabase.co' }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || secrets.SUPABASE_PUBLISHABLE_KEY || secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxzZ3puc2treGFkcGx3bnhwbGhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5MTkyODAsImV4cCI6MjA4NzQ5NTI4MH0.v6DlzrUsFu_fpTIcWcSzz1Zyqbl_ZwF9v54TrW_yWtM' }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || secrets.SUPABASE_PUBLISHABLE_KEY || secrets.SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxzZ3puc2treGFkcGx3bnhwbGhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5MTkyODAsImV4cCI6MjA4NzQ5NTI4MH0.v6DlzrUsFu_fpTIcWcSzz1Zyqbl_ZwF9v54TrW_yWtM' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # Pin Deno's module cache so actions/cache can restore it across runs.
      DENO_DIR: ${{ github.workspace }}/.deno-cache


    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # Precheck Supabase secrets BEFORE the expensive Bun install /
      # Playwright browser download / Vite build, so a misconfigured fork
      # or a rotated/missing secret surfaces in seconds with a clear,
      # actionable message instead of ~5 minutes in.
      #
      # Behaviour matrix:
      #   * SUPABASE_URL (or VITE_SUPABASE_URL) is REQUIRED. Without it,
      #     no Deno edge test can hit the function endpoints at all, so
      #     we fail the job up front.
      #   * SUPABASE_SERVICE_ROLE_KEY is RECOMMENDED but not strictly
      #     required. When it's missing the Deno tests gracefully
      #     degrade:
      #       - the end-to-end "creates a pending reservation" test
      #         skips its DB-verification step;
      #       - the "no data leak when service role key missing" test
      #         runs in validate-only mode (sends an invalid payload
      #         that the function rejects with 400 before any insert);
      #       - the "validation-only request leaves row count unchanged"
      #         test is ignored because it needs the service role to
      #         issue an authoritative count query.
      #     We surface this as a ::warning:: + a GitHub step summary so
      #     reviewers know the suite ran in degraded mode.
      #   * Set REQUIRE_SERVICE_ROLE_KEY=1 in repo/org variables to
      #     promote the warning to a hard failure (recommended for the
      #     main branch's required check).
      - name: Validate required Supabase env vars
        env:
          REQUIRE_SERVICE_ROLE_KEY: ${{ vars.REQUIRE_SERVICE_ROLE_KEY }}
        run: |
          set -u
          effective_url="${SUPABASE_URL:-${VITE_SUPABASE_URL:-}}"
          summary="${GITHUB_STEP_SUMMARY:-/dev/stdout}"

          {
            echo "## Supabase env precheck"
            echo ""
          } >> "$summary"

          # ---- Critical: SUPABASE_URL ----
          if [ -z "$effective_url" ]; then
            echo "::error title=Missing Supabase URL::SUPABASE_URL (or VITE_SUPABASE_URL) is required for the Deno edge function tests. Add it under Settings → Secrets and variables → Actions."
            {
              echo "- ❌ **SUPABASE_URL** (or VITE_SUPABASE_URL): missing , cannot run any edge function test."
              echo ""
              echo "Add the secret under **Settings → Secrets and variables → Actions** and re-run the workflow."
            } >> "$summary"
            exit 1
          fi
          echo "- ✅ **SUPABASE_URL**: present"  >> "$summary"

          # ---- Recommended: SUPABASE_SERVICE_ROLE_KEY ----
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            {
              echo "- ⚠️ **SUPABASE_SERVICE_ROLE_KEY**: missing , Deno tests will run in **degraded mode**:"
              echo "    - End-to-end reservation test will skip the DB-verification step."
              echo "    - 'No data leak when service role key missing' test will run in validate-only mode (no insert)."
              echo "    - 'Validation-only request leaves row count unchanged' test will be ignored (needs service role for count)."
              echo ""
              echo "Add SUPABASE_SERVICE_ROLE_KEY under **Settings → Secrets and variables → Actions** to run the full suite. Use the service-role key from Lovable Cloud (Backend → API keys)."
            } >> "$summary"

            if [ "${REQUIRE_SERVICE_ROLE_KEY:-0}" = "1" ]; then
              echo "::error title=Missing service-role key::SUPABASE_SERVICE_ROLE_KEY is missing and REQUIRE_SERVICE_ROLE_KEY=1 is set. Failing the job. See the step summary for the affected tests."
              exit 1
            fi

            echo "::warning title=Degraded test mode::SUPABASE_SERVICE_ROLE_KEY is not configured. Deno edge tests will skip cleanup/DB-verification and run validation-only fallbacks. Set REQUIRE_SERVICE_ROLE_KEY=1 in repo variables to make this a hard failure."
            echo "Supabase URL present; service-role key MISSING , proceeding in degraded mode."
            exit 0
          fi

          echo "- ✅ **SUPABASE_SERVICE_ROLE_KEY**: present" >> "$summary"
          echo "Supabase env vars present (URL + service-role key). Proceeding with the full suite."


      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v1.x

      - name: Cache Deno modules
        uses: actions/cache@v4
        with:
          path: ${{ env.DENO_DIR }}
          key: deno-${{ runner.os }}-${{ hashFiles('supabase/functions/**/*.ts', 'deno.json', 'deno.jsonc', 'deno.lock', 'import_map.json') }}
          restore-keys: |
            deno-${{ runner.os }}-

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve Playwright version
        id: pw
        run: |
          version=$(node -p "require('./node_modules/@playwright/test/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: |
          if [ "${{ steps.pw-cache.outputs.cache-hit }}" = "true" ]; then
            bunx playwright install-deps chromium
          else
            bunx playwright install --with-deps chromium
          fi

      - name: Build app (needed by Playwright preview server)
        run: bunx vite build

      - name: Lint (ESLint)
        run: bun run lint

      - name: Typecheck (tsc --noEmit)
        run: bunx tsc --noEmit

      - name: Run npm run test:ci
        run: npm run test:ci

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-ci-reports-run-${{ github.run_id }}
          path: |
            test-reports/
            playwright-report/
            test-results/
          if-no-files-found: warn
          retention-days: 14
