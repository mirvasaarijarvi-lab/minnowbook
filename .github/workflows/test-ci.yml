name: Test CI (test:ci)

# Runs the full `npm run test:ci` pipeline (Vitest unit tests, Deno edge
# function tests, and Playwright e2e tests) on every push and pull request
# against main. The script itself lives in scripts/test-ci.sh and fails
# fast on the first failing suite.

concurrency:
  # Only cancel an in-progress run when a NEW commit lands on the SAME PR
  # (github.head_ref is set on pull_request events). For pushes to main and
  # for workflow_dispatch we use github.run_id, which is unique per run, so
  # nothing ever cancels them mid-flight. This preserves trustworthy CI
  # history on protected branches while still avoiding wasted minutes when
  # a contributor force-pushes to their PR.
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  test-ci:
    name: npm run test:ci
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      # Required by the Deno edge function tests. All values are pulled from
      # repository secrets/variables; no inline fallbacks so no JWT-shaped
      # value is ever hardcoded in this workflow file (see security scanner
      # flag on the JWT pattern, even for the publishable anon key).
      # Configure these under Settings → Secrets and variables → Actions:
      #   - SUPABASE_URL (or VITE_SUPABASE_URL)
      #   - SUPABASE_ANON_KEY (or VITE_SUPABASE_PUBLISHABLE_KEY)
      #   - SUPABASE_SERVICE_ROLE_KEY (optional; enables full test suite)
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.VITE_SUPABASE_URL || vars.SUPABASE_URL || vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL || vars.VITE_SUPABASE_URL || vars.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || secrets.SUPABASE_PUBLISHABLE_KEY || secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || secrets.SUPABASE_PUBLISHABLE_KEY || secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # Pin Deno's module cache so actions/cache can restore it across runs.
      DENO_DIR: ${{ github.workspace }}/.deno-cache


    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      # Precheck Supabase secrets BEFORE the expensive Bun install /
      # Playwright browser download / Vite build, so a misconfigured fork
      # or a rotated/missing secret surfaces in seconds with a clear,
      # actionable message instead of ~5 minutes in.
      #
      # Behaviour matrix:
      #   * SUPABASE_URL (or VITE_SUPABASE_URL) is REQUIRED. Without it,
      #     no Deno edge test can hit the function endpoints at all, so
      #     we fail the job up front.
      #   * SUPABASE_SERVICE_ROLE_KEY is RECOMMENDED but not strictly
      #     required. When it's missing the Deno tests gracefully
      #     degrade:
      #       - the end-to-end "creates a pending reservation" test
      #         skips its DB-verification step;
      #       - the "no data leak when service role key missing" test
      #         runs in validate-only mode (sends an invalid payload
      #         that the function rejects with 400 before any insert);
      #       - the "validation-only request leaves row count unchanged"
      #         test is ignored because it needs the service role to
      #         issue an authoritative count query.
      #     We surface this as a ::warning:: + a GitHub step summary so
      #     reviewers know the suite ran in degraded mode.
      #   * Set REQUIRE_SERVICE_ROLE_KEY=1 in repo/org variables to
      #     promote the warning to a hard failure (recommended for the
      #     main branch's required check).
      - name: Validate required Supabase env vars
        env:
          REQUIRE_SERVICE_ROLE_KEY: ${{ vars.REQUIRE_SERVICE_ROLE_KEY }}
        run: |
          set -u
          effective_url="${SUPABASE_URL:-${VITE_SUPABASE_URL:-}}"
          summary="${GITHUB_STEP_SUMMARY:-/dev/stdout}"

          {
            echo "## Supabase env precheck"
            echo ""
          } >> "$summary"

          # ---- Critical: SUPABASE_URL ----
          if [ -z "$effective_url" ]; then
            echo "::error title=Missing Supabase URL::SUPABASE_URL (or VITE_SUPABASE_URL) is required for the Deno edge function tests. Add it under Settings → Secrets and variables → Actions."
            {
              echo "- ❌ **SUPABASE_URL** (or VITE_SUPABASE_URL): missing , cannot run any edge function test."
              echo ""
              echo "Add the secret under **Settings → Secrets and variables → Actions** and re-run the workflow."
            } >> "$summary"
            exit 1
          fi
          echo "- ✅ **SUPABASE_URL**: present"  >> "$summary"

          # ---- Recommended: SUPABASE_SERVICE_ROLE_KEY ----
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            {
              echo "- ⚠️ **SUPABASE_SERVICE_ROLE_KEY**: missing , Deno tests will run in **degraded mode**:"
              echo "    - End-to-end reservation test will skip the DB-verification step."
              echo "    - 'No data leak when service role key missing' test will run in validate-only mode (no insert)."
              echo "    - 'Validation-only request leaves row count unchanged' test will be ignored (needs service role for count)."
              echo ""
              echo "Add SUPABASE_SERVICE_ROLE_KEY under **Settings → Secrets and variables → Actions** to run the full suite. Use the service-role key from Lovable Cloud (Backend → API keys)."
            } >> "$summary"

            if [ "${REQUIRE_SERVICE_ROLE_KEY:-0}" = "1" ]; then
              echo "::error title=Missing service-role key::SUPABASE_SERVICE_ROLE_KEY is missing and REQUIRE_SERVICE_ROLE_KEY=1 is set. Failing the job. See the step summary for the affected tests."
              exit 1
            fi

            echo "::warning title=Degraded test mode::SUPABASE_SERVICE_ROLE_KEY is not configured. Deno edge tests will skip cleanup/DB-verification and run validation-only fallbacks. Set REQUIRE_SERVICE_ROLE_KEY=1 in repo variables to make this a hard failure."
            echo "Supabase URL present; service-role key MISSING , proceeding in degraded mode."
            exit 0
          fi

          echo "- ✅ **SUPABASE_SERVICE_ROLE_KEY**: present" >> "$summary"
          echo "Supabase env vars present (URL + service-role key). Proceeding with the full suite."


      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: ./.github/actions/setup-bun-with-diagnostics

      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v1.x

      - name: Cache Deno modules
        uses: actions/cache@v4
        with:
          path: ${{ env.DENO_DIR }}
          key: deno-${{ runner.os }}-${{ hashFiles('supabase/functions/**/*.ts', 'deno.json', 'deno.jsonc', 'deno.lock', 'import_map.json') }}
          restore-keys: |
            deno-${{ runner.os }}-

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Verify bun.lock is in sync with package.json
        uses: ./.github/actions/verify-bun-lockfile-sync

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve Playwright version
        id: pw
        run: |
          version=$(node -p "require('./node_modules/@playwright/test/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: |
          if [ "${{ steps.pw-cache.outputs.cache-hit }}" = "true" ]; then
            bunx playwright install-deps chromium
          else
            bunx playwright install --with-deps chromium
          fi

      - name: Build app (needed by Playwright preview server)
        run: bunx vite build

      - name: Lint (ESLint)
        run: bun run lint

      - name: Typecheck (tsc --noEmit)
        run: bunx tsc --noEmit

      # ---------------------------------------------------------------------
      # Split the previous monolithic `npm run test:ci` into discrete steps
      # so each suite emits a junit XML the rerun helper can parse between
      # attempts. Quarantined-flaky tests get exactly ONE deterministic
      # rerun; non-quarantined failures still fail the job immediately.
      # The quarantine manifest lives in `.github/flaky-tests.json` and is
      # validated up-front by the hygiene check below.
      # ---------------------------------------------------------------------

      - name: Quarantine manifest hygiene
        # Runs FIRST so a malformed/expired manifest is loud and fast,
        # before the suites even start. Failure here is a real regression
        # (a stale quarantine entry is worse than no quarantine).
        run: node scripts/ci/check-quarantine.mjs

      # Probe /auth/v1/health AND /rest/v1/ before vitest runs. ~130 of the
      # `src/test/security/*.test.ts` cases open an anon Supabase client at
      # module load and each one hits a 5s testTimeout if PostgREST is down,
      # which silently burns ~10 minutes with no actionable signal. Failing
      # fast here surfaces the real cause (project paused, egress block,
      # rest layer restarting) at the top of the log.
      - name: Supabase reachability preflight
        env:
          PREFLIGHT_URL: ${{ env.VITE_SUPABASE_URL }}
          PREFLIGHT_KEY: ${{ env.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          set -u
          if [ -z "${PREFLIGHT_URL:-}" ] || [ -z "${PREFLIGHT_KEY:-}" ]; then
            echo "::warning::Skipping reachability preflight (URL or anon key not exported)."
            exit 0
          fi
          base="${PREFLIGHT_URL%/}"
          auth_status=$(curl -m 10 -sS -o /dev/null -w "%{http_code}" \
            -H "apikey: $PREFLIGHT_KEY" "$base/auth/v1/health" || echo "000")
          rest_status=$(curl -m 10 -sS -o /dev/null -w "%{http_code}" \
            -H "apikey: $PREFLIGHT_KEY" \
            -H "Authorization: Bearer $PREFLIGHT_KEY" "$base/rest/v1/" || echo "000")
          echo "auth=$auth_status rest=$rest_status"
          auth_ok=0; rest_ok=0
          case "$auth_status" in 200|401) auth_ok=1 ;; esac
          case "$rest_status" in 200|401|404) rest_ok=1 ;; esac
          if [ "$auth_ok" = "1" ] && [ "$rest_ok" = "1" ]; then
            echo "✅ Supabase reachable (auth=$auth_status rest=$rest_status)"
            exit 0
          fi
          echo "::error title=Supabase unreachable::auth=$auth_status rest=$rest_status — live security suites would each hit 5s testTimeout. Check that the project is not paused and that the runner has egress to *.supabase.co."
          exit 1

      # Validate the SERVICE_ROLE_KEY against /rest/v1/. A stale/rotated
      # key returns 401 "Invalid API key" on every PostgREST call, which
      # makes the public-booking Deno tests (guarded by `ignore: !KEY`)
      # run AND cascade-fail with hard-to-diagnose 401s. If the key is
      # invalid we unset SUPABASE_SERVICE_ROLE_KEY for downstream steps
      # so the tests skip cleanly in degraded mode (matching the
      # already-documented "no key configured" path) and emit a loud
      # warning telling the operator to rotate the secret.
      - name: Validate SUPABASE_SERVICE_ROLE_KEY
        env:
          SR_URL: ${{ env.SUPABASE_URL }}
          SR_KEY: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -u
          if [ -z "${SR_KEY:-}" ]; then
            echo "ℹ️ No SUPABASE_SERVICE_ROLE_KEY set, downstream tests will run in degraded mode."
            exit 0
          fi
          base="${SR_URL%/}"
          code=$(curl -m 10 -sS -o /dev/null -w "%{http_code}" \
            -H "apikey: $SR_KEY" \
            -H "Authorization: Bearer $SR_KEY" \
            "$base/rest/v1/" || echo "000")
          echo "service-role probe -> $code"
          case "$code" in
            200|404)
              echo "✅ SUPABASE_SERVICE_ROLE_KEY is valid."
              ;;
            401|403)
              echo "::warning title=Stale SUPABASE_SERVICE_ROLE_KEY::PostgREST rejected the service-role key ($code Invalid API key). Treating as missing so guarded tests skip instead of cascade-failing. Rotate the secret under Settings → Secrets and variables → Actions."
              # Override the workflow-level env for ALL subsequent steps.
              echo "SUPABASE_SERVICE_ROLE_KEY=" >> "$GITHUB_ENV"
              ;;
            *)
              echo "::warning::Unexpected status $code probing service-role key, leaving it set."
              ;;
          esac


      - name: Vitest (initial)

        id: vitest
        env:
          SUPABASE_URL: ${{ env.SUPABASE_URL }}
          VITE_SUPABASE_URL: ${{ env.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ env.SUPABASE_ANON_KEY }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ env.VITE_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          mkdir -p test-reports/vitest
          bunx vitest run \
            --reporter=dot \
            --reporter=junit \
            --outputFile.junit=test-reports/vitest/junit.xml

      - name: Vitest (deterministic rerun of quarantined failures)
        if: failure() && steps.vitest.outcome == 'failure'
        env:
          SUPABASE_URL: ${{ env.SUPABASE_URL }}
          VITE_SUPABASE_URL: ${{ env.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ env.SUPABASE_ANON_KEY }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ env.VITE_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/ci/rerun-flaky.mjs --suite=vitest --junit=test-reports/vitest/junit.xml

      - name: Deno edge function tests
        # No rerun: these are deterministic, no flake history. If they fail
        # it's a real regression every time.
        if: success() || (failure() && steps.vitest.conclusion == 'success')
        env:
          SUPABASE_URL: ${{ env.SUPABASE_URL }}
          VITE_SUPABASE_URL: ${{ env.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          mkdir -p test-reports/deno
          deno test --allow-net --allow-env --allow-read \
            --junit-path=test-reports/deno/junit.xml \
            supabase/functions/

      - name: Playwright (initial)
        id: playwright
        env:
          SUPABASE_URL: ${{ env.SUPABASE_URL }}
          VITE_SUPABASE_URL: ${{ env.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ env.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: bunx playwright test

      - name: Playwright (deterministic rerun of quarantined failures)
        if: failure() && steps.playwright.outcome == 'failure'
        env:
          SUPABASE_URL: ${{ env.SUPABASE_URL }}
          VITE_SUPABASE_URL: ${{ env.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ env.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: node scripts/ci/rerun-flaky.mjs --suite=playwright --junit=test-reports/playwright/junit.xml

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-ci-reports-run-${{ github.run_id }}
          path: |
            test-reports/
            playwright-report/
            test-results/
            .github/flaky-tests.json
          if-no-files-found: warn
          retention-days: 14

