name: Live Reservation-Type Cap Tests

# Boots a real local Supabase stack (Postgres + PostgREST + Auth) and
# runs the end-to-end vitest suite in supabase/tests/integration/ that
# verifies the Professional 5-type cap through the same supabase-js
# network path the production app uses.
#
# This complements:
#   - .github/workflows/tier-trigger-tests.yml (raw psql trigger tests)
#   - src/lib/reservation-type-limit-api.regression.test.ts (mocked unit)
#
# When Docker is unavailable on the runner, the job emits a notice and
# exits 0 to avoid blocking PRs on infra issues.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  live-cap-tests:
    name: Reservation-type cap (live Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Detect Docker availability
        id: docker-check
        run: |
          set +e
          if ! command -v docker >/dev/null 2>&1 || ! docker info >/dev/null 2>&1; then
            echo "::notice::Docker unavailable, skipping live cap tests."
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        if: steps.docker-check.outputs.available == 'true'
        uses: ./.github/actions/setup-bun-with-diagnostics


      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}

      - name: Install dependencies
        if: steps.docker-check.outputs.available == 'true'
        run: |
          rm -rf node_modules
          bun install --frozen-lockfile

      - name: Setup Supabase CLI
        id: supabase-cli
        if: steps.docker-check.outputs.available == 'true'
        uses: supabase/setup-cli@b579fc8c7122aa485f1d947120eaeb11ee04d312 # v2.0.0
        with:
          version: latest
        continue-on-error: true

      - name: Skip if Supabase CLI unavailable
        if: steps.docker-check.outputs.available == 'true' && steps.supabase-cli.outcome != 'success'
        run: echo "::notice::Supabase CLI install failed, skipping."

      # Legacy seed migrations reference hardcoded production ids
      # (tenant, sites, staff user). We pre-create placeholder rows so
      # the seeds attach cleanly. IDs and rationale are documented in
      # docs/ci-placeholder-ids.md , keep this step in sync with the
      # equivalent step in tier-trigger-tests.yml and cross-tenant-rls-local.yml.
      - name: Inject placeholder tenant for local-only seed data
        if: steps.docker-check.outputs.available == 'true' && steps.supabase-cli.outcome == 'success'
        run: |
          set -euo pipefail
          cat > supabase/migrations/20260224082115_ci_placeholder_tenant.sql <<'SQL'
          -- Placeholder tenant owner
          INSERT INTO auth.users (id, instance_id, aud, role, email, encrypted_password, email_confirmed_at, created_at, updated_at)
          VALUES (
            '00000000-0000-0000-0000-0000000000c1',
            '00000000-0000-0000-0000-000000000000',
            'authenticated', 'authenticated',
            'ci-placeholder@example.invalid',
            crypt('ci-placeholder-password', gen_salt('bf')),
            now(), now(), now()
          )
          ON CONFLICT (id) DO NOTHING;

          -- Placeholder staff user referenced by legacy site_users seed
          INSERT INTO auth.users (id, instance_id, aud, role, email, encrypted_password, email_confirmed_at, created_at, updated_at)
          VALUES (
            'ea50e91e-5dbf-4dcc-a13c-f96c4016f952',
            '00000000-0000-0000-0000-000000000000',
            'authenticated', 'authenticated',
            'ci-placeholder-staff@example.invalid',
            crypt('ci-placeholder-password', gen_salt('bf')),
            now(), now(), now()
          )
          ON CONFLICT (id) DO NOTHING;

          -- GoTrue listUsers fails with "Database error finding users" when
          -- token columns are NULL. Normalize to empty strings.
          UPDATE auth.users SET
            confirmation_token = COALESCE(confirmation_token, ''),
            recovery_token = COALESCE(recovery_token, ''),
            email_change_token_new = COALESCE(email_change_token_new, ''),
            email_change = COALESCE(email_change, ''),
            phone_change = COALESCE(phone_change, ''),
            phone_change_token = COALESCE(phone_change_token, ''),
            email_change_token_current = COALESCE(email_change_token_current, ''),
            reauthentication_token = COALESCE(reauthentication_token, '')
          WHERE confirmation_token IS NULL
             OR recovery_token IS NULL
             OR email_change_token_new IS NULL
             OR email_change IS NULL
             OR phone_change IS NULL
             OR phone_change_token IS NULL
             OR email_change_token_current IS NULL
             OR reauthentication_token IS NULL;

          INSERT INTO public.tenants (id, name, slug, tier, is_active, subscription_status, owner_user_id)
          VALUES (
            '9ac05fbf-0834-44fd-a52a-d030b7074a30',
            'CI Placeholder Tenant',
            'ci-placeholder-tenant',
            'business', true, 'active',
            '00000000-0000-0000-0000-0000000000c1'
          )
          ON CONFLICT (id) DO NOTHING;

          SQL

          # Site placeholders must run AFTER the sites table is created
          # (migration 20260303093523_*) and BEFORE legacy seeds that
          # reference hardcoded site ids.
          cat > supabase/migrations/20260303093524_ci_placeholder_site.sql <<'SQL'
          INSERT INTO public.sites (id, tenant_id, name, slug, is_active)
          VALUES
            (
              'b040ab30-f4d2-45cc-8695-2000572428d7',
              '9ac05fbf-0834-44fd-a52a-d030b7074a30',
              'CI Placeholder Site',
              'ci-placeholder-site',
              true
            ),
            (
              '51fb4748-3b84-471a-b9a0-b5aac88191b9',
              '9ac05fbf-0834-44fd-a52a-d030b7074a30',
              'CI Placeholder Eventos Site',
              'ci-placeholder-eventos-site',
              true
            )
          ON CONFLICT (id) DO NOTHING;
          SQL

      # GitHub-hosted runners ship with a Postgres service bound to 5432
      # and may have leftover containers binding 54322. Free the Supabase
      # default ports before starting so we do not hit "address already in use".
      - name: Free Supabase ports
        if: steps.docker-check.outputs.available == 'true' && steps.supabase-cli.outcome == 'success'
        continue-on-error: true
        shell: bash {0}
        run: |
          # Best-effort port/container cleanup. Never fail the job from here;
          # downstream `supabase start` will surface real port conflicts with
          # actionable logs. Using `bash {0}` (no -e / no pipefail) so a
          # missing tool (e.g. lsof) or transient docker hiccup cannot abort
          # the job before we even try to boot Supabase.
          set +e

          PORTS="54321 54322 54323 54324 54327 54328"

          if ! command -v lsof >/dev/null 2>&1; then
            echo "lsof not installed, installing..."
            sudo apt-get install -y --no-install-recommends lsof 2>&1 || true
          fi

          # One full cleanup pass: host Postgres clusters, docker containers
          # publishing our ports, raw PID kill on holders, stale supabase_*
          # containers/volumes/networks. Idempotent so we can re-run it on
          # each retry attempt.
          cleanup_pass() {
            echo "::group::Stop host Postgres"
            sudo systemctl stop postgresql 2>&1 || true
            sudo service postgresql stop 2>&1 || true
            # GitHub runners ship versioned clusters (e.g. postgresql@14-main)
            # that don't always stop via the umbrella `postgresql` unit. Walk
            # every cluster and stop it explicitly.
            if command -v pg_lsclusters >/dev/null 2>&1; then
              pg_lsclusters -h 2>/dev/null | awk '{print $1" "$2}' | while read -r ver name; do
                [ -z "$ver" ] && continue
                echo "Stopping cluster ${ver}/${name}"
                sudo pg_ctlcluster "$ver" "$name" stop --force 2>&1 || true
              done
            fi
            echo "::endgroup::"

            echo "::group::Remove docker containers publishing Supabase ports"
            for port in $PORTS; do
              ids=$(docker ps -q --filter "publish=${port}" 2>/dev/null)
              if [ -n "$ids" ]; then
                echo "Removing containers publishing :${port}: $ids"
                echo "$ids" | xargs -r docker rm -f 2>&1 || true
              fi
            done
            echo "::endgroup::"

            echo "::group::Free Supabase ports (PID kill)"
            for port in $PORTS; do
              pids=$(sudo lsof -ti tcp:"$port" 2>/dev/null)
              if [ -n "$pids" ]; then
                echo "Killing PIDs on port $port: $pids"
                sudo kill -9 $pids 2>&1 || true
              fi
            done
            echo "::endgroup::"

            echo "::group::Remove stale supabase containers"
            stale=$(docker ps -aq --filter "name=supabase_" 2>/dev/null)
            if [ -n "$stale" ]; then
              echo "$stale" | xargs -r docker rm -f 2>&1 || true
            fi
            echo "::endgroup::"

            # Stale named volumes (supabase_db_*, supabase_storage_*, etc.)
            # keep Postgres datadirs alive across runs. If a previous run
            # crashed mid-boot, the leftover datadir can resurrect Postgres
            # the moment a new container attaches and pin :54322 before our
            # supabase start gets there. Prune them up front.
            echo "::group::Remove stale supabase docker volumes"
            stale_vols=$(docker volume ls -q --filter "name=supabase_" 2>/dev/null)
            if [ -n "$stale_vols" ]; then
              echo "Removing volumes:"
              echo "$stale_vols"
              echo "$stale_vols" | xargs -r docker volume rm -f 2>&1 || true
            else
              echo "(no supabase_* volumes found)"
            fi
            docker volume prune -f 2>&1 || true
            echo "::endgroup::"

            echo "::group::Remove stale supabase docker networks"
            stale_nets=$(docker network ls -q --filter "name=supabase_" 2>/dev/null)
            if [ -n "$stale_nets" ]; then
              echo "Removing networks:"
              docker network ls --filter "name=supabase_" --format '{{.ID}}\t{{.Name}}' 2>/dev/null || true
              echo "$stale_nets" | xargs -r -n1 docker network rm 2>&1 || true
            else
              echo "(no supabase_* networks found)"
            fi
            docker network prune -f 2>&1 || true
            echo "::endgroup::"
          }

          # Return 0 if every port in $PORTS is free, 1 otherwise. Prints
          # the still-occupied ports so each retry log is self-explanatory.
          ports_free() {
            local still=""
            for port in $PORTS; do
              if sudo lsof -nP -iTCP:"$port" -sTCP:LISTEN >/dev/null 2>&1; then
                still="${still} ${port}"
                continue
              fi
              # docker can publish a port without a userspace listener that
              # lsof sees from outside the netns; double-check via docker.
              if docker ps --format '{{.Ports}}' 2>/dev/null | grep -qE "[:.]${port}->"; then
                still="${still} ${port}"
              fi
            done
            if [ -n "$still" ]; then
              echo "Still occupied:${still}"
              return 1
            fi
            return 0
          }

          # Retry loop with exponential backoff (cap 30s) up to a 5 min
          # deadline. Each attempt: run the full cleanup pass, sleep, then
          # re-check. Stops early as soon as every port is free.
          DEADLINE=$(( $(date +%s) + 300 ))
          delay=2
          attempt=0
          while :; do
            attempt=$((attempt + 1))
            echo "::group::Cleanup attempt ${attempt}"
            cleanup_pass
            # Brief sleep so kernel can release sockets (TIME_WAIT) and
            # docker can finalize container teardown before we recheck.
            sleep "$delay"
            if ports_free; then
              echo "All Supabase ports free after ${attempt} attempt(s)."
              echo "::endgroup::"
              break
            fi
            echo "::endgroup::"
            now=$(date +%s)
            if [ "$now" -ge "$DEADLINE" ]; then
              echo "::warning::Ports still occupied after ${attempt} cleanup attempts (~5 min). Continuing; supabase start will retry and surface real conflicts."
              break
            fi
            # Exponential backoff: 2, 4, 8, 16, 30, 30, ...
            delay=$(( delay * 2 ))
            [ "$delay" -gt 30 ] && delay=30
            echo "Sleeping ${delay}s before next cleanup attempt..."
          done

          # Always succeed; downstream supabase start is the authoritative gate.
          exit 0



      # After best-effort cleanup, verify the Supabase ports are actually
      # free. If anything is still bound, fail HERE with a clear, actionable
      # listing rather than letting `supabase start` die with an opaque
      # "address already in use" error several minutes later.
      # Diagnostic-only: log which Supabase ports are still bound after
      # the best-effort cleanup, but DO NOT fail the job. `supabase start`
      # below retries with exponential backoff for ~10 minutes and prints
      # the real conflict (with PID + container info) when it can't bind,
      # which is a far more actionable signal than a 25s preflight abort.
      # Aborting here was producing false negatives whenever a transient
      # holder (e.g. an unrelated docker container with an overlapping
      # publish range) showed up between the cleanup and this check.
      - name: Verify Supabase ports are free
        if: steps.docker-check.outputs.available == 'true' && steps.supabase-cli.outcome == 'success'
        continue-on-error: true
        shell: bash {0}
        run: |
          set +e
          PORTS="54321 54322 54323 54324 54327 54328"
          if ! command -v lsof >/dev/null 2>&1; then
            sudo apt-get install -y --no-install-recommends lsof >/dev/null 2>&1 || true
          fi

          occupied=""
          declare -A HOLDER_PROCS=()

          echo "::group::Port availability check (diagnostic only)"
          for port in $PORTS; do
            holders=$(sudo lsof -nP -iTCP:"$port" -sTCP:LISTEN 2>/dev/null)
            docker_holders=$(docker ps --format '{{.ID}}\t{{.Names}}\t{{.Image}}\t{{.Ports}}' 2>/dev/null | grep -E "[:.]${port}->")
            if [ -n "$holders" ] || [ -n "$docker_holders" ]; then
              echo "Port ${port}: OCCUPIED"
              if [ -n "$holders" ]; then
                echo "----- lsof -----"
                echo "$holders"
                # Collect PIDs so we can drill into each holder below.
                pids=$(echo "$holders" | awk 'NR>1 {print $2}' | sort -u | tr '\n' ' ')
                HOLDER_PROCS[$port]="$pids"
              fi
              echo "----- ss -lntp -----"
              sudo ss -lntp "sport = :$port" 2>&1 || true
              echo "----- fuser -----"
              sudo fuser -v "${port}/tcp" 2>&1 || true
              echo "----- docker containers publishing :${port} -----"
              if [ -n "$docker_holders" ]; then
                echo "$docker_holders"
              else
                echo "(none)"
              fi
              occupied="${occupied} ${port}"
            else
              echo "Port ${port}: free"
            fi
          done
          echo "::endgroup::"

          if [ -z "$occupied" ]; then
            echo "All Supabase ports are free."
            exit 0
          fi

          echo "::warning::Supabase ports still showing as occupied after cleanup:${occupied}. Continuing; supabase start will retry and surface real conflicts."

          # ---- Detailed diagnostics dump (only on occupied) ----
          echo "::group::Holder process details (ps + status + cmdline + open files)"
          all_pids=$(printf '%s\n' "${HOLDER_PROCS[@]}" | tr ' ' '\n' | sed '/^$/d' | sort -u)
          if [ -n "$all_pids" ]; then
            for pid in $all_pids; do
              echo "----- PID ${pid} -----"
              ps -o pid,ppid,user,etime,pcpu,pmem,stat,command -p "$pid" 2>&1 || true
              if [ -r "/proc/${pid}/status" ]; then
                echo "  cgroup: $(cat /proc/${pid}/cgroup 2>/dev/null | head -3)"
                echo "  cmdline: $(tr '\0' ' ' </proc/${pid}/cmdline 2>/dev/null)"
              fi
              # If this PID actually belongs to a docker container, name it.
              cid=$(grep -ohE '[0-9a-f]{64}' "/proc/${pid}/cgroup" 2>/dev/null | head -1)
              if [ -n "$cid" ]; then
                cname=$(docker inspect --format '{{.Name}} ({{.Config.Image}})' "$cid" 2>/dev/null)
                echo "  docker container: ${cname:-$cid}"
              fi
              echo "  listening sockets:"
              sudo lsof -nP -p "$pid" -iTCP -sTCP:LISTEN 2>/dev/null || true
            done
          else
            echo "(no host PIDs - only docker publishes detected)"
          fi
          echo "::endgroup::"

          echo "::group::Full docker ps -a"
          docker ps -a 2>&1 || true
          echo "::endgroup::"

          echo "::group::docker logs for containers publishing occupied ports (last 100 lines)"
          for port in $occupied; do
            ids=$(docker ps -q --filter "publish=${port}" 2>/dev/null)
            for cid in $ids; do
              cname=$(docker inspect --format '{{.Name}}' "$cid" 2>/dev/null | sed 's@^/@@')
              echo "----- ${cname:-$cid} (port ${port}) -----"
              docker logs --tail 100 "$cid" 2>&1 || true
            done
          done
          echo "::endgroup::"

          echo "::group::Host Postgres clusters"
          if command -v pg_lsclusters >/dev/null 2>&1; then
            pg_lsclusters 2>&1 || true
          fi
          for unit in postgresql postgresql@14-main postgresql@15-main postgresql@16-main; do
            sudo systemctl status "$unit" --no-pager 2>&1 | head -n 15 || true
          done
          echo "::endgroup::"

          echo "::group::Recent PostgreSQL host logs (last 80 lines)"
          for log in /var/log/postgresql/*.log; do
            [ -f "$log" ] || continue
            echo "----- ${log} -----"
            sudo tail -n 80 "$log" 2>&1 || true
          done
          echo "::endgroup::"

          echo "::group::Recent dmesg / syslog (port + oom hints)"
          sudo dmesg --ctime 2>/dev/null | tail -n 50 || true
          sudo journalctl -n 80 --no-pager 2>/dev/null | grep -iE 'postgres|supabase|5432[1-8]|address already in use' || echo "(no matching journal entries)"
          echo "::endgroup::"

          exit 0





      # Pre-pull images with a generous timeout so transient Docker Hub
      # slowness surfaces as a skipped job instead of a hard failure.
      # The actual `supabase start` step then re-uses the local cache.
      - name: Pre-pull Supabase images
        id: supabase-pull
        if: steps.docker-check.outputs.available == 'true' && steps.supabase-cli.outcome == 'success'
        timeout-minutes: 15
        continue-on-error: true
        run: |
          set -uo pipefail
          mkdir -p /tmp/supabase-diag
          LOG=/tmp/supabase-diag/supabase-start.log
          # `supabase start` will pull on demand; trigger it briefly then
          # stop so subsequent `start` is fast. If this times out or fails,
          # downstream steps are skipped via outcome checks below.
          # Tee output to a log so the failure diagnostics step can dump it.
          ( supabase start --exclude=imgproxy,mailpit,studio,realtime,edge-runtime --debug 2>&1 | tee -a "$LOG" ) &
          START_PID=$!
          # Wait up to ~14 min for readiness; Docker Hub pulls on cold
          # runners regularly exceed the previous 7 min budget.
          for i in $(seq 1 840); do
            if curl -sf "http://127.0.0.1:54321/rest/v1/" >/dev/null 2>&1; then
              echo "Supabase ready after ${i}s during pre-pull"
              exit 0
            fi
            if ! kill -0 "$START_PID" 2>/dev/null; then
              wait "$START_PID"
              rc=$?
              echo "::error::supabase start exited with code ${rc} during pre-pull"
              echo "----- supabase start log (tail 200) -----"
              tail -n 200 "$LOG" || true
              exit $rc
            fi
            sleep 1
          done
          echo "::warning::Supabase start did not become ready within pre-pull window; skipping live tests."
          kill "$START_PID" 2>/dev/null || true
          exit 1

      - name: Skip if image pull / start failed
        if: steps.docker-check.outputs.available == 'true' && steps.supabase-cli.outcome == 'success' && steps.supabase-pull.outcome != 'success'
        run: echo "::notice::Supabase stack unavailable (likely Docker Hub flake), skipping live cap tests."

      - name: Start local Supabase stack
        id: supabase-start
        if: steps.supabase-pull.outcome == 'success'
        timeout-minutes: 25
        run: |
          set -uo pipefail
          mkdir -p /tmp/supabase-diag
          HEALTH_URL="http://127.0.0.1:54321/rest/v1/"
          # If pre-pull already brought it up, short-circuit immediately.
          if curl -sf --max-time 3 "$HEALTH_URL" >/dev/null 2>&1; then
            echo "Supabase already healthy from pre-pull step."
            exit 0
          fi

          # Retry `supabase start` with exponential backoff (capped at 60s)
          # until the REST health endpoint responds or we hit ~22 min total.
          # Hosted runners with cold Docker caches + slow Hub pulls have
          # been observed to need 12-15 min for first boot; budget extra
          # headroom so a single sluggish attempt doesn't waste the run.
          MAX_ATTEMPTS=10
          DEADLINE=$(( $(date +%s) + 1320 ))
          backoff=5
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            now=$(date +%s)
            if [ "$now" -ge "$DEADLINE" ]; then
              echo "::error::Deadline reached before Supabase became healthy."
              break
            fi
            LOG="/tmp/supabase-diag/supabase-start.attempt-${attempt}.log"
            echo "::group::supabase start attempt ${attempt}/${MAX_ATTEMPTS}"
            # `supabase start` is idempotent; capture output for diagnostics.
            supabase start --exclude=imgproxy,mailpit,studio,realtime,edge-runtime 2>&1 | tee "$LOG"
            rc=${PIPESTATUS[0]}
            echo "supabase start exit=${rc}"
            echo "::endgroup::"

            # Poll health for up to 240s before declaring this attempt
            # failed. Postgres + GoTrue + PostgREST cold-start chains
            # routinely take 2-3 min on first boot.
            healthy=0
            for i in $(seq 1 240); do
              if curl -sf --max-time 5 "$HEALTH_URL" >/dev/null 2>&1; then
                echo "Supabase healthy after attempt ${attempt} (waited ${i}s)."
                healthy=1
                break
              fi
              sleep 1
            done
            if [ "$healthy" -eq 1 ]; then
              exit 0
            fi

            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              echo "::warning::Attempt ${attempt} did not become healthy; tearing down and retrying in ${backoff}s."
              supabase stop --no-backup 2>&1 || true
              # Reap any lingering supabase_* containers between attempts.
              stale=$(docker ps -aq --filter "name=supabase_" 2>/dev/null)
              if [ -n "$stale" ]; then
                echo "$stale" | xargs -r docker rm -f 2>&1 || true
              fi
              sleep "$backoff"
              # Exponential backoff with 60s cap.
              backoff=$(( backoff * 2 ))
              if [ "$backoff" -gt 60 ]; then backoff=60; fi
            fi
          done

          echo "::error::supabase start failed to become healthy after ${MAX_ATTEMPTS} attempts."
          echo "----- last attempt log (tail 200) -----"
          tail -n 200 /tmp/supabase-diag/supabase-start.attempt-*.log 2>/dev/null || true
          exit 1


      - name: Wait for PostgREST API
        id: wait-postgrest
        if: steps.supabase-start.outcome == 'success'
        run: |
          set -uo pipefail
          # PostgREST occasionally lags Postgres readiness by a minute or
          # two when the runner is under load; give it 5 min before giving
          # up so a slow-but-recovering boot doesn't fail the whole job.
          for i in $(seq 1 300); do
            if curl -sf --max-time 5 "http://127.0.0.1:54321/rest/v1/" >/dev/null 2>&1; then
              echo "PostgREST ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::PostgREST never came up after 300s"
          echo "::group::curl -v http://127.0.0.1:54321/rest/v1/"
          curl -v --max-time 5 "http://127.0.0.1:54321/rest/v1/" 2>&1 || true
          echo "::endgroup::"
          exit 1

      - name: Verify Postgres container port mapping
        id: verify-pg-ports
        if: steps.wait-postgrest.outcome == 'success'
        run: |
          set -uo pipefail
          # Confirm the live Postgres container is actually bound to the
          # ports the test suite connects to (54322 for Postgres, 54321 for
          # the REST/Kong gateway). If the CLI silently remapped them due to
          # a prior conflict, the reservation-type cap test would connect to
          # the wrong instance, so fail fast with a clear diagnostic.
          EXPECTED_PG_PORT=54322
          EXPECTED_API_PORT=54321

          pg_container="$(docker ps --filter 'name=supabase_db_' --format '{{.Names}}' | head -n1)"
          api_container="$(docker ps --filter 'name=supabase_kong_' --format '{{.Names}}' | head -n1)"

          echo "::group::Detected containers"
          echo "postgres: ${pg_container:-<none>}"
          echo "kong/api: ${api_container:-<none>}"
          echo "::endgroup::"

          fail=0

          check_mapping() {
            local container="$1" internal="$2" expected_host="$3" label="$4"
            if [ -z "$container" ]; then
              echo "::error::${label} container not running"
              return 1
            fi
            local mapped
            mapped="$(docker port "$container" "${internal}/tcp" 2>/dev/null | awk -F: 'NR==1{print $NF}')"
            echo "${label}: ${container} ${internal}/tcp -> ${mapped:-<unmapped>} (expected ${expected_host})"
            if [ "${mapped}" != "${expected_host}" ]; then
              echo "::error::${label} container is mapped to ${mapped:-<unmapped>}, expected ${expected_host}"
              return 1
            fi
            return 0
          }

          echo "::group::Container port mapping"
          check_mapping "$pg_container" 5432 "$EXPECTED_PG_PORT" "Postgres" || fail=1
          check_mapping "$api_container" 8000 "$EXPECTED_API_PORT" "Kong/API" || fail=1
          echo "::endgroup::"

          # Sanity: confirm a TCP connection actually reaches Postgres on
          # the expected host port (catches firewall/proxy weirdness even
          # when `docker port` reports the right mapping).
          echo "::group::TCP probe 127.0.0.1:${EXPECTED_PG_PORT}"
          if ! timeout 5 bash -c "</dev/tcp/127.0.0.1/${EXPECTED_PG_PORT}" 2>&1; then
            echo "::error::TCP connect to 127.0.0.1:${EXPECTED_PG_PORT} failed"
            fail=1
          else
            echo "ok"
          fi
          echo "::endgroup::"

          if [ "$fail" -ne 0 ]; then
            echo "::group::docker ps -a (diagnostics)"
            docker ps -a || true
            echo "::endgroup::"
            exit 1
          fi



      # Always-on diagnostics: if any readiness step failed, dump everything
      # we know about the supabase stack so the failure is debuggable from
      # the GitHub Actions log alone (no need to repro locally).
      - name: Diagnostics on readiness failure
        if: failure() && steps.docker-check.outputs.available == 'true' && steps.supabase-cli.outcome == 'success'
        run: |
          set +e
          echo "::group::supabase status"
          supabase status 2>&1 || true
          echo "::endgroup::"

          echo "::group::supabase start log (full)"
          if [ -f /tmp/supabase-diag/supabase-start.log ]; then
            cat /tmp/supabase-diag/supabase-start.log
          else
            echo "(no log captured)"
          fi
          echo "::endgroup::"

          echo "::group::docker ps -a"
          docker ps -a 2>&1 || true
          echo "::endgroup::"

          echo "::group::docker container logs (supabase_*)"
          for c in $(docker ps -a --filter "name=supabase_" --format '{{.Names}}' 2>/dev/null); do
            echo "----- $c (last 200 lines) -----"
            docker logs --tail 200 "$c" 2>&1 || true
            echo "----- $c inspect (State) -----"
            docker inspect --format '{{json .State}}' "$c" 2>&1 || true
          done
          echo "::endgroup::"

          echo "::group::Listening ports (54321-54328)"
          if command -v lsof >/dev/null 2>&1; then
            sudo lsof -iTCP -sTCP:LISTEN -P -n 2>&1 | grep -E ':(5432[1-8])' || echo "(no listeners on Supabase ports)"
          fi
          ss -lntp 2>&1 | grep -E ':(5432[1-8])' || true
          echo "::endgroup::"

          echo "::group::Host processes (top by cpu)"
          ps auxf --sort=-pcpu 2>&1 | head -n 60 || ps aux | head -n 60
          echo "::endgroup::"

          echo "::group::Disk + memory"
          df -h 2>&1 || true
          free -h 2>&1 || true
          echo "::endgroup::"

          echo "::group::curl probes"
          for url in \
            "http://127.0.0.1:54321/rest/v1/" \
            "http://127.0.0.1:54321/auth/v1/health" \
            "http://127.0.0.1:54322/"; do
            echo "----- $url -----"
            curl -v --max-time 5 "$url" 2>&1 || true
          done
          echo "::endgroup::"
          exit 0

      - name: Resolve local Supabase keys
        id: keys
        if: steps.supabase-start.outcome == 'success'
        run: |
          set -euo pipefail
          # `supabase status -o env` prints KEY=VALUE pairs we can source.
          eval "$(supabase status -o env)"
          {
            echo "url=${API_URL}"
            echo "service_role=${SERVICE_ROLE_KEY}"
          } >> "$GITHUB_OUTPUT"

      - name: Run live integration tests
        if: steps.supabase-start.outcome == 'success'
        env:
          SUPABASE_URL: ${{ steps.keys.outputs.url }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.keys.outputs.service_role }}
        run: |
          set -euo pipefail
          bunx vitest run --config vitest.live.config.ts --reporter=verbose

      # On any prior failure, dump per-container `docker logs`, full
      # `docker inspect`, `docker ps -a`, `docker compose` state, and copy
      # the captured `supabase start` attempt logs into a single bundle
      # uploaded as a GitHub Actions artifact. This is the artifact
      # counterpart to the inline "Diagnostics on readiness failure" step,
      # which only prints to the job log.
      - name: Collect docker + supabase logs
        if: failure()
        continue-on-error: true
        shell: bash {0}
        run: |
          set +e
          BUNDLE=/tmp/supabase-logs
          mkdir -p "$BUNDLE"

          {
            echo "===== docker version ====="
            docker version 2>&1
            echo "===== docker info ====="
            docker info 2>&1
          } > "$BUNDLE/docker-info.txt"

          docker ps -a > "$BUNDLE/docker-ps.txt" 2>&1
          docker network ls > "$BUNDLE/docker-networks.txt" 2>&1
          docker volume ls > "$BUNDLE/docker-volumes.txt" 2>&1

          # docker compose state (Supabase CLI uses compose under the hood).
          if docker compose version >/dev/null 2>&1; then
            docker compose ls -a > "$BUNDLE/docker-compose-ls.txt" 2>&1
            for proj in $(docker compose ls -a --format json 2>/dev/null | \
                python3 -c 'import json,sys;\ndata=json.load(sys.stdin);\nprint("\n".join(p["Name"] for p in data))' 2>/dev/null); do
              docker compose -p "$proj" ps -a > "$BUNDLE/compose-${proj}-ps.txt" 2>&1
              docker compose -p "$proj" logs --no-color --timestamps \
                > "$BUNDLE/compose-${proj}-logs.txt" 2>&1
            done
          fi

          # Per-container logs + inspect for every supabase_* container.
          mkdir -p "$BUNDLE/containers"
          for c in $(docker ps -a --filter "name=supabase_" --format '{{.Names}}' 2>/dev/null); do
            docker logs --timestamps "$c" > "$BUNDLE/containers/${c}.log" 2>&1
            docker inspect "$c" > "$BUNDLE/containers/${c}.inspect.json" 2>&1
          done

          # Captured `supabase start` attempt logs from earlier steps.
          if [ -d /tmp/supabase-diag ]; then
            cp -a /tmp/supabase-diag "$BUNDLE/supabase-diag" 2>/dev/null || true
          fi

          # Final supabase status snapshot (may fail if stack is down).
          supabase status > "$BUNDLE/supabase-status.txt" 2>&1 || true

          # Host context useful for triaging port / resource exhaustion.
          {
            echo "===== ss -lntp ====="
            ss -lntp 2>&1
            echo "===== df -h ====="
            df -h 2>&1
            echo "===== free -h ====="
            free -h 2>&1
            echo "===== uname -a ====="
            uname -a 2>&1
          } > "$BUNDLE/host.txt"

          ls -laR "$BUNDLE" > "$BUNDLE/INDEX.txt" 2>&1
          exit 0

      - name: Upload failure logs artifact
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: supabase-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/supabase-logs
          if-no-files-found: warn
          retention-days: 14

      - name: Stop local Supabase stack
        if: always() && steps.supabase-start.outcome == 'success'
        run: supabase stop --no-backup || true

