name: Cross-Tenant RLS (Live Mode)

# Runs the cross-tenant RLS and storage isolation tests in LIVE mode by signing
# in as two real users from different tenants and asserting that neither can
# read or write the other's rows or files.
#
# This workflow only runs when the required secrets are configured at the repo
# (or organization) level. It is safe to enable on forks — without secrets the
# job is skipped entirely.
#
# Required repository secrets:
#   VITE_SUPABASE_URL                 — public Supabase project URL
#   VITE_SUPABASE_PUBLISHABLE_KEY     — public anon key
#   RLS_TEST_TENANT_A_EMAIL           — test user A's email
#   RLS_TEST_TENANT_A_PASSWORD        — test user A's password
#   RLS_TEST_TENANT_A_ID              — tenant ID user A belongs to
#   RLS_TEST_TENANT_B_EMAIL           — test user B's email (different tenant)
#   RLS_TEST_TENANT_B_PASSWORD        — test user B's password
#   RLS_TEST_TENANT_B_ID              — tenant ID user B belongs to
#
# How to set up the test users:
#   1. Create two distinct tenants in your Supabase project (staging, not prod).
#   2. Create one user per tenant via the Auth dashboard (confirm their emails).
#   3. Add each user to their tenant via the `tenant_users` table with role 'staff'
#      or higher.
#   4. Capture the tenant UUIDs from the `tenants` table.
#   5. Add all 8 secrets above to: Repo → Settings → Secrets and variables → Actions.
#
# Recommended: point this at a STAGING Supabase project, not production. The
# tests create + delete files in the storage buckets and never touch production
# customer data, but using staging keeps the blast radius zero.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 06:00 UTC — catches RLS regressions introduced by migrations
    # merged outside of PR review.
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  check-secrets:
    name: Check live-mode secrets
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        env:
          A_EMAIL: ${{ secrets.RLS_TEST_TENANT_A_EMAIL }}
          B_EMAIL: ${{ secrets.RLS_TEST_TENANT_B_EMAIL }}
        run: |
          if [ -n "$A_EMAIL" ] && [ -n "$B_EMAIL" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "✅ Live-mode secrets detected — cross-tenant tests will run."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "⏭️  RLS_TEST_TENANT_A/B secrets are not set — skipping live mode."
          fi

  cross-tenant-live:
    name: Cross-Tenant RLS + Storage (live)
    needs: check-secrets
    if: needs.check-secrets.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Setup Bun
        uses: ./.github/actions/setup-bun-with-diagnostics

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Print the seeded tenant identifiers (IDs, slug, name, masked email)
      # BEFORE running the test sweep so a hung or failing run can still be
      # triaged from the workflow summary. Mirrors the local-stack workflow's
      # "Print seeded tenant debug info" step but, since we have no direct
      # Postgres access in remote staging, fetches slug/name from the
      # public `tenants_public` view via PostgREST + the anon key.
      #
      # Secret-leak hygiene:
      #   - Tenant IDs and slugs are not secrets (they appear in URLs and
      #     RLS policy errors anyway) so we print them in full.
      #   - Emails are masked to `f***@example.com` so the local part isn't
      #     leaked into public PR-run logs even though it's a configured
      #     secret.
      #   - Passwords are NEVER referenced — GitHub would mask them, but
      #     the safest approach is not to touch them at all.
      - name: Print seeded tenant debug info (no secrets)
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          A_EMAIL: ${{ secrets.RLS_TEST_TENANT_A_EMAIL }}
          A_TID: ${{ secrets.RLS_TEST_TENANT_A_ID }}
          B_EMAIL: ${{ secrets.RLS_TEST_TENANT_B_EMAIL }}
          B_TID: ${{ secrets.RLS_TEST_TENANT_B_ID }}
        run: |
          set -uo pipefail
          echo "### Seeded RLS test fixtures (remote staging)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Label | Email (masked) | Tenant ID | Tenant slug | Tenant name |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|---|---|" >> "$GITHUB_STEP_SUMMARY"

          # Mask email local-part so it never appears verbatim in logs even
          # when GitHub's automatic secret masking would already redact it.
          # Format:  "fred.smith@acme.io" -> "f***@acme.io"
          mask_email() {
            local raw="${1:-}"
            if [ -z "$raw" ]; then
              printf '(missing)'
              return
            fi
            local local_part="${raw%@*}"
            local domain_part="${raw#*@}"
            local first="${local_part:0:1}"
            printf '%s***@%s' "$first" "$domain_part"
          }

          # Fetch the tenant slug+name from the public view via PostgREST.
          # The anon key is enough because `tenants_public` is exposed to
          # anon for active tenants; failing requests are tolerated and
          # reported as `?` so the workflow stays informative even if the
          # view is unavailable.
          fetch_tenant() {
            local tid="$1"
            if [ -z "$tid" ]; then
              echo "|"
              return
            fi
            local resp
            resp=$(curl -sS --max-time 10 \
              -H "apikey: ${SUPABASE_ANON_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
              "${SUPABASE_URL%/}/rest/v1/tenants_public?id=eq.${tid}&select=slug,name" \
              2>/dev/null || echo "[]")
            # Tolerate missing `node` by parsing with a tiny inline script;
            # GitHub-hosted runners always have node available.
            node -e "
              try {
                const arr = JSON.parse(process.argv[1] || '[]');
                const row = Array.isArray(arr) && arr[0] ? arr[0] : {};
                process.stdout.write((row.slug || '') + '|' + (row.name || ''));
              } catch (_) { process.stdout.write('|'); }
            " "$resp"
          }

          for label in A B; do
            email_var="${label}_EMAIL"
            tid_var="${label}_TID"
            email="${!email_var:-}"
            tenant_id="${!tid_var:-}"

            if [ -z "$tenant_id" ] && [ -z "$email" ]; then
              echo "::warning::Tenant ${label} secrets missing"
              echo "| ${label} | (missing) | (missing) | – | – |" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            masked=$(mask_email "$email")
            row=$(fetch_tenant "$tenant_id")
            slug=$(echo "$row" | cut -d'|' -f1)
            tname=$(echo "$row" | cut -d'|' -f2)

            # Console output (also masked) — visible in the raw step log
            # without expanding the job summary.
            echo "Tenant ${label}:"
            echo "  email     = ${masked}"
            echo "  tenant_id = ${tenant_id:-<missing>}"
            echo "  slug      = ${slug:-<unknown>}"
            echo "  name      = ${tname:-<unknown>}"

            echo "| ${label} | \`${masked}\` | \`${tenant_id:-?}\` | \`${slug:-?}\` | ${tname:-?} |" >> "$GITHUB_STEP_SUMMARY"
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "_Emails are masked and passwords are intentionally omitted._" >> "$GITHUB_STEP_SUMMARY"

      - name: Run cross-tenant RLS tests (live) + generate report
        env:
          # Public Supabase config — exposed to Vite via import.meta.env
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          # Live-mode credentials — read by the tests via process.env
          RLS_TEST_TENANT_A_EMAIL: ${{ secrets.RLS_TEST_TENANT_A_EMAIL }}
          RLS_TEST_TENANT_A_PASSWORD: ${{ secrets.RLS_TEST_TENANT_A_PASSWORD }}
          RLS_TEST_TENANT_A_ID: ${{ secrets.RLS_TEST_TENANT_A_ID }}
          RLS_TEST_TENANT_B_EMAIL: ${{ secrets.RLS_TEST_TENANT_B_EMAIL }}
          RLS_TEST_TENANT_B_PASSWORD: ${{ secrets.RLS_TEST_TENANT_B_PASSWORD }}
          RLS_TEST_TENANT_B_ID: ${{ secrets.RLS_TEST_TENANT_B_ID }}
          # Tags the generated report so remote-staging output is
          # distinguishable from local-stack output (`rls-report-local`).
          RLS_REPORT_FLAVOR: remote
        run: bun run test:rls-report

      # Belt-and-braces verification that the test run actually flushed a
      # ledger for THIS flavor before we hand it to the PDF generator.
      # `flushLedger()` writes both `reports/storage-attempts.json` AND
      # `reports/storage-attempts.remote.json` — if the flavored copy is
      # missing it means the test process crashed before afterAll ran,
      # and any rendering would silently use a stale canonical file from
      # a previous run. Logging the resolved paths here lets a reviewer
      # eyeball the env→path mapping straight from the workflow log.
      - name: Verify flavored storage-attempts ledger exists (remote)
        if: always()
        env:
          RLS_REPORT_FLAVOR: remote
        run: |
          set -uo pipefail
          FLAVORED="reports/storage-attempts.${RLS_REPORT_FLAVOR}.json"
          CANONICAL="reports/storage-attempts.json"
          echo "Resolving storage-attempts ledger for flavor='${RLS_REPORT_FLAVOR}':"
          echo "  flavored  = ${FLAVORED}"
          echo "  canonical = ${CANONICAL}"
          if [ -f "$FLAVORED" ]; then
            echo "✅ Flavored ledger present ($(wc -c < "$FLAVORED") bytes)"
            # Pin the PDF generator to the flavored file so a leftover
            # canonical copy from a previous run can't be picked up.
            echo "STORAGE_ATTEMPTS_LEDGER=${PWD}/${FLAVORED}" >> "$GITHUB_ENV"
          elif [ -f "$CANONICAL" ]; then
            echo "::warning::Flavored ledger ${FLAVORED} missing — falling back to ${CANONICAL}."
            echo "STORAGE_ATTEMPTS_LEDGER=${PWD}/${CANONICAL}" >> "$GITHUB_ENV"
          else
            echo "::warning::No storage-attempts ledger found — PDF step will be skipped."
            echo "STORAGE_ATTEMPTS_LEDGER=" >> "$GITHUB_ENV"
          fi

      # Render the storage-attempts ledger written by cross-tenant-storage.test.ts
      # into a reviewable PDF. Runs `if: always()` so a failed test sweep
      # (which is exactly when the PDF is most useful for triage) still
      # produces the artifact. `STORAGE_ATTEMPTS_LEDGER` is pinned by the
      # previous step so the generator never picks up a stale file.
      - name: Generate storage-attempts PDF (remote)
        if: always() && env.STORAGE_ATTEMPTS_LEDGER != ''
        env:
          RLS_REPORT_FLAVOR: remote
        run: bun run scripts/generate-storage-attempts-pdf.ts || true

      # Sibling of the PDF step: emit a focused HTML summary of the
      # adversarial cases (path traversal, encoding tricks). Lives inside
      # the same `reports/` directory uploaded below, so reviewers can
      # open `adversarial-summary.remote.html` straight from the artifact
      # bundle. Safe-fail so a render bug never masks a test failure.
      - name: Generate adversarial HTML summary (remote)
        if: always() && env.STORAGE_ATTEMPTS_LEDGER != ''
        env:
          RLS_REPORT_FLAVOR: remote
        run: bun run scripts/generate-adversarial-html-summary.ts || true

      - name: Upload RLS report (remote)
        # Always upload — even on test failure — so the HTML/JSON dashboard
        # AND the storage-attempts PDF/JSON ledger are available for triage
        # from the workflow run page. `reports/` covers both artifact
        # families in a single upload.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rls-report-remote
          path: reports/
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "Cross-tenant RLS live-mode tests completed"
          if [ -f reports/rls-report.json ]; then
            echo ""
            echo "### RLS Report Summary" >> "$GITHUB_STEP_SUMMARY"
            node -e "const r=require('./reports/rls-report.json'); const t=r.totals; console.log('| Metric | Value |\n|---|---|\n| Total | '+t.total+' |\n| Passed | '+t.passed+' |\n| Failed | '+t.failed+' |\n| Skipped | '+t.skipped+' |');" >> "$GITHUB_STEP_SUMMARY"
            FAILED=$(node -e "console.log(require('./reports/rls-report.json').entries.filter(e=>e.status==='failed').map(e=>'- **'+e.fullName+'**: '+(e.errorMessage||'(no message)').split('\\n')[0]).join('\\n'))")
            if [ -n "$FAILED" ]; then
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "#### Failures" >> "$GITHUB_STEP_SUMMARY"
              echo "$FAILED" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

  skipped-notice:
    name: Cross-Tenant RLS (skipped)
    needs: check-secrets
    if: needs.check-secrets.outputs.enabled == 'false'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - run: |
          echo "::notice::Live-mode cross-tenant tests against the REMOTE staging project were skipped — RLS_TEST_TENANT_A/B secrets are not configured."
          echo "Live coverage is still provided by the local-stack workflow (.github/workflows/cross-tenant-rls-local.yml), which boots an ephemeral Supabase via the CLI on every PR."
          echo "Configure the secrets listed in .github/workflows/cross-tenant-rls.yml to additionally exercise the remote staging project."
