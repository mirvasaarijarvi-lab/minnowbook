name: Cross-Tenant RLS (Live Mode)

# Runs the cross-tenant RLS and storage isolation tests in LIVE mode by signing
# in as two real users from different tenants and asserting that neither can
# read or write the other's rows or files.
#
# This workflow only runs when the required secrets are configured at the repo
# (or organization) level. It is safe to enable on forks — without secrets the
# job is skipped entirely.
#
# Required repository secrets:
#   VITE_SUPABASE_URL                 — public Supabase project URL
#   VITE_SUPABASE_PUBLISHABLE_KEY     — public anon key
#   RLS_TEST_TENANT_A_EMAIL           — test user A's email
#   RLS_TEST_TENANT_A_PASSWORD        — test user A's password
#   RLS_TEST_TENANT_A_ID              — tenant ID user A belongs to
#   RLS_TEST_TENANT_B_EMAIL           — test user B's email (different tenant)
#   RLS_TEST_TENANT_B_PASSWORD        — test user B's password
#   RLS_TEST_TENANT_B_ID              — tenant ID user B belongs to
#
# How to set up the test users:
#   1. Create two distinct tenants in your Supabase project (staging, not prod).
#   2. Create one user per tenant via the Auth dashboard (confirm their emails).
#   3. Add each user to their tenant via the `tenant_users` table with role 'staff'
#      or higher.
#   4. Capture the tenant UUIDs from the `tenants` table.
#   5. Add all 8 secrets above to: Repo → Settings → Secrets and variables → Actions.
#
# Recommended: point this at a STAGING Supabase project, not production. The
# tests create + delete files in the storage buckets and never touch production
# customer data, but using staging keeps the blast radius zero.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 06:00 UTC — catches RLS regressions introduced by migrations
    # merged outside of PR review.
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  check-secrets:
    name: Check live-mode secrets
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        env:
          A_EMAIL: ${{ secrets.RLS_TEST_TENANT_A_EMAIL }}
          B_EMAIL: ${{ secrets.RLS_TEST_TENANT_B_EMAIL }}
        run: |
          if [ -n "$A_EMAIL" ] && [ -n "$B_EMAIL" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "✅ Live-mode secrets detected — cross-tenant tests will run."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "⏭️  RLS_TEST_TENANT_A/B secrets are not set — skipping live mode."
          fi

  cross-tenant-live:
    name: Cross-Tenant RLS + Storage (live)
    needs: check-secrets
    if: needs.check-secrets.outputs.enabled == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run cross-tenant RLS tests (live)
        env:
          # Public Supabase config — exposed to Vite via import.meta.env
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          # Live-mode credentials — read by the tests via process.env
          RLS_TEST_TENANT_A_EMAIL: ${{ secrets.RLS_TEST_TENANT_A_EMAIL }}
          RLS_TEST_TENANT_A_PASSWORD: ${{ secrets.RLS_TEST_TENANT_A_PASSWORD }}
          RLS_TEST_TENANT_A_ID: ${{ secrets.RLS_TEST_TENANT_A_ID }}
          RLS_TEST_TENANT_B_EMAIL: ${{ secrets.RLS_TEST_TENANT_B_EMAIL }}
          RLS_TEST_TENANT_B_PASSWORD: ${{ secrets.RLS_TEST_TENANT_B_PASSWORD }}
          RLS_TEST_TENANT_B_ID: ${{ secrets.RLS_TEST_TENANT_B_ID }}
        run: |
          bunx vitest run --reporter=verbose \
            src/test/security/cross-tenant-rls.test.ts \
            src/test/security/cross-tenant-storage.test.ts

      - name: Summary
        if: always()
        run: echo "Cross-tenant RLS live-mode tests completed"

  skipped-notice:
    name: Cross-Tenant RLS (skipped)
    needs: check-secrets
    if: needs.check-secrets.outputs.enabled == 'false'
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "::notice::Live-mode cross-tenant tests skipped — RLS_TEST_TENANT_A/B secrets are not configured."
          echo "See .github/workflows/cross-tenant-rls.yml for setup instructions."
