name: Storage Path Sanitizer

# Dedicated, required check for the assertSafeStorageObjectPath
# sanitizer. The same suite also runs as part of the broader
# "Unit tests (Vitest)" job in ci.yml, but we surface it as its own
# PR check so any regression in the path-traversal defence is
# unmissable in the merge queue and can be marked as a required
# status check in branch-protection rules.
#
# This job intentionally runs ONLY the two sanitizer test files:
#   - src/lib/storage-path.test.ts        (28+ targeted cases)
#   - src/lib/storage-path.fuzz.test.ts   (15k seeded property runs)
#
# Keep it fast (under ~30s) so it never becomes a bottleneck on PRs.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same PR to save CI minutes.
concurrency:
  group: storage-path-sanitizer-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sanitizer:
    name: assertSafeStorageObjectPath regression suite
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run sanitizer unit + fuzz suite
        run: |
          bunx vitest run \
            --reporter=verbose \
            src/lib/storage-path.test.ts \
            src/lib/storage-path.fuzz.test.ts
