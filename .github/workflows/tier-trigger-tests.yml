name: SQL Trigger Tests

# Runs on every PR and push to main. Boots a fully local Supabase stack via
# the Supabase CLI, applies all migrations from supabase/migrations/, and
# runs the trigger regression tests in supabase/tests/. Any test that
# regresses (a valid combo rejected, or an invalid combo accepted) raises
# an exception inside the SQL DO block, which fails the psql command and
# fails the CI build.
#
# When Docker is not available on the runner the job emits a notice and
# exits 0 to avoid blocking PRs on infra issues. The same pattern is used
# by .github/workflows/cross-tenant-rls-local.yml.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  trigger-tests:
    name: Reservation type limit trigger
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Detect Docker availability
        id: docker-check
        run: |
          set +e
          if ! command -v docker >/dev/null 2>&1; then
            echo "::notice::docker CLI not present on this runner."
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! docker info >/dev/null 2>&1; then
            echo "::notice::docker daemon not reachable on this runner."
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Docker is available: $(docker --version)"
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Skip if Docker unavailable
        if: steps.docker-check.outputs.available != 'true'
        run: |
          echo "::notice::Docker unavailable on this runner, skipping SQL trigger tests."

      - name: Setup Supabase CLI
        id: supabase-cli
        if: steps.docker-check.outputs.available == 'true'
        uses: supabase/setup-cli@b579fc8c7122aa485f1d947120eaeb11ee04d312 # v2.0.0
        with:
          version: latest
        continue-on-error: true

      - name: Skip if Supabase CLI unavailable
        if: steps.docker-check.outputs.available == 'true' && steps.supabase-cli.outcome != 'success'
        run: |
          echo "::notice::Supabase CLI could not be installed, skipping SQL trigger tests."

      # Legacy seed migrations reference hardcoded production ids
      # (tenant, site, staff user). We pre-create placeholder rows so
      # the seeds attach cleanly. IDs and rationale are documented in
      # docs/ci-placeholder-ids.md , keep this step in sync with the
      # equivalent step in reservation-type-limit-live.yml and cross-tenant-rls-local.yml.
      - name: Inject placeholder tenant for local-only seed data
        if: steps.docker-check.outputs.available == 'true' && steps.supabase-cli.outcome == 'success'
        run: |
          set -euo pipefail
          cat > supabase/migrations/20260224082115_ci_placeholder_tenant.sql <<'SQL'
          -- Placeholder tenant owner
          INSERT INTO auth.users (id, instance_id, aud, role, email, encrypted_password, email_confirmed_at, created_at, updated_at)
          VALUES (
            '00000000-0000-0000-0000-0000000000c1',
            '00000000-0000-0000-0000-000000000000',
            'authenticated', 'authenticated',
            'ci-placeholder@example.invalid',
            crypt('ci-placeholder-password', gen_salt('bf')),
            now(), now(), now()
          )
          ON CONFLICT (id) DO NOTHING;

          -- Placeholder staff user referenced by legacy site_users seed
          INSERT INTO auth.users (id, instance_id, aud, role, email, encrypted_password, email_confirmed_at, created_at, updated_at)
          VALUES (
            'ea50e91e-5dbf-4dcc-a13c-f96c4016f952',
            '00000000-0000-0000-0000-000000000000',
            'authenticated', 'authenticated',
            'ci-placeholder-staff@example.invalid',
            crypt('ci-placeholder-password', gen_salt('bf')),
            now(), now(), now()
          )
          ON CONFLICT (id) DO NOTHING;

          INSERT INTO public.tenants (id, name, slug, tier, is_active, subscription_status, owner_user_id)
          VALUES (
            '9ac05fbf-0834-44fd-a52a-d030b7074a30',
            'CI Placeholder Tenant',
            'ci-placeholder-tenant',
            'business', true, 'active',
            '00000000-0000-0000-0000-0000000000c1'
          )
          ON CONFLICT (id) DO NOTHING;

          SQL

          # Site placeholder must run AFTER the sites table is created
          # (migration 20260303093523_*) and BEFORE the legacy site_users
          # seed at 20260303123922_*.
          cat > supabase/migrations/20260303093524_ci_placeholder_site.sql <<'SQL'
          INSERT INTO public.sites (id, tenant_id, name, slug, is_active)
          VALUES (
            'b040ab30-f4d2-45cc-8695-2000572428d7',
            '9ac05fbf-0834-44fd-a52a-d030b7074a30',
            'CI Placeholder Site',
            'ci-placeholder-site',
            true
          )
          ON CONFLICT (id) DO NOTHING;
          SQL

      - name: Start local Supabase stack
        id: supabase-start
        if: steps.docker-check.outputs.available == 'true' && steps.supabase-cli.outcome == 'success'
        run: |
          set -euo pipefail
          supabase start --exclude=imgproxy,mailpit,studio,realtime,edge-runtime

      - name: Wait for Postgres
        if: steps.supabase-start.outcome == 'success'
        run: |
          set -uo pipefail
          for i in $(seq 1 60); do
            if (echo > /dev/tcp/127.0.0.1/54322) >/dev/null 2>&1; then
              echo "Postgres ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Postgres never came up"
          exit 1

      - name: Run SQL trigger tests
        if: steps.supabase-start.outcome == 'success'
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          shopt -s nullglob
          fail=0
          for f in supabase/tests/*.sql; do
            echo ""
            echo "=============================================="
            echo "Running $f"
            echo "=============================================="
            # ON_ERROR_STOP=1 turns any RAISE EXCEPTION inside the test
            # into a non-zero exit, which fails this step and the build.
            if ! psql -h 127.0.0.1 -p 54322 -U postgres -d postgres \
                -v ON_ERROR_STOP=1 -f "$f"; then
              echo "::error file=$f::SQL trigger test FAILED"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::One or more trigger tests regressed"
            exit 1
          fi

      - name: Stop local Supabase stack
        if: always() && steps.supabase-start.outcome == 'success'
        run: supabase stop --no-backup || true
