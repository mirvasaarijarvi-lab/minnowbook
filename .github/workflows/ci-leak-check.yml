name: CI Leak Check

# Fails the build if any test left CI-created rows behind in the shared
# Supabase project. Tests must create their own ephemeral tenants via
# `src/test/helpers/ephemeral-tenant.ts` and drop them in `afterAll`.
#
# Runs:
#   - on every push/PR to main (sentinel check, cheap and fast)
#   - after the live integration workflows complete
#   - on a daily schedule to catch leaks from canceled/aborted jobs
#   - on demand via workflow_dispatch

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"
  workflow_run:
    workflows:
      - "Live Reservation-Type Cap Tests"
      - "E2E"
      - "Cross-tenant RLS"
      - "Cross-tenant storage adversarial"
    types: [completed]

concurrency:
  group: ci-leak-check
  cancel-in-progress: false

permissions: {}

jobs:
  leak-check:
    name: Verify no leftover CI rows
    runs-on: ubuntu-latest
    # Raised from 5 to 10 minutes: cold Bun setup + Supabase
    # round-trip can briefly exceed the old budget when the
    # Supabase project is cold or under load.
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: ./.github/actions/setup-bun-with-diagnostics

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install minimal deps
        run: bun install --frozen-lockfile

      - name: Run leak check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SERVICE_ROLE_KEY" ]; then
            echo "::notice::Missing SUPABASE_URL or SERVICE_ROLE_KEY secret, skipping."
            exit 0
          fi
          bun run .github/workflows/scripts/ci-leak-check.ts
