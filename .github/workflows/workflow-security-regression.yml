name: Workflow security regression

# Guards against re-introducing privilege-escalation footguns in
# Dependabot / auto-merge workflows. The actual gate logic lives in
# .github/scripts/scan-automerge-workflows.py so it can be unit-
# tested by the `self-test` job below against synthetic fixtures.
#
# Checks enforced (see the script's docstring for the full list):
#   1. No `pull_request_target` trigger.
#   2. No `workflow_run` / `repository_dispatch` triggers.
#   3. Trigger allowlist: pull_request (required), plus optionally
#      workflow_dispatch and schedule.
#   4. No wildcard write permissions (`permissions: write-all`) at
#      the workflow or job level, and no broad scope set to write at
#      the workflow level.
#   5. Every actions/checkout step must set
#      with.persist-credentials: false.
#
# The job has no third-party action dependencies beyond
# actions/checkout and actions/setup-python (both pinned to commit
# SHAs) so the gate itself cannot become a supply-chain risk.

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/scripts/scan-automerge-workflows.py"
      - ".github/workflows/workflow-security-regression.yml"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/scripts/scan-automerge-workflows.py"
  workflow_dispatch:

permissions: {}

concurrency:
  group: workflow-security-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  forbid-high-risk-patterns-in-automerge:
    name: No high-risk triggers or unsafe checkout in auto-merge workflows
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - name: Checkout
        # actions/checkout@v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Set up Python
        # actions/setup-python@v5.3.0
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: "3.11"

      - name: Install scanner dependencies
        run: pip install --no-deps "pyyaml==6.0.2"

      - name: Scan auto-merge workflows
        run: python3 .github/scripts/scan-automerge-workflows.py --dir .github/workflows

  self-test:
    name: Scanner self-test (passing + failing fixtures)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
    steps:
      - name: Checkout
        # actions/checkout@v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Set up Python
        # actions/setup-python@v5.3.0
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: "3.11"

      - name: Install scanner dependencies
        run: pip install --no-deps "pyyaml==6.0.2"

      # ---------------------------------------------------------------
      # Build two temporary fixture directories on disk:
      #
      #   pass/   -> a workflow that mirrors the hardened pattern in
      #              .github/workflows/dependabot-auto-merge.yml.
      #              The scanner MUST exit 0 for this directory.
      #
      #   fail/   -> a workflow that intentionally trips every check
      #              (forbidden trigger, wildcard write perms, unsafe
      #              checkout). The scanner MUST exit non-zero AND
      #              print an annotation for each violation class.
      #
      # We assert both outcomes explicitly so a regression in the
      # scanner (e.g. silently exiting 0 because a check was deleted)
      # also fails this job, not just a regression in real workflows.
      # ---------------------------------------------------------------
      - name: Materialise passing fixture
        run: |
          set -euo pipefail
          mkdir -p /tmp/wfsec-fixtures/pass
          cat > /tmp/wfsec-fixtures/pass/dependabot-auto-merge.yml <<'YML'
          name: Pass fixture (dependabot auto-merge)
          on:
            pull_request:
              types: [opened, reopened, synchronize, ready_for_review]
            workflow_dispatch:
          permissions: {}
          jobs:
            auto-merge:
              if: github.actor == 'dependabot[bot]'
              runs-on: ubuntu-latest
              permissions:
                contents: write
                pull-requests: write
              steps:
                - name: Checkout
                  uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
                  with:
                    persist-credentials: false
                - name: Merge
                  run: echo "would gh pr merge --auto here"
          YML

      - name: Materialise failing fixture
        run: |
          set -euo pipefail
          mkdir -p /tmp/wfsec-fixtures/fail
          # This file intentionally trips every check the scanner
          # enforces. Do NOT add it to .github/workflows/, it lives
          # only inside /tmp during this job.
          cat > /tmp/wfsec-fixtures/fail/auto-merge-bad.yml <<'YML'
          name: Fail fixture (intentionally insecure auto-merge)
          on:
            pull_request_target:
              types: [opened]
            workflow_run:
              workflows: ["CI"]
              types: [completed]
          permissions: write-all
          jobs:
            merge:
              runs-on: ubuntu-latest
              permissions: write-all
              steps:
                - name: Checkout (unsafe, no persist-credentials)
                  uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
                - name: Pretend to merge
                  run: echo "this would auto-merge with full secrets"
          YML

      - name: Scanner must accept the passing fixture
        run: |
          set -euo pipefail
          if ! python3 .github/scripts/scan-automerge-workflows.py \
                 --dir /tmp/wfsec-fixtures/pass; then
            echo "::error::Self-test FAILED: scanner rejected the passing fixture."
            exit 1
          fi
          echo "Passing fixture accepted as expected."

      - name: Scanner must reject the failing fixture
        run: |
          set -euo pipefail
          # Capture stdout so we can also assert that each violation
          # class produced a distinct error annotation. We expect
          # the script to exit non-zero, so disable -e around the run.
          set +e
          python3 .github/scripts/scan-automerge-workflows.py \
            --dir /tmp/wfsec-fixtures/fail \
            > /tmp/wfsec-fixtures/fail.out 2>&1
          status=$?
          set -e
          cat /tmp/wfsec-fixtures/fail.out
          if [ "$status" -eq 0 ]; then
            echo "::error::Self-test FAILED: scanner accepted the failing fixture (expected non-zero exit)."
            exit 1
          fi
          # Each of these substrings corresponds to one of the five
          # check classes. If any go missing, a check has silently
          # been removed or weakened.
          required_substrings=(
            "pull_request_target"
            "workflow_run"
            "write-all"
            "persist-credentials"
            "disallowed trigger"
          )
          missing=0
          for needle in "${required_substrings[@]}"; do
            if ! grep -qF "$needle" /tmp/wfsec-fixtures/fail.out; then
              echo "::error::Self-test FAILED: expected substring not found in scanner output: $needle"
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            exit 1
          fi
          echo "Failing fixture rejected as expected, all violation classes reported."
