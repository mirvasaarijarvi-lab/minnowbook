name: Security Regression Tests (Live Integration)
#
# LIVE integration gate for security invariants — exercises the real
# Supabase project and deployed Edge Functions. These tests are slow
# and occasionally flaky on cold starts, so they are NOT a PR blocker.
#
# Triggers:
#   - schedule: daily at 06:17 UTC
#   - workflow_dispatch: manual on-demand run (e.g. after deploying an
#     edge function security fix)
#
# Test inventory lives in `vitest.security-live.files.ts` and is shared
# with `vitest.security.config.ts` so the unit and live runners cannot
# silently drop a test on the floor.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  schedule:
    # Daily at 06:17 UTC. Off-the-hour to avoid GitHub's hot cron slots.
    - cron: "17 6 * * *"
  workflow_dispatch:
    inputs:
      pattern:
        description: "Optional -t pattern to narrow the live run"
        required: false
        type: string

permissions: {}

jobs:
  security-tests-live:
    name: Run Live Security Integration Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    # Live suite has its own 180s per-test budget; cap total job time
    # well above worst-case to absorb cold starts but still fail fast
    # on a wedged Supabase project.
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: ./.github/actions/setup-bun-with-diagnostics

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: |
          rm -rf node_modules
          bun install --frozen-lockfile

      # Preflight: print a clear presence/absence table for every secret
      # the live suite consults. This runs BEFORE the resolution logic so
      # operators can see at a glance which GitHub Actions secrets are
      # missing without having to decode the fallback chain. Values are
      # never printed — only "present" / "MISSING".
      - name: Preflight - report Supabase secrets presence
        env:
          VITE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          BARE_URL: ${{ secrets.SUPABASE_URL }}
          BARE_PUB: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          BARE_ANON: ${{ secrets.SUPABASE_ANON_KEY }}
          BARE_SR: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          status() { [ -n "$1" ] && echo "present" || echo "MISSING"; }

          V_URL=$(status "$VITE_URL")
          V_KEY=$(status "$VITE_KEY")
          B_URL=$(status "$BARE_URL")
          B_PUB=$(status "$BARE_PUB")
          B_ANON=$(status "$BARE_ANON")
          B_SR=$(status "$BARE_SR")

          {
            echo "### Supabase secrets preflight"
            echo ""
            echo "| Secret | Status |"
            echo "| --- | --- |"
            echo "| VITE_SUPABASE_URL | $V_URL |"
            echo "| VITE_SUPABASE_PUBLISHABLE_KEY | $V_KEY |"
            echo "| SUPABASE_URL | $B_URL |"
            echo "| SUPABASE_PUBLISHABLE_KEY | $B_PUB |"
            echo "| SUPABASE_ANON_KEY | $B_ANON |"
            echo "| SUPABASE_SERVICE_ROLE_KEY | $B_SR (service-role is rejected) |"
          } | tee -a "$GITHUB_STEP_SUMMARY"

          echo ""
          echo "Live suite needs ONE url + ONE non-privileged key:"
          echo "  url  = VITE_SUPABASE_URL  OR  SUPABASE_URL"
          echo "  key  = VITE_SUPABASE_PUBLISHABLE_KEY  OR  SUPABASE_PUBLISHABLE_KEY  OR  SUPABASE_ANON_KEY"

          MISSING=""
          if [ -z "$VITE_URL" ] && [ -z "$BARE_URL" ]; then
            MISSING="$MISSING\n  - URL: add VITE_SUPABASE_URL (or SUPABASE_URL)"
          fi
          if [ -z "$VITE_KEY" ] && [ -z "$BARE_PUB" ] && [ -z "$BARE_ANON" ]; then
            MISSING="$MISSING\n  - KEY: add VITE_SUPABASE_PUBLISHABLE_KEY (or SUPABASE_PUBLISHABLE_KEY / SUPABASE_ANON_KEY)"
          fi
          if [ -n "$MISSING" ]; then
            printf "::warning::Missing required GitHub Actions secrets:%b\n" "$MISSING"
          else
            echo "✅ All required credentials are present."
          fi

      # Live integration tests need a real Supabase URL + a NON-PRIVILEGED
      # key (publishable/anon). Service-role would bypass RLS and silently
      # turn isolation assertions into no-ops, so we explicitly refuse it.
      # Fallback chain mirrors the previous in-line pagination check.
      - name: Check live-integration prerequisites
        id: live_check

        env:
          VITE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          BARE_URL: ${{ secrets.SUPABASE_URL }}
          BARE_PUB: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          BARE_ANON: ${{ secrets.SUPABASE_ANON_KEY }}
          BARE_SR: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          RESOLVED_URL="${VITE_URL:-$BARE_URL}"
          RESOLVED_KEY="${VITE_KEY:-${BARE_PUB:-$BARE_ANON}}"

          # Manual dispatch = hard-fail on missing/invalid creds (operator
          # explicitly asked for a run). Scheduled cron = soft-skip so a
          # repo without GitHub Actions secrets configured doesn't email
          # a red X every morning. Either way we never run with only a
          # service-role key (would bypass RLS).
          IS_MANUAL="false"
          if [ "${GITHUB_EVENT_NAME:-}" = "workflow_dispatch" ]; then
            IS_MANUAL="true"
          fi

          if [ -n "$RESOLVED_URL" ] && [ -n "$RESOLVED_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "resolved_url=$RESOLVED_URL" >> "$GITHUB_OUTPUT"
            echo "::add-mask::$RESOLVED_KEY"
            echo "resolved_key=$RESOLVED_KEY" >> "$GITHUB_OUTPUT"
            echo "✅ Live Supabase credentials present, running live integration suite."
          elif [ -n "$BARE_SR" ] && [ -z "$RESOLVED_KEY" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            MSG="Only SUPABASE_SERVICE_ROLE_KEY is configured. Live security tests refuse to run with service-role (would bypass RLS). Add SUPABASE_PUBLISHABLE_KEY or SUPABASE_ANON_KEY."
            if [ "$IS_MANUAL" = "true" ]; then
              echo "::error::$MSG"
              exit 1
            fi
            echo "::warning::$MSG (scheduled run, soft-skipping)"
            echo "### ⚠️ Live security tests skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "$MSG" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            MSG="No Supabase URL + publishable/anon key pair configured. Live security tests cannot run. Add VITE_SUPABASE_URL and VITE_SUPABASE_PUBLISHABLE_KEY (or SUPABASE_URL + SUPABASE_PUBLISHABLE_KEY/SUPABASE_ANON_KEY) under repo Settings → Secrets and variables → Actions."
            if [ "$IS_MANUAL" = "true" ]; then
              echo "::error::$MSG"
              exit 1
            fi
            echo "::warning::$MSG (scheduled run, soft-skipping)"
            echo "### ⚠️ Live security tests skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "$MSG" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Run live security integration suite
        id: live_run
        if: steps.live_check.outputs.enabled == 'true'
        env:
          VITE_SUPABASE_URL: ${{ steps.live_check.outputs.resolved_url }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ steps.live_check.outputs.resolved_key }}
          PATTERN: ${{ inputs.pattern }}
        run: |
          if [ -n "$PATTERN" ]; then
            bunx vitest run \
              --config vitest.security-live.config.ts \
              --reporter=verbose \
              -t "$PATTERN"
          else
            bunx vitest run \
              --config vitest.security-live.config.ts \
              --reporter=verbose
          fi

      - name: Status summary
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ENABLED: ${{ steps.live_check.outputs.enabled }}
          CHECK_OUTCOME: ${{ steps.live_check.outcome }}
          RUN_OUTCOME: ${{ steps.live_run.outcome }}
          PATTERN: ${{ inputs.pattern }}
        run: |
          # Resolve a clickable link to THIS job's logs. The jobs REST
          # endpoint is the only reliable source for the per-job URL --
          # GITHUB_JOB is the key, not the display name. Falls back to
          # the run URL if the API call fails (no token, rate limit).
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/attempts/${GITHUB_RUN_ATTEMPT}"
          JOB_URL="$RUN_URL"
          if command -v jq >/dev/null 2>&1 && [ -n "${GITHUB_TOKEN:-}" ]; then
            API="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/attempts/${GITHUB_RUN_ATTEMPT}/jobs"
            RESOLVED=$(curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "$API" 2>/dev/null \
              | jq -r --arg job "$GITHUB_JOB" '.jobs[] | select(.name == $job) | .html_url' \
              | head -n1)
            if [ -n "$RESOLVED" ] && [ "$RESOLVED" != "null" ]; then
              JOB_URL="$RESOLVED"
            fi
          fi

          # Derive a single PASS / FAIL / SKIPPED verdict.
          STATUS="UNKNOWN"
          DETAIL=""
          if [ "$ENABLED" = "true" ]; then
            case "$RUN_OUTCOME" in
              success)   STATUS="PASS"; DETAIL="Live security integration suite passed." ;;
              failure)   STATUS="FAIL"; DETAIL="Live security integration suite failed. See job logs." ;;
              cancelled) STATUS="FAIL"; DETAIL="Live security integration suite was cancelled." ;;
              *)         STATUS="FAIL"; DETAIL="Live security integration suite did not complete (outcome: ${RUN_OUTCOME:-none})." ;;
            esac
          else
            if [ "$CHECK_OUTCOME" = "failure" ]; then
              STATUS="FAIL"
              DETAIL="Preflight credential check failed (manual dispatch requires Supabase URL + non-privileged key)."
            else
              STATUS="SKIPPED"
              DETAIL="No live credentials configured. Scheduled run soft-skipped, see the preflight table above."
            fi
          fi

          case "$STATUS" in
            PASS)    ICON="✅" ;;
            FAIL)    ICON="❌" ;;
            SKIPPED) ICON="⏭️" ;;
            *)       ICON="❓" ;;
          esac

          {
            echo ""
            echo "### $ICON Live Security Integration Tests: $STATUS"
            echo ""
            echo "- **Job:** [\`${GITHUB_JOB}\`]($JOB_URL)"
            echo "- **Workflow run:** [#${GITHUB_RUN_NUMBER} (attempt ${GITHUB_RUN_ATTEMPT})]($RUN_URL)"
            echo "- **Trigger:** \`${GITHUB_EVENT_NAME}\`${PATTERN:+ (pattern: \`$PATTERN\`)}"
            echo "- **Detail:** $DETAIL"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "$ICON $STATUS - $DETAIL"
          echo "Job logs: $JOB_URL"
