name: Security Regression Tests (Live Integration)
#
# LIVE integration gate for security invariants — exercises the real
# Supabase project and deployed Edge Functions. These tests are slow
# and occasionally flaky on cold starts, so they are NOT a PR blocker.
#
# Triggers:
#   - schedule: daily at 06:17 UTC
#   - workflow_dispatch: manual on-demand run (e.g. after deploying an
#     edge function security fix)
#
# Test inventory lives in `vitest.security-live.files.ts` and is shared
# with `vitest.security.config.ts` so the unit and live runners cannot
# silently drop a test on the floor.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  schedule:
    # Daily at 06:17 UTC. Off-the-hour to avoid GitHub's hot cron slots.
    - cron: "17 6 * * *"
  workflow_dispatch:
    inputs:
      pattern:
        description: "Optional -t pattern to narrow the live run"
        required: false
        type: string

permissions: {}

jobs:
  security-tests-live:
    name: Run Live Security Integration Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    # Live suite has its own 180s per-test budget; cap total job time
    # well above worst-case to absorb cold starts but still fail fast
    # on a wedged Supabase project.
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.1
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: ./.github/actions/setup-bun-with-diagnostics

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: |
          rm -rf node_modules
          bun install --frozen-lockfile

      # Preflight: presence-check Supabase secrets, mask values, resolve
      # the URL/key fallback chain. fail_on_missing=true makes this a
      # hard gate -- if a required secret is MISSING, the job fails here
      # and the security test step never runs. Scheduled runs that need
      # a soft-skip should set this to "auto" instead.
      - name: Supabase preflight
        id: live_check
        uses: ./.github/actions/supabase-preflight
        with:
          vite_supabase_url: ${{ secrets.VITE_SUPABASE_URL }}
          vite_supabase_publishable_key: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          supabase_url: ${{ secrets.SUPABASE_URL }}
          supabase_publishable_key: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          supabase_anon_key: ${{ secrets.SUPABASE_ANON_KEY }}
          supabase_service_role_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          fail_on_missing: "true"
          label: "Live Security Integration Tests - Supabase preflight"

      # Belt-and-braces fail-fast: even if the composite action's exit
      # code is ever bypassed (e.g. someone adds continue-on-error), this
      # explicit gate refuses to proceed unless the preflight resolved a
      # usable URL + non-privileged key.
      - name: Fail fast if preflight did not enable the suite
        if: steps.live_check.outputs.enabled != 'true'
        run: |
          echo "::error::Supabase preflight did not produce usable credentials (enabled=${{ steps.live_check.outputs.enabled }}). Refusing to run security tests."
          exit 1



      - name: Run live security integration suite
        id: live_run
        if: steps.live_check.outputs.enabled == 'true'
        env:
          VITE_SUPABASE_URL: ${{ steps.live_check.outputs.resolved_url }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ steps.live_check.outputs.resolved_key }}
          PATTERN: ${{ inputs.pattern }}
        run: |
          if [ -n "$PATTERN" ]; then
            bunx vitest run \
              --config vitest.security-live.config.ts \
              --reporter=verbose \
              -t "$PATTERN"
          else
            bunx vitest run \
              --config vitest.security-live.config.ts \
              --reporter=verbose
          fi

      - name: Status summary
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ENABLED: ${{ steps.live_check.outputs.enabled }}
          CHECK_OUTCOME: ${{ steps.live_check.outcome }}
          RUN_OUTCOME: ${{ steps.live_run.outcome }}
          PATTERN: ${{ inputs.pattern }}
        run: |
          # Resolve a clickable link to THIS job's logs. The jobs REST
          # endpoint is the only reliable source for the per-job URL --
          # GITHUB_JOB is the key, not the display name. Falls back to
          # the run URL if the API call fails (no token, rate limit).
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/attempts/${GITHUB_RUN_ATTEMPT}"
          JOB_URL="$RUN_URL"
          if command -v jq >/dev/null 2>&1 && [ -n "${GITHUB_TOKEN:-}" ]; then
            API="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/attempts/${GITHUB_RUN_ATTEMPT}/jobs"
            RESOLVED=$(curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "$API" 2>/dev/null \
              | jq -r --arg job "$GITHUB_JOB" '.jobs[] | select(.name == $job) | .html_url' \
              | head -n1)
            if [ -n "$RESOLVED" ] && [ "$RESOLVED" != "null" ]; then
              JOB_URL="$RESOLVED"
            fi
          fi

          # Derive a single PASS / FAIL / SKIPPED verdict.
          STATUS="UNKNOWN"
          DETAIL=""
          if [ "$ENABLED" = "true" ]; then
            case "$RUN_OUTCOME" in
              success)   STATUS="PASS"; DETAIL="Live security integration suite passed." ;;
              failure)   STATUS="FAIL"; DETAIL="Live security integration suite failed. See job logs." ;;
              cancelled) STATUS="FAIL"; DETAIL="Live security integration suite was cancelled." ;;
              *)         STATUS="FAIL"; DETAIL="Live security integration suite did not complete (outcome: ${RUN_OUTCOME:-none})." ;;
            esac
          else
            if [ "$CHECK_OUTCOME" = "failure" ]; then
              STATUS="FAIL"
              DETAIL="Preflight credential check failed (manual dispatch requires Supabase URL + non-privileged key)."
            else
              STATUS="SKIPPED"
              DETAIL="No live credentials configured. Scheduled run soft-skipped, see the preflight table above."
            fi
          fi

          case "$STATUS" in
            PASS)    ICON="✅" ;;
            FAIL)    ICON="❌" ;;
            SKIPPED) ICON="⏭️" ;;
            *)       ICON="❓" ;;
          esac

          {
            echo ""
            echo "### $ICON Live Security Integration Tests: $STATUS"
            echo ""
            echo "- **Job:** [\`${GITHUB_JOB}\`]($JOB_URL)"
            echo "- **Workflow run:** [#${GITHUB_RUN_NUMBER} (attempt ${GITHUB_RUN_ATTEMPT})]($RUN_URL)"
            echo "- **Trigger:** \`${GITHUB_EVENT_NAME}\`${PATTERN:+ (pattern: \`$PATTERN\`)}"
            echo "- **Detail:** $DETAIL"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "$ICON $STATUS - $DETAIL"
          echo "Job logs: $JOB_URL"
