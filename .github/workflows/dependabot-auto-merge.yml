name: Dependabot auto-merge

# Auto-merges low-risk Dependabot PRs once required CI checks pass.
#
# Risk policy:
#   - patch updates              -> auto-merge (squash)
#   - minor updates (devDeps)    -> auto-merge (squash)
#   - minor updates (prod)       -> label only, human review
#   - major updates              -> label only, human review
#   - security updates           -> auto-merge regardless of bump (patch/minor/major)
#
# Auto-merge in GitHub waits for all required status checks (branch
# protection) to go green before actually merging, so a failing
# dependency-audit / changelog / typecheck job will block the merge.
#
# Security hardening:
#   - Uses `pull_request` (NOT `pull_request_target`) to avoid running
#     with elevated privileges in the context of an attacker-controlled
#     PR head. Dependabot PRs originate from branches inside this repo,
#     so the default GITHUB_TOKEN is available and sufficient.
#   - Restricts execution to PRs actually opened by `dependabot[bot]`.
#   - Minimal permissions, scoped per-job.
#   - Third-party actions pinned to commit SHAs.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions: {}

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        # dependabot/fetch-metadata@v2.2.0
        uses: dependabot/fetch-metadata@dbb049abf0d677abbd7f7eee0375145b417fdd34
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve and enable auto-merge for low-risk updates
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          (steps.meta.outputs.update-type == 'version-update:semver-minor' && steps.meta.outputs.dependency-type == 'direct:development') ||
          steps.meta.outputs.dependency-group == 'security' ||
          contains(steps.meta.outputs.alert-state, 'open')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr merge --auto --squash "$PR_URL"

      - name: Label PRs that need human review
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-major' ||
          (steps.meta.outputs.update-type == 'version-update:semver-minor' && steps.meta.outputs.dependency-type == 'direct:production')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr edit "$PR_URL" --add-label "needs-human-review"
