name: Billing & RPC Hardening Regression
#
# Focused live regression gate for the four billing/RPC vulnerabilities
# closed on 2026-07-22:
#
#   1. create_tenant free upgrade to paid tiers
#   2. tenants.tier / Stripe / discount self-write via RLS UPDATE
#   3. copy_tenant_defaults_to_site cross-tenant / mismatched-site bypass
#   4. anonymous reservation insert self-applying discount fields
#
# Assertions live across the security role/hardening suites in
# `src/test/security/` (billing-and-rpc-hardening*.test.ts, the
# billing-and-discount role matrix, custom-role-key-assignment, and
# related role/auth regressions).
#
# The suite runs on every PR that touches:
#   - Any DB migration (schema, RLS, RPC, trigger definitions)
#   - Any Supabase Edge Function (server-side auth/role boundary)
#   - Any auth/role/permission/tenant client library or hook
#   - Any security regression test or its vitest config
#   - This workflow itself
#
# Skips cleanly when live Supabase credentials are missing (fork PRs).

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      # DB surface — migrations define schema, RLS, triggers, RPCs.
      - "supabase/migrations/**"
      # ALL edge functions — they run as service_role and enforce
      # server-side auth/role boundaries for every hardened path.
      - "supabase/functions/**"
      - "supabase/config.toml"
      # Client-side auth/role/permission/tenant logic.
      - "src/hooks/useIsSystemAdmin.ts"
      - "src/hooks/useTenant.ts"
      - "src/hooks/usePermissions.ts"
      - "src/hooks/useTierGate.ts"
      - "src/lib/permissions.ts"
      - "src/integrations/supabase/**"
      - "src/contexts/AuthContext.tsx"
      - "src/components/AdminPanel.tsx"
      # Security regression suites + their vitest wiring.
      - "src/test/security/**"
      - "vitest.security-live.files.ts"
      - "vitest.security-live.config.ts"
      - ".github/workflows/billing-hardening-regression.yml"
      - ".github/actions/supabase-preflight/**"
  pull_request:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/functions/**"
      - "supabase/config.toml"
      - "src/hooks/useIsSystemAdmin.ts"
      - "src/hooks/useTenant.ts"
      - "src/hooks/usePermissions.ts"
      - "src/hooks/useTierGate.ts"
      - "src/lib/permissions.ts"
      - "src/integrations/supabase/**"
      - "src/contexts/AuthContext.tsx"
      - "src/components/AdminPanel.tsx"
      - "src/test/security/**"
      - "vitest.security-live.files.ts"
      - "vitest.security-live.config.ts"
      - ".github/workflows/billing-hardening-regression.yml"
      - ".github/actions/supabase-preflight/**"
  workflow_dispatch:

permissions: {}

jobs:
  billing-hardening:
    name: Billing & RPC hardening regression
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: ./.github/actions/setup-bun-with-diagnostics

      - name: Cache Bun dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: |
          rm -rf node_modules
          bun install --frozen-lockfile

      # Presence-check Supabase creds and set fail_on_missing=auto so
      # fork PRs (which don't inherit secrets) soft-skip rather than
      # false-fail. Same-repo PRs and pushes to main have full creds
      # and will hard-run.
      - name: Supabase preflight
        id: live_check
        uses: ./.github/actions/supabase-preflight
        with:
          vite_supabase_url: ${{ secrets.VITE_SUPABASE_URL }}
          vite_supabase_publishable_key: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          supabase_url: ${{ secrets.SUPABASE_URL }}
          supabase_publishable_key: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          supabase_anon_key: ${{ secrets.SUPABASE_ANON_KEY }}
          supabase_service_role_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          fail_on_missing: "auto"
          label: "Billing & RPC hardening regression - Supabase preflight"

      - name: Prepare reports directory
        if: always()
        run: mkdir -p reports/billing-hardening

      - name: Run focused regression suite
        id: run_regression
        if: steps.live_check.outputs.enabled == 'true'
        env:
          VITE_SUPABASE_URL: ${{ steps.live_check.outputs.resolved_url }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ steps.live_check.outputs.resolved_key }}
          SUPABASE_URL: ${{ steps.live_check.outputs.resolved_url }}
          SUPABASE_ANON_KEY: ${{ steps.live_check.outputs.resolved_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        # Emit both a JUnit XML report (for CI viewers / annotations) and a
        # JSON report (structured per-test data) alongside a plain-text log
        # tee so failures can be debugged post-mortem from the uploaded
        # artifact bundle without re-running the suite. `set -o pipefail`
        # preserves vitest's non-zero exit through `tee`.
        run: |
          set -o pipefail
          bunx vitest run \
            --config vitest.security-live.config.ts \
            --reporter=verbose \
            --reporter=junit \
            --reporter=json \
            --outputFile.junit=reports/billing-hardening/junit.xml \
            --outputFile.json=reports/billing-hardening/results.json \
            src/test/security/billing-and-rpc-hardening.test.ts \
            src/test/security/billing-and-rpc-hardening-roles.test.ts \
            src/test/security/billing-and-discount-role-matrix.test.ts \
            src/test/security/custom-role-key-assignment.test.ts \
            src/test/security/custom-role-key-assignment-db.test.ts \
            src/test/security/reservations-anon-discount-malformed.test.ts \
            2>&1 | tee reports/billing-hardening/vitest.log

      - name: Capture runtime diagnostics
        if: always()
        env:
          ENABLED: ${{ steps.live_check.outputs.enabled }}
          OUTCOME: ${{ steps.run_regression.outcome }}
          EVENT: ${{ github.event_name }}
          REF: ${{ github.ref }}
          SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          {
            echo "event=$EVENT"
            echo "ref=$REF"
            echo "sha=$SHA"
            echo "run_id=$RUN_ID"
            echo "run_attempt=$RUN_ATTEMPT"
            echo "live_check_enabled=$ENABLED"
            echo "regression_outcome=$OUTCOME"
            echo "node=$(node --version 2>/dev/null || echo 'n/a')"
            echo "bun=$(bun --version 2>/dev/null || echo 'n/a')"
            echo "os=$(uname -a)"
          } > reports/billing-hardening/run-metadata.txt

      - name: Upload regression report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: billing-hardening-reports-${{ github.run_id }}-${{ github.run_attempt }}
          path: reports/billing-hardening/
          if-no-files-found: warn
          retention-days: 14

      - name: Summary
        if: always()
        env:
          ENABLED: ${{ steps.live_check.outputs.enabled }}
          OUTCOME: ${{ steps.run_regression.outcome }}
        run: |
          if [ "$ENABLED" != "true" ]; then
            echo "### ⏭️ Billing & RPC hardening regression: SKIPPED" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Live Supabase credentials are not available in this run (likely a fork PR)." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          case "$OUTCOME" in
            success)
              echo "### ✅ Billing & RPC hardening regression: PASS" >> "$GITHUB_STEP_SUMMARY" ;;
            *)
              echo "### ❌ Billing & RPC hardening regression: FAIL ($OUTCOME)" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "A migration or edge-function change may have reintroduced one of the four hardened vulnerabilities." >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "Download the **billing-hardening-reports-${{ github.run_id }}-${{ github.run_attempt }}** artifact for the JUnit XML, JSON results, full vitest log, and run metadata." >> "$GITHUB_STEP_SUMMARY" ;;
          esac

