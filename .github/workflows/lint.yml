name: Lint

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: ./.github/actions/setup-bun-with-diagnostics

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Verify bun.lock is in sync with package.json
        uses: ./.github/actions/verify-bun-lockfile-sync

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bunx eslint .

      - name: Lint BlogPost JSON-LD (fails on any warning)
        id: blog_jsonld
        run: bun run lint:blog-jsonld
        env:
          BLOG_JSONLD_REPORT_DIR: blog-jsonld-report

      - name: Upload BlogPost JSON-LD report
        if: always() && hashFiles('blog-jsonld-report/report.json') != ''
        uses: actions/upload-artifact@v7
        with:
          name: blog-jsonld-report
          path: blog-jsonld-report/
          if-no-files-found: ignore
          retention-days: 14

