name: Cross-Tenant RLS (Local Supabase)

# Boots a fully local Supabase stack via the Supabase CLI on every push/PR,
# applies the project's migrations, seeds two tenants + two users with the
# `seed-rls-test-data.ts` script, and runs the cross-tenant RLS live-mode
# tests against it. This means the live-mode coverage no longer depends on
# a staging project being reachable — every PR exercises the full sweep
# (anon denial + authenticated cross-tenant denial + write/delete denial +
# positive controls) in an isolated ephemeral database.
#
# When the stack fails to start (e.g. Docker unavailable on a runner) the
# job emits a clear skip notice and exits 0 so it doesn't block PRs that
# are otherwise green.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  rls-local:
    name: Cross-Tenant RLS (local stack, ${{ matrix.label }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: core
            flavor: local-core
            command: test:rls-report:core
          - label: storage-baseline
            flavor: local-storage-baseline
            command: test:rls-report:storage-baseline
          - label: storage-nested-private
            flavor: local-storage-nested-private
            command: test:rls-report:storage-nested-private
          - label: storage-nested-assets
            flavor: local-storage-nested-assets
            command: test:rls-report:storage-nested-assets
          - label: storage-adversarial
            flavor: local-storage-adversarial
            command: test:rls-report:storage-adversarial
          - label: storage-assets
            flavor: local-storage-assets
            command: test:rls-report:storage-assets
          - label: storage-multipart
            flavor: local-storage-multipart
            command: test:rls-report:storage-multipart

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      # Cache Bun's global module store keyed on the lockfile so unchanged
      # dependency graphs reuse the previous run's downloads. The local
      # Supabase stack itself stays ephemeral — only the JS package cache
      # persists across runs, which is safe because lockfile changes
      # invalidate the key automatically.
      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # Pre-flight: confirm Docker is actually usable on this runner BEFORE
      # invoking `supabase start`. When a hosted runner image lacks Docker
      # (which has happened intermittently on GitHub-hosted ARM runners and
      # on self-hosted minimal images), letting `supabase start` fail
      # produces a noisy red `Process completed with exit code 1` annotation
      # even when wrapped in `continue-on-error: true`. Detecting the
      # missing daemon up front lets us skip the entire stack-start path
      # cleanly with a notice instead.
      - name: Detect Docker availability
        id: docker-check
        run: |
          set +e
          if ! command -v docker >/dev/null 2>&1; then
            echo "::notice::docker CLI not present on this runner."
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! docker info >/dev/null 2>&1; then
            echo "::notice::docker daemon not reachable on this runner."
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Docker is available: $(docker --version)"
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Skip if Docker unavailable
        if: steps.docker-check.outputs.available != 'true'
        run: |
          echo "::notice::Docker unavailable on this runner — skipping local-stack RLS tests."
          echo "skip_reason=docker-unavailable" >> "$GITHUB_ENV"

      # ============================================================
      # REMOTE FALLBACK
      # ============================================================
      # When the local stack can't boot (no Docker on the runner), we still
      # want some live-mode RLS coverage rather than a silent skip. If the
      # repository has the remote staging credentials configured (the same
      # secrets used by `cross-tenant-rls.yml`), re-run the same sweep
      # against the remote backend instead.
      #
      # Required secrets for fallback:
      #   - VITE_SUPABASE_URL
      #   - VITE_SUPABASE_PUBLISHABLE_KEY
      #   - RLS_TEST_TENANT_A_EMAIL / _PASSWORD / _ID
      #   - RLS_TEST_TENANT_B_EMAIL / _PASSWORD / _ID
      #
      # If any are missing the fallback self-skips cleanly with a notice;
      # the job stays green (matches existing skip behavior).
      - name: Detect remote fallback prerequisites
        id: remote-check
        if: steps.docker-check.outputs.available != 'true'
        env:
          REMOTE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          REMOTE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          A_EMAIL: ${{ secrets.RLS_TEST_TENANT_A_EMAIL }}
          A_PASSWORD: ${{ secrets.RLS_TEST_TENANT_A_PASSWORD }}
          A_ID: ${{ secrets.RLS_TEST_TENANT_A_ID }}
          B_EMAIL: ${{ secrets.RLS_TEST_TENANT_B_EMAIL }}
          B_PASSWORD: ${{ secrets.RLS_TEST_TENANT_B_PASSWORD }}
          B_ID: ${{ secrets.RLS_TEST_TENANT_B_ID }}
        run: |
          missing=()
          [ -z "$REMOTE_URL" ]   && missing+=("VITE_SUPABASE_URL")
          [ -z "$REMOTE_KEY" ]   && missing+=("VITE_SUPABASE_PUBLISHABLE_KEY")
          [ -z "$A_EMAIL" ]      && missing+=("RLS_TEST_TENANT_A_EMAIL")
          [ -z "$A_PASSWORD" ]   && missing+=("RLS_TEST_TENANT_A_PASSWORD")
          [ -z "$A_ID" ]         && missing+=("RLS_TEST_TENANT_A_ID")
          [ -z "$B_EMAIL" ]      && missing+=("RLS_TEST_TENANT_B_EMAIL")
          [ -z "$B_PASSWORD" ]   && missing+=("RLS_TEST_TENANT_B_PASSWORD")
          [ -z "$B_ID" ]         && missing+=("RLS_TEST_TENANT_B_ID")
          if [ ${#missing[@]} -eq 0 ]; then
            echo "✅ All remote-fallback secrets present — will run RLS sweep against remote backend."
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Remote-fallback secrets missing (${missing[*]}) — RLS sweep cannot run."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies (remote fallback)
        if: steps.docker-check.outputs.available != 'true' && steps.remote-check.outputs.enabled == 'true'
        run: bun install --frozen-lockfile

      - name: Run cross-tenant RLS tests (remote fallback)
        id: remote-rls-tests
        if: steps.docker-check.outputs.available != 'true' && steps.remote-check.outputs.enabled == 'true'
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          RLS_TEST_TENANT_A_EMAIL: ${{ secrets.RLS_TEST_TENANT_A_EMAIL }}
          RLS_TEST_TENANT_A_PASSWORD: ${{ secrets.RLS_TEST_TENANT_A_PASSWORD }}
          RLS_TEST_TENANT_A_ID: ${{ secrets.RLS_TEST_TENANT_A_ID }}
          RLS_TEST_TENANT_B_EMAIL: ${{ secrets.RLS_TEST_TENANT_B_EMAIL }}
          RLS_TEST_TENANT_B_PASSWORD: ${{ secrets.RLS_TEST_TENANT_B_PASSWORD }}
          RLS_TEST_TENANT_B_ID: ${{ secrets.RLS_TEST_TENANT_B_ID }}
          RLS_STORAGE_DENIAL_CALL_TIMEOUT_MS: 6000
          RLS_STORAGE_ALLOWED_CALL_TIMEOUT_MS: 25000
          RLS_STORAGE_FETCH_TIMEOUT_MS: 25000
          RLS_STORAGE_ALLOWED_RETRY_ATTEMPTS: 3
          # Tag the report so the remote-fallback artifact is distinguishable
          # from the local-stack artifact (different filename suffix).
          RLS_REPORT_FLAVOR: remote-fallback-${{ matrix.label }}
        run: bun run ${{ matrix.command }}

      - name: Upload RLS report (remote fallback)
        if: always() && steps.docker-check.outputs.available != 'true' && steps.remote-check.outputs.enabled == 'true' && steps.remote-rls-tests.conclusion != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: rls-report-remote-fallback-${{ matrix.label }}
          path: reports/
          retention-days: 14
          if-no-files-found: warn

      # When the fallback ran (success OR failure), clear the skip notice so
      # the final Summary step reflects what actually happened. The job's
      # exit status is still driven by the `remote-rls-tests` step itself.
      - name: Mark fallback ran (override skip notice)
        if: always() && (steps.remote-rls-tests.outcome == 'success' || steps.remote-rls-tests.outcome == 'failure')
        run: |
          echo "skip_reason=" >> "$GITHUB_ENV"
          echo "fallback_ran=remote" >> "$GITHUB_ENV"
          echo "fallback_outcome=${{ steps.remote-rls-tests.outcome }}" >> "$GITHUB_ENV"
      # ============================================================
      # END REMOTE FALLBACK
      # ============================================================

      - name: Setup Supabase CLI
        id: supabase-cli
        if: steps.docker-check.outputs.available == 'true'
        # Pinned to a full commit SHA to mitigate supply-chain risk if the
        # `v2` tag is moved/compromised. Update by replacing both the SHA
        # and the trailing comment with a newer release from
        # https://github.com/supabase/setup-cli/releases.
        uses: supabase/setup-cli@b579fc8c7122aa485f1d947120eaeb11ee04d312 # v2.0.0
        with:
          version: latest
        continue-on-error: true

      - name: Skip if Supabase CLI unavailable
        if: steps.docker-check.outputs.available == 'true' && steps.supabase-cli.outcome != 'success'
        run: |
          echo "::notice::Supabase CLI could not be installed on this runner — skipping local-stack RLS tests."
          echo "skip_reason=cli-unavailable" >> "$GITHUB_ENV"

      - name: Install dependencies
        if: steps.docker-check.outputs.available == 'true' && steps.supabase-cli.outcome == 'success'
        run: bun install --frozen-lockfile

      # Several historical migrations contain hardcoded seed data tied to a
      # production tenant UUID. On a fresh local stack that tenant doesn't
      # exist, so the FK-bearing INSERTs fail. Pre-create a placeholder
      # tenant row via a CI-only migration with a timestamp earlier than
      # any seed migration. This file is generated at runtime and never
      # committed; it has zero effect on environments where the tenant
      # already exists (ON CONFLICT DO NOTHING).
      # The placeholder must run AFTER `public.tenants` is created
      # (migration 20260224082114) but BEFORE the first seed migration
      # that references this tenant id (20260224104504). We pick a
      # timestamp one second after the table-creation migration so it
      # sorts correctly between the two. The tenants table also requires
      # a non-null owner_user_id referencing auth.users, so we create a
      # placeholder auth user via a DO block (auth schema exists at this
      # point because gotrue migrations run during `supabase start`
      # initialisation, before our public migrations).
      - name: Inject placeholder tenant for local-only seed data
        if: steps.docker-check.outputs.available == 'true' && steps.supabase-cli.outcome == 'success'
        run: |
          set -euo pipefail
          cat > supabase/migrations/20260224082115_ci_placeholder_tenant.sql <<'SQL'
          -- CI-only placeholder. Creates synthetic auth users + tenant
          -- so historical seed migrations (which hardcode a production
          -- tenant id) can satisfy their FK constraints in an empty
          -- local stack. No-op when the rows already exist.
          INSERT INTO auth.users (id, instance_id, aud, role, email, encrypted_password, email_confirmed_at, created_at, updated_at)
          VALUES (
            '00000000-0000-0000-0000-0000000000c1',
            '00000000-0000-0000-0000-000000000000',
            'authenticated',
            'authenticated',
            'ci-placeholder@example.invalid',
            crypt('ci-placeholder-password', gen_salt('bf')),
            now(), now(), now()
          )
          ON CONFLICT (id) DO NOTHING;

          -- Placeholder staff user referenced by legacy site_users seed
          INSERT INTO auth.users (id, instance_id, aud, role, email, encrypted_password, email_confirmed_at, created_at, updated_at)
          VALUES (
            'ea50e91e-5dbf-4dcc-a13c-f96c4016f952',
            '00000000-0000-0000-0000-000000000000',
            'authenticated',
            'authenticated',
            'ci-placeholder-staff@example.invalid',
            crypt('ci-placeholder-password', gen_salt('bf')),
            now(), now(), now()
          )
          ON CONFLICT (id) DO NOTHING;

          -- GoTrue's listUsers query scans token columns into Go strings and
          -- fails with "Database error finding users" when they are NULL.
          -- Normalize all manually inserted rows to empty strings.
          UPDATE auth.users SET
            confirmation_token = COALESCE(confirmation_token, ''),
            recovery_token = COALESCE(recovery_token, ''),
            email_change_token_new = COALESCE(email_change_token_new, ''),
            email_change = COALESCE(email_change, ''),
            phone_change = COALESCE(phone_change, ''),
            phone_change_token = COALESCE(phone_change_token, ''),
            email_change_token_current = COALESCE(email_change_token_current, ''),
            reauthentication_token = COALESCE(reauthentication_token, '')
          WHERE confirmation_token IS NULL
             OR recovery_token IS NULL
             OR email_change_token_new IS NULL
             OR email_change IS NULL
             OR phone_change IS NULL
             OR phone_change_token IS NULL
             OR email_change_token_current IS NULL
             OR reauthentication_token IS NULL;

          INSERT INTO public.tenants (id, name, slug, tier, is_active, subscription_status, owner_user_id)
          VALUES (
            '9ac05fbf-0834-44fd-a52a-d030b7074a30',
            'CI Placeholder Tenant',
            'ci-placeholder-tenant',
            'business',
            true,
            'active',
            '00000000-0000-0000-0000-0000000000c1'
          )
          ON CONFLICT (id) DO NOTHING;
          SQL

          # Site placeholders must run AFTER the sites table is created
          # (migration 20260303093523_*) and BEFORE legacy seeds that
          # reference hardcoded site ids.
          cat > supabase/migrations/20260303093524_ci_placeholder_site.sql <<'SQL'
          INSERT INTO public.sites (id, tenant_id, name, slug, is_active)
          VALUES
            (
              'b040ab30-f4d2-45cc-8695-2000572428d7',
              '9ac05fbf-0834-44fd-a52a-d030b7074a30',
              'CI Placeholder Site',
              'ci-placeholder-site',
              true
            ),
            (
              '51fb4748-3b84-471a-b9a0-b5aac88191b9',
              '9ac05fbf-0834-44fd-a52a-d030b7074a30',
              'CI Placeholder Eventos Site',
              'ci-placeholder-eventos-site',
              true
            )
          ON CONFLICT (id) DO NOTHING;
          SQL

      # `continue-on-error` is intentionally NOT set here. Docker availability
      # is verified up-front by `docker-check`, so any failure at this point
      # is a genuine bug (corrupt migration, port collision, image pull
      # failure on the GitHub Container Registry, etc.) and should fail the
      # job loudly rather than be silently swallowed.
      - name: Start local Supabase stack
        id: supabase-start
        if: steps.docker-check.outputs.available == 'true' && steps.supabase-cli.outcome == 'success'
        # `supabase start` boots Postgres, GoTrue, PostgREST, Storage, etc. in
        # Docker. Migrations from supabase/migrations/ are applied automatically.
        run: |
          set -euo pipefail
          supabase start --exclude=imgproxy,mailpit,studio,realtime,edge-runtime

      - name: Capture local stack credentials
        if: steps.supabase-start.outcome == 'success'
        id: creds
        run: |
          set -euo pipefail
          # `supabase status -o env` prints KEY=VALUE lines we can re-export.
          supabase status -o env > /tmp/supabase.env
          # The CLI emits API_URL / ANON_KEY / SERVICE_ROLE_KEY (sometimes
          # prefixed with SUPABASE_). Normalise to the names our scripts expect.
          set -a
          # shellcheck disable=SC1091
          source /tmp/supabase.env
          set +a
          {
            echo "SUPABASE_URL=${API_URL:-${SUPABASE_API_URL:-http://127.0.0.1:54321}}"
            echo "SUPABASE_ANON_KEY=${ANON_KEY:-$SUPABASE_ANON_KEY}"
            echo "SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY:-$SUPABASE_SERVICE_ROLE_KEY}"
          } >> "$GITHUB_ENV"

      # `supabase start` returns as soon as the containers are reported up,
      # but PostgREST and GoTrue can still need a few seconds before they
      # accept HTTP traffic. Polling the health endpoints prevents flaky
      # "fetch failed" / "connection refused" errors from the seed script
      # and the test runner. We poll PostgREST (REST API surface) and
      # GoTrue (auth surface used by the seed script's signInWithPassword)
      # plus a direct Postgres TCP probe as a belt-and-braces check.
      - name: Wait for Supabase to be ready
        id: supabase-ready
        if: steps.supabase-start.outcome == 'success'
        env:
          SUPABASE_URL: ${{ env.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ env.SUPABASE_ANON_KEY }}
        run: |
          set -uo pipefail
          # Maximum wait: 60 attempts * 2s = 120s. Plenty for cold-start on a
          # GitHub-hosted runner; failure here means something is genuinely
          # wrong rather than just slow.
          MAX_ATTEMPTS=60
          SLEEP_SECS=2

          # Postgres TCP port — the CLI exposes it on 54322 by default.
          DB_HOST="127.0.0.1"
          DB_PORT="54322"

          # PostgREST and GoTrue both sit behind Kong on $SUPABASE_URL.
          REST_URL="${SUPABASE_URL%/}/rest/v1/"
          AUTH_URL="${SUPABASE_URL%/}/auth/v1/health"

          echo "Polling Supabase readiness:"
          echo "  REST: $REST_URL"
          echo "  AUTH: $AUTH_URL"
          echo "  DB:   $DB_HOST:$DB_PORT"

          rest_ready=false
          auth_ready=false
          db_ready=false

          for i in $(seq 1 "$MAX_ATTEMPTS"); do
            if [ "$db_ready" != "true" ]; then
              if (echo > "/dev/tcp/${DB_HOST}/${DB_PORT}") >/dev/null 2>&1; then
                db_ready=true
                echo "[$i/${MAX_ATTEMPTS}] ✅ Postgres TCP accepting connections"
              fi
            fi
            if [ "$rest_ready" != "true" ]; then
              # PostgREST returns 200 with the OpenAPI spec when an apikey is
              # supplied; without it the gateway 401s — both are proof it's up.
              code=$(curl -sS -o /dev/null -w '%{http_code}' \
                -H "apikey: ${SUPABASE_ANON_KEY}" \
                -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
                "$REST_URL" || echo "000")
              if [ "$code" = "200" ] || [ "$code" = "401" ]; then
                rest_ready=true
                echo "[$i/${MAX_ATTEMPTS}] ✅ PostgREST responding (HTTP $code)"
              fi
            fi
            if [ "$auth_ready" != "true" ]; then
              code=$(curl -sS -o /dev/null -w '%{http_code}' "$AUTH_URL" || echo "000")
              if [ "$code" = "200" ]; then
                auth_ready=true
                echo "[$i/${MAX_ATTEMPTS}] ✅ GoTrue responding (HTTP 200)"
              fi
            fi
            if [ "$db_ready" = "true" ] && [ "$rest_ready" = "true" ] && [ "$auth_ready" = "true" ]; then
              echo "All Supabase services ready after $((i * SLEEP_SECS))s"
              exit 0
            fi
            sleep "$SLEEP_SECS"
          done

          echo "::error::Supabase did not become ready within $((MAX_ATTEMPTS * SLEEP_SECS))s"
          echo "  db_ready=$db_ready rest_ready=$rest_ready auth_ready=$auth_ready"
          echo "Last supabase status:"
          supabase status || true
          exit 1

      # Second readiness gate: TCP-up does not imply migrations have finished
      # applying. The Supabase CLI applies files from supabase/migrations/ in
      # the background after `supabase start` returns, and seeding before
      # they finish surfaces as cryptic "relation does not exist" or RLS
      # policy mismatches deep inside the test run. We block here until:
      #   1. supabase_migrations.schema_migrations exists (the CLI's own
      #      tracking table — proof the migration runner has initialised),
      #   2. the count of applied versions is >= the number of .sql files in
      #      supabase/migrations/ (proof every project migration ran),
      #   3. a representative set of tenant-scoped tables the RLS sweep
      #      depends on are actually present in the public schema.
      # Each check is polled with the same backoff as the TCP gate so a
      # slow runner doesn't spuriously fail; on timeout we dump diagnostic
      # state to make triage obvious.
      - name: Wait for migrations to be applied
        id: migrations-ready
        if: steps.supabase-ready.outcome == 'success'
        env:
          PGPASSWORD: postgres
        run: |
          set -uo pipefail
          MAX_ATTEMPTS=60
          SLEEP_SECS=2

          PSQL=(psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -At)

          # Count migration files shipped in the repo. The CLI applies one
          # row per file in supabase_migrations.schema_migrations, so this
          # gives us the exact target version count to wait for.
          expected=$(find supabase/migrations -maxdepth 1 -type f -name '*.sql' \
            2>/dev/null | wc -l | tr -d ' ')
          if [ -z "$expected" ] || [ "$expected" = "0" ]; then
            echo "::warning::No .sql files found under supabase/migrations/ — skipping version-count check."
            expected=0
          fi
          echo "Expecting at least ${expected} migration(s) to be applied."

          # Tables the cross-tenant RLS sweep + seed script touch directly.
          # If any of these is missing after migrations, seeding will fail
          # in confusing ways — fail fast here instead.
          REQUIRED_TABLES=(
            tenants
            tenant_users
            reservations
            resources
            sites
            audit_log
            system_admins
          )

          tracking_ready=false
          version_ready=false
          tables_ready=false

          for i in $(seq 1 "$MAX_ATTEMPTS"); do
            if [ "$tracking_ready" != "true" ]; then
              # The CLI's migration runner creates this schema/table as its
              # very first action. Its absence means migrations haven't even
              # started yet — keep waiting.
              if "${PSQL[@]}" -c "SELECT 1 FROM information_schema.tables \
                WHERE table_schema = 'supabase_migrations' \
                  AND table_name = 'schema_migrations' LIMIT 1;" \
                2>/dev/null | grep -q '^1$'; then
                tracking_ready=true
                echo "[$i/${MAX_ATTEMPTS}] ✅ supabase_migrations.schema_migrations exists"
              fi
            fi

            if [ "$tracking_ready" = "true" ] && [ "$version_ready" != "true" ]; then
              applied=$("${PSQL[@]}" -c \
                "SELECT count(*) FROM supabase_migrations.schema_migrations;" \
                2>/dev/null | tr -d ' ')
              applied="${applied:-0}"
              if [ "$applied" -ge "$expected" ]; then
                version_ready=true
                echo "[$i/${MAX_ATTEMPTS}] ✅ ${applied}/${expected} migrations applied"
              else
                echo "[$i/${MAX_ATTEMPTS}] ⏳ ${applied}/${expected} migrations applied"
              fi
            fi

            if [ "$version_ready" = "true" ] && [ "$tables_ready" != "true" ]; then
              missing=()
              for t in "${REQUIRED_TABLES[@]}"; do
                if ! "${PSQL[@]}" -c "SELECT 1 FROM information_schema.tables \
                  WHERE table_schema = 'public' AND table_name = '${t}' \
                  LIMIT 1;" 2>/dev/null | grep -q '^1$'; then
                  missing+=("$t")
                fi
              done
              if [ ${#missing[@]} -eq 0 ]; then
                tables_ready=true
                echo "[$i/${MAX_ATTEMPTS}] ✅ All required tenant tables present"
              else
                echo "[$i/${MAX_ATTEMPTS}] ⏳ Missing tables: ${missing[*]}"
              fi
            fi

            if [ "$tracking_ready" = "true" ] \
              && [ "$version_ready" = "true" ] \
              && [ "$tables_ready" = "true" ]; then
              echo "Migrations ready after $((i * SLEEP_SECS))s"
              exit 0
            fi
            sleep "$SLEEP_SECS"
          done

          echo "::error::Migrations did not finish applying within $((MAX_ATTEMPTS * SLEEP_SECS))s"
          echo "  tracking_ready=$tracking_ready version_ready=$version_ready tables_ready=$tables_ready"
          echo "Applied versions:"
          "${PSQL[@]}" -c "SELECT version FROM supabase_migrations.schema_migrations \
            ORDER BY version;" 2>&1 || true
          echo "Public tables present:"
          "${PSQL[@]}" -c "SELECT table_name FROM information_schema.tables \
            WHERE table_schema = 'public' ORDER BY table_name;" 2>&1 || true
          exit 1

      # Some late regression-test migrations create temporary auth.users rows
      # directly in SQL. GoTrue's admin listUsers endpoint expects token text
      # columns to be strings, so normalize after every migration has run and
      # before any auth admin endpoint or sign-in path reads those rows.
      - name: Normalize auth users for GoTrue listUsers
        if: steps.supabase-ready.outcome == 'success' && steps.migrations-ready.outcome == 'success'
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -v ON_ERROR_STOP=1 <<'SQL'
          UPDATE auth.users SET
            confirmation_token = COALESCE(confirmation_token, ''),
            recovery_token = COALESCE(recovery_token, ''),
            email_change_token_new = COALESCE(email_change_token_new, ''),
            email_change = COALESCE(email_change, ''),
            phone_change = COALESCE(phone_change, ''),
            phone_change_token = COALESCE(phone_change_token, ''),
            email_change_token_current = COALESCE(email_change_token_current, ''),
            reauthentication_token = COALESCE(reauthentication_token, '')
          WHERE confirmation_token IS NULL
             OR recovery_token IS NULL
             OR email_change_token_new IS NULL
             OR email_change IS NULL
             OR phone_change IS NULL
             OR phone_change_token IS NULL
             OR email_change_token_current IS NULL
             OR reauthentication_token IS NULL;
          SQL

      - name: Seed test tenants and users
        if: steps.supabase-ready.outcome == 'success' && steps.migrations-ready.outcome == 'success'
        run: |
          set -euo pipefail
          # Run seed script and append the emitted KEY=VALUE lines to
          # $GITHUB_ENV so the next step picks up the live-mode creds.
          bun run scripts/seed-rls-test-data.ts >> "$GITHUB_ENV"

      # Pre-test verification: confirm the seeded fixtures are *actually*
      # present in the database before we spend ~minutes running the RLS
      # sweep. If `seed-rls-test-data.ts` partially succeeded (e.g. created
      # the auth user but the tenant insert silently rolled back, or the
      # emitted env vars point to IDs that don't exist on the cluster the
      # tests will hit), the sweep would fail with confusing "row not
      # found" / "RLS denied" errors hundreds of lines deep. Failing fast
      # here turns that into a single, obvious error pointing at the seed
      # step. We check both legs (auth.users + tenants) for both labels
      # and report ALL missing fixtures in one pass so a triple-failure
      # doesn't require three CI re-runs to diagnose.
      - name: Verify seeded fixtures exist in DB
        if: steps.supabase-ready.outcome == 'success' && steps.migrations-ready.outcome == 'success'
        env:
          PGPASSWORD: postgres
        run: |
          set -uo pipefail
          PSQL=(psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -At)

          missing=()
          for label in A B; do
            email_var="RLS_TEST_TENANT_${label}_EMAIL"
            tid_var="RLS_TEST_TENANT_${label}_ID"
            email="${!email_var:-}"
            tenant_id="${!tid_var:-}"

            if [ -z "$email" ]; then
              missing+=("Tenant ${label}: env var ${email_var} is empty (seed script did not emit it)")
              continue
            fi
            if [ -z "$tenant_id" ]; then
              missing+=("Tenant ${label}: env var ${tid_var} is empty (seed script did not emit it)")
              continue
            fi

            # auth.users lookup — case-insensitive to tolerate any seed-side
            # normalisation. A missing row here means createUser silently
            # failed or the user was created on a different cluster.
            user_found=$("${PSQL[@]}" -c "
              SELECT count(*) FROM auth.users
              WHERE lower(email) = lower('${email}');
            " 2>/dev/null | tr -d ' ')
            user_found="${user_found:-0}"
            if [ "$user_found" = "0" ]; then
              missing+=("Tenant ${label}: auth.users row for ${email} NOT FOUND")
            else
              echo "✅ Tenant ${label}: auth.users row for ${email} present"
            fi

            # public.tenants lookup — proves create_tenant RPC actually
            # committed and the ID we'll feed to the RLS tests is real.
            tenant_found=$("${PSQL[@]}" -c "
              SELECT count(*) FROM public.tenants
              WHERE id = '${tenant_id}'::uuid;
            " 2>/dev/null | tr -d ' ')
            tenant_found="${tenant_found:-0}"
            if [ "$tenant_found" = "0" ]; then
              missing+=("Tenant ${label}: public.tenants row for id=${tenant_id} NOT FOUND")
            else
              echo "✅ Tenant ${label}: public.tenants row for id=${tenant_id} present"
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Seeded fixture verification FAILED — RLS tests cannot run reliably."
            for msg in "${missing[@]}"; do
              echo "::error::  - ${msg}"
            done
            {
              echo "### ❌ Seed verification failed"
              echo ""
              echo "The following fixtures were missing after \`seed-rls-test-data.ts\` ran:"
              echo ""
              for msg in "${missing[@]}"; do
                echo "- ${msg}"
              done
              echo ""
              echo "_Inspect the **Seed test tenants and users** step's stderr for the exact failure._"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "All seeded fixtures verified present in DB."

      # Print the seeded tenant/user identifiers (IDs, emails, slugs) so a
      # failed RLS run can be triaged without re-running the seed locally.
      # Passwords are deliberately NOT echoed — the seed script keeps them
      # only in $GITHUB_ENV (masked when used as secrets in later steps).
      # We resolve user_id and slug from the DB by email so the summary
      # stays accurate even if the seed script's emitted vars change.
      - name: Print seeded tenant debug info (no secrets)
        if: steps.supabase-ready.outcome == 'success'
        env:
          PGPASSWORD: postgres
        run: |
          set -uo pipefail
          echo "### Seeded RLS test fixtures" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Label | Email | Tenant ID | Tenant slug | Tenant name | User ID |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|---|---|---|" >> "$GITHUB_STEP_SUMMARY"

          # Local Supabase CLI exposes Postgres on 127.0.0.1:54322 with the
          # default `postgres`/`postgres` superuser credentials.
          PSQL=(psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -At -F '|')

          for label in A B; do
            email_var="RLS_TEST_TENANT_${label}_EMAIL"
            tid_var="RLS_TEST_TENANT_${label}_ID"
            email="${!email_var:-}"
            tenant_id="${!tid_var:-}"
            if [ -z "$email" ] || [ -z "$tenant_id" ]; then
              echo "::warning::Tenant ${label} env vars missing (email='${email}' tenant_id='${tenant_id}')"
              echo "| ${label} | (missing) | (missing) | – | – | – |" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            row=$("${PSQL[@]}" -c "
              SELECT
                u.id::text,
                t.slug,
                t.name
              FROM auth.users u
              LEFT JOIN public.tenants t ON t.id = '${tenant_id}'::uuid
              WHERE lower(u.email) = lower('${email}')
              LIMIT 1;
            " 2>/dev/null)

            user_id=$(echo "$row" | cut -d'|' -f1)
            slug=$(echo "$row"   | cut -d'|' -f2)
            tname=$(echo "$row"  | cut -d'|' -f3)

            echo "Tenant ${label}:"
            echo "  email     = ${email}"
            echo "  user_id   = ${user_id:-<not found>}"
            echo "  tenant_id = ${tenant_id}"
            echo "  slug      = ${slug:-<not found>}"
            echo "  name      = ${tname:-<not found>}"

            echo "| ${label} | \`${email}\` | \`${tenant_id}\` | \`${slug:-?}\` | ${tname:-?} | \`${user_id:-?}\` |" >> "$GITHUB_STEP_SUMMARY"
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "_Passwords intentionally omitted from this summary._" >> "$GITHUB_STEP_SUMMARY"

      # Turn up Postgres logging *before* the RLS sweep so any failing
      # statement is captured with its full SQL text and SQLSTATE error
      # code in the container log. We set these via ALTER SYSTEM + reload
      # so they apply to the live cluster without a restart.
      #   - log_statement = 'all'        → every SQL statement
      #   - log_min_messages = 'warning' → keep noise down for non-errors
      #   - log_min_error_statement = 'error' → include the offending SQL
      #     on every error so we can correlate with the RLS test that
      #     triggered it.
      #   - log_error_verbosity = 'verbose' → emit SQLSTATE + DETAIL/HINT
      - name: Enable verbose Postgres logging for RLS sweep
        if: steps.supabase-ready.outcome == 'success'
        env:
          PGPASSWORD: postgres
        run: |
          # Best-effort: in the local Supabase stack the `postgres` role may
          # not have privileges to alter superuser-only GUCs like
          # `log_statement`. We don't want this debug-only logging tweak to
          # fail the entire workflow, so each statement is tolerant of
          # permission errors and we always exit 0.
          set -uo pipefail
          PSQL=(psql -h 127.0.0.1 -p 54322 -U postgres -d postgres)
          "${PSQL[@]}" -c "ALTER SYSTEM SET log_statement = 'all';" || echo "(skipping log_statement: insufficient privileges)"
          "${PSQL[@]}" -c "ALTER SYSTEM SET log_min_messages = 'warning';" || echo "(skipping log_min_messages)"
          "${PSQL[@]}" -c "ALTER SYSTEM SET log_min_error_statement = 'error';" || echo "(skipping log_min_error_statement)"
          "${PSQL[@]}" -c "ALTER SYSTEM SET log_error_verbosity = 'verbose';" || echo "(skipping log_error_verbosity)"
          "${PSQL[@]}" -c "SELECT pg_reload_conf();" || echo "(skipping pg_reload_conf)"
          exit 0

      # Warm up the local Storage container before the test sweep. The
      # Supabase Storage API on a freshly-booted local stack is bursty —
      # the first few uploads (especially after a cold image pull) can
      # routinely exceed 30s while internal connection pools, S3
      # emulator, and multipart machinery initialise. Issuing a couple of
      # throwaway requests here pays that warmup cost OUTSIDE the test
      # timeout budget, so the suite's positive-control uploads don't
      # spuriously trip the 45s per-call cap.
      - name: Warm up local Storage API
        if: steps.supabase-ready.outcome == 'success'
        env:
          SUPABASE_URL: ${{ env.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -uo pipefail
          STORAGE_URL="${SUPABASE_URL%/}/storage/v1"
          echo "Warming Storage API at $STORAGE_URL ..."
          for i in 1 2 3 4 5; do
            code=$(curl -sS -o /dev/null -w '%{http_code}' \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              "$STORAGE_URL/bucket" || echo "000")
            echo "  warmup $i: HTTP $code"
            if [ "$code" = "200" ]; then break; fi
            sleep 2
          done
          # Issue a list against each bucket the suite uses so the storage
          # backend opens and caches its connections before tests start.
          for bucket in tenant-private tenant-assets; do
            curl -sS -o /dev/null -w "  $bucket list: HTTP %{http_code}\n" \
              -X POST \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Content-Type: application/json" \
              -d '{"prefix":"","limit":1}' \
              "$STORAGE_URL/object/list/$bucket" || true
          done
          exit 0

      - name: Run cross-tenant RLS tests (live, against local stack)
        id: rls-tests
        if: steps.supabase-ready.outcome == 'success'
        env:
          # Vite reads these via import.meta.env at test compile time.
          VITE_SUPABASE_URL: ${{ env.SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ env.SUPABASE_ANON_KEY }}
          # Keep every storage request bounded below the Vitest timeout so
          # policy failures surface as actionable errors instead of 120s hangs.
          RLS_STORAGE_DENIAL_CALL_TIMEOUT_MS: 6000
          RLS_STORAGE_ALLOWED_CALL_TIMEOUT_MS: 25000
          RLS_STORAGE_FETCH_TIMEOUT_MS: 25000
          RLS_STORAGE_ALLOWED_RETRY_ATTEMPTS: 3
          # Tags the generated report so local-stack output is distinguishable
          # from remote-staging output when both artifacts are downloaded.
          RLS_REPORT_FLAVOR: ${{ matrix.flavor }}
        run: bun run ${{ matrix.command }}

      # Belt-and-braces verification that the test run actually flushed a
      # ledger for THIS flavor before we hand it to the PDF generator.
      # `flushLedger()` writes both `reports/storage-attempts.json` AND a
      # matrix-flavored copy such as `reports/storage-attempts.local-core.json`, if the flavored copy is
      # missing it means the test process crashed before afterAll ran,
      # and any rendering would silently use a stale canonical file from
      # a previous run. Logging the resolved paths here lets a reviewer
      # eyeball the env→path mapping straight from the workflow log.
      - name: Verify flavored storage-attempts ledger exists (local)
        if: always() && steps.supabase-start.outcome == 'success' && matrix.label != 'core'
        env:
          RLS_REPORT_FLAVOR: ${{ matrix.flavor }}
        run: |
          set -uo pipefail
          FLAVORED="reports/storage-attempts.${RLS_REPORT_FLAVOR}.json"
          CANONICAL="reports/storage-attempts.json"
          echo "Resolving storage-attempts ledger for flavor='${RLS_REPORT_FLAVOR}':"
          echo "  flavored  = ${FLAVORED}"
          echo "  canonical = ${CANONICAL}"
          if [ -f "$FLAVORED" ]; then
            echo "✅ Flavored ledger present ($(wc -c < "$FLAVORED") bytes)"
            # Pin the PDF generator to the flavored file so a leftover
            # canonical copy from a previous run can't be picked up.
            echo "STORAGE_ATTEMPTS_LEDGER=${PWD}/${FLAVORED}" >> "$GITHUB_ENV"
          elif [ -f "$CANONICAL" ]; then
            echo "::warning::Flavored ledger ${FLAVORED} missing — falling back to ${CANONICAL}."
            echo "STORAGE_ATTEMPTS_LEDGER=${PWD}/${CANONICAL}" >> "$GITHUB_ENV"
          else
            echo "::warning::No storage-attempts ledger found — PDF step will be skipped."
            echo "STORAGE_ATTEMPTS_LEDGER=" >> "$GITHUB_ENV"
          fi

      # Render the storage-attempts ledger written by cross-tenant-storage.test.ts
      # into a reviewable PDF. Runs `if: always()` so a failed test sweep
      # (which is exactly when the PDF is most useful for triage) still
      # produces the artifact. `STORAGE_ATTEMPTS_LEDGER` is pinned by the
      # previous step so the generator never picks up a stale file.
      - name: Generate storage-attempts PDF (local)
        if: always() && steps.supabase-start.outcome == 'success' && matrix.label != 'core' && env.STORAGE_ATTEMPTS_LEDGER != ''
        env:
          RLS_REPORT_FLAVOR: ${{ matrix.flavor }}
        run: bun run scripts/generate-storage-attempts-pdf.ts || true

      # Sibling of the PDF step: emit a small HTML summary focused on the
      # adversarial subset (path traversal, encoding tricks, late segments).
      # Uploaded with the rest of `reports/` below so reviewers can open
      # `adversarial-summary.local.html` straight from the artifact bundle
      # without scrolling the full PDF. Safe-fail so a render bug never
      # masks an upstream test failure.
      - name: Generate adversarial HTML summary (local)
        if: always() && steps.supabase-start.outcome == 'success' && matrix.label != 'core' && env.STORAGE_ATTEMPTS_LEDGER != ''
        env:
          RLS_REPORT_FLAVOR: ${{ matrix.flavor }}
        run: bun run scripts/generate-adversarial-html-summary.ts || true

      - name: Upload RLS report (local)
        if: always() && steps.supabase-start.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          # `reports/` already contains the storage-attempts PDF + JSON
          # alongside the rls-report HTML/JSON, so a single upload covers
          # both artifact families.
          name: rls-report-${{ matrix.flavor }}
          path: reports/
          retention-days: 14

      # When cross-tenant *storage* validation fails (bucket isolation tests
      # in cross-tenant-storage.test.ts), surface the resolved tenant IDs and
      # membership-probe results directly in the GitHub Actions job summary.
      # This is the fastest signal for distinguishing a real RLS regression
      # from a seeding/membership glitch (e.g. a user accidentally linked to
      # both tenants) — without forcing the reviewer to download artifacts.
      #
      # Steps:
      #   1. Detect storage-test failures in reports/rls-report.json.
      #   2. Echo the seeded tenant + user IDs from $GITHUB_ENV.
      #   3. Run a service-role psql probe against tenant_users to confirm
      #      that each user is a member of exactly one (the expected) tenant
      #      and exercise the get_user_tenant_id() resolver — the same
      #      function the storage RLS policies depend on.
      #   4. Write everything to $GITHUB_STEP_SUMMARY in a Markdown table.
      - name: Summarize storage RLS failures (tenants + membership probes)
        if: always() && steps.rls-tests.outcome == 'failure'
        env:
          PGPASSWORD: postgres
        run: |
          set +e
          REPORT="reports/rls-report.json"
          if [ ! -f "$REPORT" ]; then
            echo "No RLS report at $REPORT — nothing to summarize."
            exit 0
          fi

          # Pull failing storage-test entries. The storage test file is
          # cross-tenant-storage.test.ts; we also catch any entry whose
          # name/suite mentions storage/bucket so future test-file renames
          # don't silently bypass this summary.
          STORAGE_FAILS_JSON=$(node -e "
            const r = require('./reports/rls-report.json');
            const fails = (r.entries || []).filter(e =>
              e.status === 'failed' && (
                /cross-tenant-storage|storage|bucket/i.test(e.file || '') ||
                /storage|bucket/i.test(e.fullName || '') ||
                /storage|bucket/i.test(e.suite || '')
              )
            );
            process.stdout.write(JSON.stringify(fails));
          " 2>/dev/null)

          FAIL_COUNT=$(node -e "process.stdout.write(String(JSON.parse(process.argv[1] || '[]').length))" "$STORAGE_FAILS_JSON" 2>/dev/null)
          FAIL_COUNT="${FAIL_COUNT:-0}"

          if [ "$FAIL_COUNT" = "0" ]; then
            echo "No cross-tenant storage failures detected — skipping storage summary."
            exit 0
          fi

          echo "### ❌ Cross-tenant storage validation failed (${FAIL_COUNT} failing test(s))" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Failing test list (first error line each, top 10).
          echo "#### Failing storage tests" >> "$GITHUB_STEP_SUMMARY"
          node -e "
            const fails = JSON.parse(process.argv[1] || '[]').slice(0, 10);
            for (const e of fails) {
              const msg = (e.errorMessage || '(no message)').split('\n')[0].slice(0, 240);
              console.log('- **' + (e.name || e.fullName) + '** — ' + msg);
            }
          " "$STORAGE_FAILS_JSON" >> "$GITHUB_STEP_SUMMARY" 2>/dev/null
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Resolved tenant IDs from the seed step (already in $GITHUB_ENV).
          echo "#### Resolved tenant identifiers" >> "$GITHUB_STEP_SUMMARY"
          echo "| Label | Email | Tenant ID |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|" >> "$GITHUB_STEP_SUMMARY"
          for label in A B; do
            email_var="RLS_TEST_TENANT_${label}_EMAIL"
            tid_var="RLS_TEST_TENANT_${label}_ID"
            echo "| ${label} | \`${!email_var:-<unset>}\` | \`${!tid_var:-<unset>}\` |" >> "$GITHUB_STEP_SUMMARY"
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Membership probes: confirm each user is a member of exactly one
          # tenant and that get_user_tenant_id() resolves to the expected ID.
          # A mismatch here almost always explains a storage-bucket failure
          # (a user linked to both tenants makes the resolver return NULL,
          # which fails closed and surfaces as cross-tenant denial).
          PSQL=(psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -At -F '|')
          echo "#### Membership probes" >> "$GITHUB_STEP_SUMMARY"
          echo "| Label | User ID | Membership count | tenant_users.tenant_id(s) | Expected tenant | get_user_tenant_id() | Verdict |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|---|---|---|---|" >> "$GITHUB_STEP_SUMMARY"

          probe_failed=0
          for label in A B; do
            email_var="RLS_TEST_TENANT_${label}_EMAIL"
            tid_var="RLS_TEST_TENANT_${label}_ID"
            email="${!email_var:-}"
            expected_tid="${!tid_var:-}"

            if [ -z "$email" ] || [ -z "$expected_tid" ]; then
              echo "| ${label} | – | – | – | \`${expected_tid:-<unset>}\` | – | ⚠️ env vars missing |" >> "$GITHUB_STEP_SUMMARY"
              probe_failed=1
              continue
            fi

            user_id=$("${PSQL[@]}" -c \
              "SELECT id::text FROM auth.users WHERE lower(email) = lower('${email}') LIMIT 1;" \
              2>/dev/null | head -n1)
            user_id="${user_id:-}"

            if [ -z "$user_id" ]; then
              echo "| ${label} | (not found) | 0 | – | \`${expected_tid}\` | – | ❌ user missing |" >> "$GITHUB_STEP_SUMMARY"
              probe_failed=1
              continue
            fi

            mem_count=$("${PSQL[@]}" -c \
              "SELECT count(*) FROM public.tenant_users WHERE user_id = '${user_id}'::uuid;" \
              2>/dev/null | head -n1 | tr -d ' ')
            mem_count="${mem_count:-0}"

            mem_tids=$("${PSQL[@]}" -c \
              "SELECT string_agg(tenant_id::text, ', ' ORDER BY tenant_id) FROM public.tenant_users WHERE user_id = '${user_id}'::uuid;" \
              2>/dev/null | head -n1)
            mem_tids="${mem_tids:-<none>}"

            resolved=$("${PSQL[@]}" -c \
              "SELECT COALESCE(public.get_user_tenant_id('${user_id}'::uuid)::text, '<NULL>');" \
              2>/dev/null | head -n1)
            resolved="${resolved:-<error>}"

            verdict="✅ ok"
            if [ "$mem_count" != "1" ]; then
              verdict="❌ membership count != 1"
              probe_failed=1
            elif [ "$resolved" = "<NULL>" ]; then
              verdict="❌ resolver returned NULL"
              probe_failed=1
            elif [ "$resolved" != "$expected_tid" ]; then
              verdict="❌ resolver mismatch"
              probe_failed=1
            elif [ "$mem_tids" != "$expected_tid" ]; then
              verdict="⚠️ tenant_users tenant_id != expected"
              probe_failed=1
            fi

            # Also echo to job log for grep-friendly triage.
            echo "Tenant ${label} probe:"
            echo "  email          = ${email}"
            echo "  user_id        = ${user_id}"
            echo "  expected_tid   = ${expected_tid}"
            echo "  membership_ct  = ${mem_count}"
            echo "  tenant_ids     = ${mem_tids}"
            echo "  resolver       = ${resolved}"
            echo "  verdict        = ${verdict}"

            echo "| ${label} | \`${user_id}\` | ${mem_count} | \`${mem_tids}\` | \`${expected_tid}\` | \`${resolved}\` | ${verdict} |" \
              >> "$GITHUB_STEP_SUMMARY"
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "$probe_failed" = "1" ]; then
            echo "> ⚠️ One or more membership probes failed — this typically explains the storage RLS failure (resolver returns NULL on duplicate memberships, fail-closed)." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "> ✅ Membership probes are clean — the storage failure is **not** caused by a duplicate / missing tenant_users row. Inspect the storage bucket policies and the failing test's expected outcome." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "📦 Full details: \`rls-report-${{ matrix.flavor }}\` artifact (HTML/JSON) and \`rls-postgres-logs-run-${GITHUB_RUN_ID}\` (filtered SQL errors)." >> "$GITHUB_STEP_SUMMARY"

      # When the RLS sweep itself fails, capture Postgres logs filtered to
      # the statements + errors that the failing tests produced. This is
      # narrower than the full container log dump below: it focuses on
      # ERROR/FATAL/PANIC lines, the SQL statements that triggered them,
      # and the SQLSTATE codes — exactly what's needed to triage an RLS
      # denial vs. a genuine bug. We pull:
      #   1. The raw Postgres container log (full text, for grep history).
      #   2. A filtered slice keyed off RLS-relevant patterns + SQLSTATE.
      #   3. A structured JSONL extract of just the error events with
      #      timestamp / sqlstate / statement / detail / hint, so a
      #      reviewer can scan failures at a glance.
      - name: Capture filtered Postgres logs for failing RLS sweep
        if: always() && steps.rls-tests.outcome == 'failure'
        run: |
          set +e
          mkdir -p rls-postgres-logs
          echo "Extracting Postgres logs for failed RLS sweep (run ${GITHUB_RUN_ID})..."

          # Find the Postgres container the CLI started. Naming has varied
          # across CLI versions (supabase_db_<project>, supabase-db, etc.)
          # so match on the canonical prefixes.
          PG_CONTAINER=$(docker ps -a --format '{{.Names}}' \
            | grep -E '^supabase[_-]db' | head -n1 || true)

          if [ -z "$PG_CONTAINER" ]; then
            echo "No supabase_db container found — cannot extract Postgres logs." \
              > rls-postgres-logs/_no-postgres-container.txt
            docker ps -a > rls-postgres-logs/_docker-ps.txt 2>&1 || true
            exit 0
          fi

          {
            echo "container: $PG_CONTAINER"
            echo "run_id:    $GITHUB_RUN_ID"
            echo "captured:  $(date -u +%FT%TZ)"
          } > rls-postgres-logs/_meta.txt

          # 1. Full raw Postgres log (kept for completeness; cheap to upload).
          RAW="rls-postgres-logs/run-${GITHUB_RUN_ID}__postgres-raw.log"
          docker logs "$PG_CONTAINER" > "$RAW" 2>&1 || true

          # 2. Filtered slice. Capture:
          #    - any line tagged ERROR / FATAL / PANIC by Postgres,
          #    - STATEMENT lines that follow them (verbose error mode),
          #    - DETAIL / HINT continuation lines,
          #    - explicit RLS-related markers,
          #    - SQLSTATE codes.
          FILTERED="rls-postgres-logs/FAILED__run-${GITHUB_RUN_ID}__postgres-filtered.log"
          grep -E -i \
            -e '\b(ERROR|FATAL|PANIC):' \
            -e '\bSTATEMENT:' \
            -e '\bDETAIL:' \
            -e '\bHINT:' \
            -e '\bSQLSTATE\b' \
            -e 'row-level security' \
            -e 'violates row-level security' \
            -e 'permission denied for (table|relation|schema|view)' \
            -e 'new row violates' \
            "$RAW" > "$FILTERED" 2>/dev/null || true

          if [ ! -s "$FILTERED" ]; then
            echo "_No matching ERROR/RLS lines found in Postgres log._" \
              > "$FILTERED"
          fi

          # 3. Structured JSONL extract — one JSON object per ERROR event,
          #    pairing the error message with the next STATEMENT line and
          #    any SQLSTATE/DETAIL/HINT continuation.
          STRUCTURED="rls-postgres-logs/FAILED__run-${GITHUB_RUN_ID}__postgres-errors.jsonl"
          awk '
            function flush() {
              if (have_error) {
                gsub(/"/, "\\\"", err); gsub(/"/, "\\\"", stmt);
                gsub(/"/, "\\\"", det); gsub(/"/, "\\\"", hnt);
                printf "{\"ts\":\"%s\",\"sqlstate\":\"%s\",\"error\":\"%s\",\"statement\":\"%s\",\"detail\":\"%s\",\"hint\":\"%s\"}\n", \
                  ts, sqlstate, err, stmt, det, hnt
              }
              have_error=0; ts=""; sqlstate=""; err=""; stmt=""; det=""; hnt=""
            }
            /(ERROR|FATAL|PANIC):/ {
              flush()
              have_error=1
              match($0, /[0-9]{4}-[0-9]{2}-[0-9]{2}[T ][0-9:.+-]+/)
              ts = (RSTART > 0) ? substr($0, RSTART, RLENGTH) : ""
              sub(/^.*(ERROR|FATAL|PANIC):[[:space:]]*/, "", $0)
              err = $0
              next
            }
            /SQLSTATE/ {
              if (match($0, /SQLSTATE[[:space:]:]+[A-Z0-9]{5}/)) {
                s = substr($0, RSTART, RLENGTH)
                sub(/^.*[[:space:]:]/, "", s)
                sqlstate = s
              }
            }
            /STATEMENT:/ { sub(/^.*STATEMENT:[[:space:]]*/, ""); stmt = $0; next }
            /DETAIL:/    { sub(/^.*DETAIL:[[:space:]]*/, "");    det  = $0; next }
            /HINT:/      { sub(/^.*HINT:[[:space:]]*/, "");      hnt  = $0; next }
            END { flush() }
          ' "$RAW" > "$STRUCTURED" 2>/dev/null || true

          if [ ! -s "$STRUCTURED" ]; then
            echo '{"note":"No structured error events extracted."}' \
              > "$STRUCTURED"
          fi

          echo ""
          echo "----- Filtered Postgres errors (top 20) -----"
          head -n 20 "$FILTERED" || true
          echo "---------------------------------------------"

          ls -la rls-postgres-logs

      - name: Upload filtered Postgres logs (RLS failure)
        if: always() && steps.rls-tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: rls-postgres-logs-run-${{ github.run_id }}
          path: rls-postgres-logs/
          retention-days: 14
          if-no-files-found: warn

      # Capture container logs whenever the live RLS run failed OR the local
      # stack failed to start. This gives post-mortem visibility into
      # Postgres / GoTrue / PostgREST / Storage without needing to reproduce
      # locally. We dump per-container logs because `supabase logs` is
      # interactive; `docker logs` against the names the CLI assigns is the
      # most reliable path on a hosted runner.
      - name: Collect Supabase container logs
        if: always() && (job.status == 'failure' || steps.supabase-start.outcome != 'success')
        run: |
          set +e
          mkdir -p supabase-logs
          mapfile -t containers < <(docker ps -a --format '{{.Names}}' | grep -E '^supabase_' || true)
          if [ "${#containers[@]}" -eq 0 ]; then
            echo "No supabase_* containers found." > supabase-logs/_no-containers.txt
            docker ps -a > supabase-logs/_docker-ps.txt 2>&1 || true
          else
            for c in "${containers[@]}"; do
              echo "Collecting logs for $c"
              docker logs "$c" > "supabase-logs/${c}.log" 2>&1 || true
              docker inspect "$c" > "supabase-logs/${c}.inspect.json" 2>&1 || true
            done
          fi
          supabase status > supabase-logs/_supabase-status.txt 2>&1 || true
          echo "skip_reason=${skip_reason:-none}" > supabase-logs/_skip-reason.txt
          ls -la supabase-logs

      - name: Upload Supabase container logs
        if: always() && (job.status == 'failure' || steps.supabase-start.outcome != 'success')
        uses: actions/upload-artifact@v4
        with:
          name: supabase-container-logs
          path: supabase-logs/
          retention-days: 14
          if-no-files-found: warn

      # Capture the *effective* Supabase / docker-compose configuration plus
      # the env vars the run actually used. This lets a reviewer reproduce
      # the exact stack shape (image versions, ports, volumes, healthchecks)
      # and the exact non-secret env that was in scope when the failure or
      # skip happened — without needing access to the runner.
      #
      # Secrets are redacted in two layers:
      #   1. We only export a hand-picked allowlist of variables (no blanket
      #      `env` dump), so service-role keys, GH tokens, etc. are never
      #      written to disk.
      #   2. Anything matching common secret name patterns is masked even
      #      inside the allowlisted output as a belt-and-braces step.
      - name: Capture effective Supabase config + env (redacted)
        if: always() && (job.status == 'failure' || steps.supabase-start.outcome != 'success')
        run: |
          set +e
          mkdir -p supabase-config
          echo "Capturing effective Supabase configuration for run ${GITHUB_RUN_ID}..."

          # 1. Project-checked-in config (source of truth before CLI overlays).
          if [ -f supabase/config.toml ]; then
            cp supabase/config.toml supabase-config/config.toml
          else
            echo "supabase/config.toml not present in checkout" \
              > supabase-config/_config-toml-missing.txt
          fi

          # 2. Effective `supabase status` (URLs, ports, container handles).
          supabase status > supabase-config/supabase-status.txt 2>&1 || true
          supabase status -o env > supabase-config/supabase-status.env 2>&1 || true

          # 3. The docker-compose view of what's actually running. The CLI
          #    doesn't expose its compose file directly, but `docker inspect`
          #    on each supabase_* container captures the same effective state
          #    (image, env, mounts, networks, healthcheck) in JSON form.
          mapfile -t containers < <(docker ps -a --format '{{.Names}}' | grep -E '^supabase_' || true)
          if [ "${#containers[@]}" -gt 0 ]; then
            for c in "${containers[@]}"; do
              docker inspect "$c" \
                > "supabase-config/compose-${c}.inspect.json" 2>&1 || true
            done
            docker ps -a --filter 'name=^supabase_' \
              --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}' \
              > supabase-config/compose-overview.txt 2>&1 || true
          else
            echo "No supabase_* containers running at capture time." \
              > supabase-config/_no-containers.txt
          fi

          # 4. Allowlisted env snapshot. Only public/non-secret vars known to
          #    influence stack behavior — never service-role keys or tokens.
          ENV_ALLOWLIST=(
            GITHUB_RUN_ID GITHUB_RUN_ATTEMPT GITHUB_REPOSITORY
            GITHUB_REF GITHUB_SHA GITHUB_WORKFLOW GITHUB_JOB
            RUNNER_OS RUNNER_ARCH
            SUPABASE_URL VITE_SUPABASE_URL
            RLS_REPORT_FLAVOR
            RLS_TEST_TENANT_A_EMAIL RLS_TEST_TENANT_A_ID
            RLS_TEST_TENANT_B_EMAIL RLS_TEST_TENANT_B_ID
            skip_reason
          )
          {
            echo "# Effective env vars used for run ${GITHUB_RUN_ID}"
            echo "# Captured: $(date -u +%FT%TZ)"
            echo "# Only an allowlist is included; secrets are intentionally omitted."
            echo ""
            for var in "${ENV_ALLOWLIST[@]}"; do
              val="${!var-<unset>}"
              # Belt-and-braces: redact anything that looks like a secret even
              # if it sneaks into an allowlisted var (e.g. URL with token).
              case "$var" in
                *KEY*|*TOKEN*|*SECRET*|*PASSWORD*)
                  val="<redacted>"
                  ;;
              esac
              printf '%s=%s\n' "$var" "$val"
            done
          } > supabase-config/effective-env.txt

          # 5. Versions of the tools that produced the stack — useful when a
          #    failure correlates with a CLI / Docker upgrade.
          {
            echo "supabase: $(supabase --version 2>&1 || echo unknown)"
            echo "docker:   $(docker --version 2>&1 || echo unknown)"
            echo "compose:  $(docker compose version 2>&1 || echo unknown)"
          } > supabase-config/_tool-versions.txt

          ls -la supabase-config

      - name: Upload Supabase config + env snapshot
        if: always() && (job.status == 'failure' || steps.supabase-start.outcome != 'success')
        uses: actions/upload-artifact@v4
        with:
          # Run-id-scoped name so multiple failed runs don't collide when
          # downloaded side-by-side for comparison.
          name: supabase-config-snapshot-run-${{ github.run_id }}
          path: supabase-config/
          retention-days: 14
          if-no-files-found: warn

      - name: Stop local Supabase stack
        if: always() && steps.supabase-start.outcome == 'success'
        run: supabase stop --no-backup || true

      - name: Summary
        if: always()
        run: |
          # Fallback path: docker was unavailable but the remote sweep ran.
          if [ -n "${fallback_ran:-}" ]; then
            echo "### Cross-Tenant RLS (Local) — Ran via Remote Fallback" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Docker was not available on this runner, so the live-mode RLS sweep was executed against the **remote** staging backend instead of a local Supabase stack." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- Fallback target: \`remote\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Fallback outcome: \`${fallback_outcome:-unknown}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "📦 Report uploaded as the \`rls-report-remote-fallback-${{ matrix.label }}\` artifact." >> "$GITHUB_STEP_SUMMARY"
            if [ -f reports/rls-report.json ]; then
              echo "" >> "$GITHUB_STEP_SUMMARY"
              node -e "const r=require('./reports/rls-report.json'); const t=r.totals; console.log('| Metric | Value |\n|---|---|\n| Total | '+t.total+' |\n| Passed | '+t.passed+' |\n| Failed | '+t.failed+' |\n| Skipped | '+t.skipped+' |');" >> "$GITHUB_STEP_SUMMARY"
            fi
            exit 0
          fi
          # Skip path: neither the local stack nor the remote fallback ran.
          if [ -n "${skip_reason:-}" ]; then
            echo "### Cross-Tenant RLS (Local) — Skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "Reason: \`${skip_reason}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "This run did not exercise the live-mode RLS sweep. To unblock locally:" >> "$GITHUB_STEP_SUMMARY"
            echo "1. Ensure Docker is available on the runner, **or**" >> "$GITHUB_STEP_SUMMARY"
            echo "2. Configure the remote-fallback secrets (\`VITE_SUPABASE_URL\`, \`VITE_SUPABASE_PUBLISHABLE_KEY\`, \`RLS_TEST_TENANT_{A,B}_{EMAIL,PASSWORD,ID}\`)." >> "$GITHUB_STEP_SUMMARY"
            echo "3. Re-run the workflow." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "📦 Container logs (if any) are uploaded as the \`supabase-container-logs\` artifact." >> "$GITHUB_STEP_SUMMARY"
            echo "🧾 Effective Supabase config + redacted env are uploaded as the \`supabase-config-snapshot-run-${GITHUB_RUN_ID}\` artifact." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if [ -f reports/rls-report.json ]; then
            echo "### Cross-Tenant RLS (Local) — Results" >> "$GITHUB_STEP_SUMMARY"
            node -e "const r=require('./reports/rls-report.json'); const t=r.totals; console.log('| Metric | Value |\n|---|---|\n| Total | '+t.total+' |\n| Passed | '+t.passed+' |\n| Failed | '+t.failed+' |\n| Skipped | '+t.skipped+' |');" >> "$GITHUB_STEP_SUMMARY"
          fi
