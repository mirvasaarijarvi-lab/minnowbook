name: Automated Security Scan

# Runs on every PR + push to main, plus a weekly schedule so freshly
# disclosed advisories are caught even without code changes. The job
# blocks deployment by failing the workflow when:
#   1. `bun audit` reports any high or critical npm advisory, OR
#   2. The Supabase advisors API reports any new ERROR-level finding
#      (only checked when SUPABASE_ACCESS_TOKEN + SUPABASE_PROJECT_REF
#      are configured at the repo level).
#
# WARN-level Supabase findings are reported as annotations only, in
# line with the project maintenance policy (remediate ERROR only).

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm-audit:
    name: NPM dependency audit (high/critical)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: ./.github/actions/setup-bun-with-diagnostics

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}

      - name: Install dependencies
        run: |
          rm -rf node_modules
          bun install --frozen-lockfile

      - name: Audit dependencies
        run: |
          set +e
          # Allowlisted advisories (GHSA ids). Each entry MUST include a
          # justification comment and an expiry date for human review.
          # - GHSA-5xrq-8626-4rwp: vitest <4.1.0 — Vitest UI server arbitrary
          #   file read/exec. We never run `vitest --ui` (CI and local both
          #   use `vitest run`), vitest is a devDependency not shipped to
          #   production, and the fix requires Vite 6 + a major vitest
          #   upgrade. Re-evaluate after the Vite 6 migration. Expires:
          #   2026-09-01.
          ALLOWLIST="GHSA-5xrq-8626-4rwp"

          raw=$(bun audit --json --audit-level=moderate 2>/dev/null || true)
          # Re-run without --json to surface human-readable output in logs.
          bun audit --audit-level=moderate || true

          if [ -z "$raw" ]; then
            echo "::warning::bun audit returned no JSON output; skipping allowlist filter."
            bun audit --audit-level=moderate
            status=$?
          else
            node -e "
              const data = JSON.parse(process.argv[1] || '{}');
              const allow = new Set(process.argv[2].split(',').filter(Boolean));
              const advisories = Object.values(data.advisories || data.vulnerabilities || {});
              const blocking = advisories.filter(a => {
                const sev = (a.severity || '').toLowerCase();
                if (sev !== 'high' && sev !== 'critical') return false;
                const ids = [a.github_advisory_id, a.ghsa_id, ...(a.cves || []), a.url || ''].filter(Boolean);
                return !ids.some(id => [...allow].some(w => String(id).includes(w)));
              });
              if (blocking.length) {
                console.error('::error::High/critical advisories not in allowlist:');
                for (const a of blocking) {
                  console.error(' - ' + (a.module_name || a.name) + ': ' + (a.title || a.github_advisory_id));
                }
                process.exit(1);
              }
              const skipped = advisories.length - blocking.length;
              console.log('Allowlist applied: ' + skipped + ' advisor(y/ies) waived, 0 blocking.');
              process.exit(0);
            " "$raw" "$ALLOWLIST"
            status=$?
          fi


          if [ "$status" -ne 0 ]; then
            echo "::error::High or critical dependency vulnerabilities detected outside of the documented allowlist. Run 'bun update' or override the affected versions in package.json."
            exit "$status"
          fi
          echo "✅ No high/critical npm advisories (allowlist applied)."


  supabase-advisors:
    name: Supabase advisors (security lints)
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect migration changes
        id: migrations
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            changed=$(git diff --name-only "$base" "$head" -- 'supabase/migrations/**' | wc -l | tr -d ' ')
          elif [ "${{ github.event_name }}" = "push" ]; then
            before="${{ github.event.before }}"
            after="${{ github.sha }}"
            if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
              changed=1
            else
              changed=$(git diff --name-only "$before" "$after" -- 'supabase/migrations/**' | wc -l | tr -d ' ')
            fi
          else
            changed=1
          fi
          echo "changed=$changed" >> "$GITHUB_OUTPUT"
          echo "Migration files changed in this event: $changed"

      - name: Check prerequisites
        id: check
        run: |
          if [ -n "$SUPABASE_ACCESS_TOKEN" ] && [ -n "$SUPABASE_PROJECT_REF" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            if [ "${{ steps.migrations.outputs.changed }}" != "0" ]; then
              echo "::error::Migration files changed but SUPABASE_ACCESS_TOKEN / SUPABASE_PROJECT_REF repo secrets are not configured. Cannot run mandatory security scan on migrations."
              exit 1
            fi
            echo "::notice::Skipping Supabase advisors scan (no migration changes and credentials not configured)."
          fi

      - name: Fetch advisors and gate on ERRORs
        if: steps.check.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          api="https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/advisors/security"
          resp=$(curl -sS -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" "$api")

          echo "$resp" | jq '{
            errors:   ([.lints[]? | select(.level=="ERROR")] | length),
            warnings: ([.lints[]? | select(.level=="WARN")]  | length),
            info:     ([.lints[]? | select(.level=="INFO")]  | length)
          }'

          # WARN -> annotation only (per maintenance policy)
          echo "$resp" | jq -r '.lints[]? | select(.level=="WARN") | "::warning title=Supabase advisor (WARN)::\(.name) — \(.description)"'

          # ERROR -> annotation + fail the job (any ERROR is a new ERROR; baseline is zero)
          err_count=$(echo "$resp" | jq '[.lints[]? | select(.level=="ERROR")] | length')
          echo "$resp" | jq -r '.lints[]? | select(.level=="ERROR") | "::error title=Supabase advisor (ERROR)::\(.name) — \(.description)"'

          if [ "$err_count" -gt 0 ]; then
            echo "❌ $err_count ERROR-level Supabase finding(s) detected. Fix before merging."
            if [ "${{ steps.migrations.outputs.changed }}" != "0" ]; then
              echo "::error::This PR modifies supabase/migrations/** and introduced or left unresolved ERROR-level findings. Merge blocked."
            fi
            exit 1
          fi
          echo "✅ No ERROR-level Supabase findings."

  summary:
    name: Security scan summary
    needs: [npm-audit, supabase-advisors]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "npm-audit:          ${{ needs.npm-audit.result }}"
          echo "supabase-advisors:  ${{ needs.supabase-advisors.result }}"
          if [ "${{ needs.npm-audit.result }}" = "failure" ] || [ "${{ needs.supabase-advisors.result }}" = "failure" ]; then
            exit 1
          fi
